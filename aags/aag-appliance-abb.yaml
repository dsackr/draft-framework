schemaVersion: "1.0"
id: aag.appliance-abb
type: aag
name: Appliance ABB Architecture Analysis Guideline
description: >
  Interview guide for documenting an Appliance ABB. An Appliance ABB is a
  vendor component deployed within the organization's infrastructure boundary
  where the underlying host is blackbox. The organization configures the
  appliance but has no visibility into or responsibility for the underlying
  infrastructure.
version: 1.0.0
catalogStatus: approved
lifecycleStatus: invest
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
tags:
  - appliance
  - analysis
  - governance
appliesTo:
  type: abb
  subtype: appliance
requirements:
  - id: function
    description: What capability does this appliance provide?
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        criteria: capability field is populated with a valid value
        example: "capability: load-balancing"
  - id: resilience-model
    description: >
      What is the resilience model of this appliance — is it inherently
      highly available, single instance, or clustered?
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        criteria: >
          lifecycleStatus and notes document the HA characteristics.
          Some appliances are inherently HA by design. Others may be single instance.
  - id: network-placement
    description: Where does this appliance sit in the network topology?
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        criteria: networkPlacement field is populated
        example: "networkPlacement: public-facing"
  - id: patching-ownership
    description: Who is responsible for firmware and software updates?
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        criteria: patchingOwner field is populated
        example: "patchingOwner: aws-managed"
  - id: data-classification
    description: >
      What classification of data passes through this appliance?
      Required to assess compliance posture.
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        criteria: >
          Data classification is documented in the SDM that deploys
          this appliance via architecturalDecisions.dataClassification
  - id: compliance-posture
    description: What compliance certifications does this appliance carry?
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        criteria: complianceCerts field is populated
        example: "complianceCerts: [SOC2, ISO27001]"
