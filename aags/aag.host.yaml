schemaVersion: "1.0"
id: aag.host
type: aag
name: Host Architecture Analysis Guideline
description: Requirement model for host RBB approval focused on platform integrations and variant readiness.
version: 2.0.0
catalogStatus: approved
lifecycleStatus: maintain
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
tags:
  - host
  - analysis
  - governance
appliesTo:
  type: rbb
  category: host
requirements:
  - id: authentication
    description: The host must address how administrators and services authenticate to the platform.
    rationale: Identity control is a baseline host requirement because unmanaged access breaks supportability and auditability.
    controlReferences:
      - CC.SecurityCompliance.04.2.2
      - CC.SecurityCompliance.04.4.1
    canBeSatisfiedBy:
      - mechanism: externalInteraction
        criteria:
          capability: authentication
        example: Active Directory or another enterprise identity platform.
      - mechanism: architecturalDecision
        key: authenticationApproach
        example: A documented local or federated authentication model when the dependency is not expressed as a platform interaction.
    minimumSatisfactions: 1
  - id: logging
    description: The host must address how logs leave the host and reach an operationally supported logging destination.
    rationale: Logging is required for troubleshooting, security response, and evidentiary review.
    controlReferences:
      - CC.SecurityCompliance.06.1.1
    canBeSatisfiedBy:
      - mechanism: externalInteraction
        criteria:
          capability: logging
        example: Centralized Logging or a managed SIEM pipeline.
      - mechanism: architecturalDecision
        key: loggingApproach
        example: A documented log shipping design for cases where the platform is described indirectly.
    minimumSatisfactions: 1
  - id: security-monitoring
    description: The host must address endpoint security or runtime security monitoring.
    rationale: Hosts must show how they are protected and observed by a security control plane.
    controlReferences:
      - CC.SecurityCompliance.06.3.1
    canBeSatisfiedBy:
      - mechanism: externalInteraction
        criteria:
          capability: security
        example: CrowdStrike Falcon Platform or Wiz Cloud Security.
      - mechanism: internalComponent
        criteria:
          role: agent
        example: An installed security agent ABB that enables the platform interaction.
      - mechanism: architecturalDecision
        key: securityMonitoringApproach
        example: A documented statement of the host security monitoring pattern.
    minimumSatisfactions: 1
  - id: patch-management
    description: The host must address how patching is orchestrated and what operational mechanism applies updates.
    rationale: Patching is a governance control, not an implementation detail that can be left implicit.
    controlReferences:
      - CC.SecurityCompliance.03.1.1
      - CC.SecurityCompliance.03.2.1
    canBeSatisfiedBy:
      - mechanism: externalInteraction
        criteria:
          capability: patch-management
        example: Automox Patch Management.
      - mechanism: internalComponent
        criteria:
          role: agent
        example: An endpoint agent ABB that performs or coordinates patch execution.
      - mechanism: architecturalDecision
        key: patchManagementApproach
        example: A documented patch orchestration model when a platform interaction is not explicitly modeled.
    minimumSatisfactions: 1
  - id: variant-defined
    description: At least one host variant must exist and document its patching cadence and backup approach.
    rationale: A host standard is incomplete unless at least one supported operating mode is documented with its maintenance and recovery posture.
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        key: patchingCadence
        example: The HA or SA variant defines monthly or emergency-only patching.
      - mechanism: architecturalDecision
        key: backupApproach
        example: The HA or SA variant defines image backup, snapshot, or restore strategy.
    minimumSatisfactions: 2
