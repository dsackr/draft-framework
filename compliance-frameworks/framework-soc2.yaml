schemaVersion: "1.0"
id: framework.soc2
type: compliance_framework
name: SOC 2
description: >
  Initial SOC 2 control pack based on the AICPA Trust Services Criteria.
  These controls use DRAFT applicability metadata so they can extend the
  relevant ODCs without changing the ODC files themselves.
version: 2017.0.0
catalogStatus: stub
lifecycleStatus: invest
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
tags:
  - compliance
  - soc2
  - starter-pack
frameworkKind: common
notes: >
  These entries are DRAFT applicability mappings for the public AICPA Trust
  Services Criteria. The authoritative criteria remain in the linked AICPA
  source material.
