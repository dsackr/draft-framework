      - architecturalDecision
  - controlId: IA-5
    name: Product Service Secrets and Authenticator Management
    description: >
      Product services must document how secrets and authenticators are stored,
      rotated, and accessed through approved mechanisms.
    externalReference: https://frontlinetechnologi.sharepoint.com/:x:/t/group_tm_security/IQBmLXKoFH1oQa8uFOhb7BinAfyTil7lH7qiiLYkcnF8MG0
    appliesTo:
      - rbb.service.product
    requirementMode: conditional
    naAllowed: true
    applicability:
      anyOf:
        - field: complianceContext.txRampInScope
          equals: true
        - field: complianceContext.soldInTexas
          equals: true
    validAnswerTypes:
      - externalInteraction
      - abbConfiguration
      - architecturalDecision
  - controlId: PL-2
    name: Data Classification Declaration
    description: >
      Software distributions must declare governing data classification so the
      correct control set can be applied.
    externalReference: https://frontlinetechnologi.sharepoint.com/:x:/t/group_tm_security/IQBmLXKoFH1oQa8uFOhb7BinAfyTil7lH7qiiLYkcnF8MG0
    appliesTo:
