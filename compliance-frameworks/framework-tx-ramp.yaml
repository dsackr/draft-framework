          equals: true
        - field: complianceContext.soldInTexas
          equals: true
    validAnswerTypes:
      - field
      - architecturalDecision
  - controlId: CP-2
    name: Availability and Recovery Objectives
    description: >
      Software distributions must declare the availability requirement and
