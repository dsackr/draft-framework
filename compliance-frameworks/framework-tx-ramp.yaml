schemaVersion: "1.0"
id: framework.tx-ramp
type: compliance_framework
name: TX-RAMP
description: >
  Starter TX-RAMP control pack for DRAFT. This file is intended to map TX-RAMP
  control expectations onto the existing DRAFT concern model without changing
  the ODC files.
version: 0.1.0
catalogStatus: draft
lifecycleStatus: invest
owner:
  team: cloud-operations
  contact: dsackrider@frontlineed.com
tags:
  - compliance
  - tx-ramp
  - starter-pack
frameworkKind: common
controlIdNamespace: TXRAMP
defaultSelection: false
notes: >
  Starter mapping aligned to the workbook source currently used to track
  TX-RAMP controls. Replace the workbook link with deeper authoritative links
  later if stable per-control references become available.
controls:
  - controlId: AC-2
    name: Account Management and Centralized Authentication
    description: >
      Administrative identities must be governed through approved account
      management and centralized authentication workflows.
    externalReference: https://frontlinetechnologi.sharepoint.com/:x:/t/group_tm_security/IQBmLXKoFH1oQa8uFOhb7BinAfyTil7lH7qiiLYkcnF8MG0
    appliesTo:
      - rbb.host
    relatedConcern: authentication
    requirementMode: conditional
    naAllowed: true
    applicability:
      anyOf:
        - field: complianceContext.txRampInScope
          equals: true
        - field: complianceContext.soldInTexas
          equals: true
    validAnswerTypes:
      - externalInteraction
      - abbConfiguration
      - architecturalDecision
  - controlId: AU-2
    name: Auditable Event Logging
    description: >
      Hosts must generate, retain, and forward logs to an approved centralized
      logging workflow.
    externalReference: https://frontlinetechnologi.sharepoint.com/:x:/t/group_tm_security/IQBmLXKoFH1oQa8uFOhb7BinAfyTil7lH7qiiLYkcnF8MG0
    appliesTo:
      - rbb.host
    relatedConcern: log-management
    requirementMode: conditional
    naAllowed: true
    applicability:
      anyOf:
        - field: complianceContext.txRampInScope
          equals: true
        - field: complianceContext.soldInTexas
          equals: true
    validAnswerTypes:
      - abbConfiguration
      - externalInteraction
      - architecturalDecision
  - controlId: SI-4
    name: Security Monitoring
    description: >
      Hosts must provide security telemetry to approved detection and response
      workflows.
    externalReference: https://frontlinetechnologi.sharepoint.com/:x:/t/group_tm_security/IQBmLXKoFH1oQa8uFOhb7BinAfyTil7lH7qiiLYkcnF8MG0
    appliesTo:
      - rbb.host
    relatedConcern: security-monitoring
    requirementMode: conditional
    naAllowed: true
    applicability:
      anyOf:
        - field: complianceContext.txRampInScope
          equals: true
        - field: complianceContext.soldInTexas
          equals: true
    validAnswerTypes:
      - abb
      - abbConfiguration
      - externalInteraction
      - architecturalDecision
  - controlId: CM-3
    name: Configuration Change Control and Patching
    description: >
      Infrastructure components must operate under approved configuration,
      change, and patch management workflows.
    externalReference: https://frontlinetechnologi.sharepoint.com/:x:/t/group_tm_security/IQBmLXKoFH1oQa8uFOhb7BinAfyTil7lH7qiiLYkcnF8MG0
    appliesTo:
      - rbb.host
    relatedConcern: patch-management
    requirementMode: conditional
    naAllowed: true
    applicability:
      anyOf:
        - field: complianceContext.txRampInScope
          equals: true
        - field: complianceContext.soldInTexas
          equals: true
    validAnswerTypes:
      - abb
      - externalInteraction
      - architecturalDecision
  - controlId: SC-28
    name: Data Protection for Database Services
    description: >
      Database services must document protection mechanisms for stored data,
      including encryption expectations where applicable.
    externalReference: https://frontlinetechnologi.sharepoint.com/:x:/t/group_tm_security/IQBmLXKoFH1oQa8uFOhb7BinAfyTil7lH7qiiLYkcnF8MG0
    appliesTo:
      - rbb.service.database
    relatedConcern: encryption-at-rest
    requirementMode: conditional
    naAllowed: true
    applicability:
      anyOf:
        - field: complianceContext.txRampInScope
          equals: true
        - field: complianceContext.soldInTexas
          equals: true
    validAnswerTypes:
      - field
      - abbConfiguration
      - architecturalDecision
  - controlId: AC-6
    name: Least Privilege for Database Services
    description: >
      Database identity, role, and privilege design must be explicitly
      documented.
    externalReference: https://frontlinetechnologi.sharepoint.com/:x:/t/group_tm_security/IQBmLXKoFH1oQa8uFOhb7BinAfyTil7lH7qiiLYkcnF8MG0
    appliesTo:
      - rbb.service.database
    relatedConcern: access-control-model
    requirementMode: conditional
    naAllowed: true
    applicability:
      anyOf:
        - field: complianceContext.txRampInScope
          equals: true
        - field: complianceContext.soldInTexas
          equals: true
    validAnswerTypes:
      - externalInteraction
      - abbConfiguration
      - architecturalDecision
  - controlId: CP-9
    name: Backup and Recovery
    description: >
      Database services must define backup strategy, recovery targets, and
      restoration expectations.
    externalReference: https://frontlinetechnologi.sharepoint.com/:x:/t/group_tm_security/IQBmLXKoFH1oQa8uFOhb7BinAfyTil7lH7qiiLYkcnF8MG0
    appliesTo:
      - rbb.service.database
    relatedConcern: backup-strategy
    requirementMode: conditional
    naAllowed: true
    applicability:
      anyOf:
        - field: complianceContext.txRampInScope
          equals: true
        - field: complianceContext.soldInTexas
          equals: true
    validAnswerTypes:
      - field
      - architecturalDecision
  - controlId: IA-5
    name: Secrets and Authenticator Management
    description: >
      Services must document how secrets and authenticators are stored, rotated,
      and accessed through approved mechanisms.
    externalReference: https://frontlinetechnologi.sharepoint.com/:x:/t/group_tm_security/IQBmLXKoFH1oQa8uFOhb7BinAfyTil7lH7qiiLYkcnF8MG0
    appliesTo:
      - rbb.service.general
    relatedConcern: secrets-management
    requirementMode: conditional
    naAllowed: true
    applicability:
