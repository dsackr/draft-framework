schemaVersion: "1.0"
id: framework.nist-csf
type: compliance_framework
name: NIST Cybersecurity Framework
description: >
  Initial NIST Cybersecurity Framework (CSF) 2.0 control pack scoped to the
  outcomes that can be meaningfully answered by DRAFT objects.
version: 2.0.0
catalogStatus: stub
lifecycleStatus: invest
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
tags:
  - compliance
  - nist
  - starter-pack
frameworkKind: common
notes: >
  These entries are DRAFT applicability mappings for public NIST CSF 2.0
  outcomes. They intentionally cover only the subset of CSF outcomes that can
  be answered by RBBs, SDMs, and related architecture objects.
controls:
