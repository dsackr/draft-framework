<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DRAFT Framework Toolkit</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --page: #0f172a;
      --panel: #111827;
      --card: #1e293b;
      --border: #334155;
      --muted: #94a3b8;
      --text: #e2e8f0;
      --subtle: #cbd5e1;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--page);
      color: var(--text);
      font-family: "SF Pro Display", "Segoe UI", sans-serif;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 1px;
      background: var(--border);
    }
    .sidebar,
    .main {
      background: linear-gradient(180deg, rgba(15,23,42,0.98), rgba(17,24,39,0.98));
    }
    .sidebar {
      padding: 24px 20px;
      border-right: 1px solid rgba(51,65,85,0.7);
    }
    .sidebar h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.02em;
    }
    .sidebar p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .sidebar-stack {
      display: grid;
      gap: 18px;
    }
    .sidebar-block,
    .legend-block {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(51,65,85,0.8);
    }
    .legend-title {
      margin: 0 0 12px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .legend-list {
      display: grid;
      gap: 10px;
    }
    .legend-item,
    .current-filter {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--subtle);
      font-size: 13px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      flex: 0 0 auto;
    }
    .main {
      padding: 28px;
    }
    .view-shell {
      display: grid;
      gap: 22px;
    }
    .top-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .nav-button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(15,23,42,0.72);
      color: var(--text);
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }
    .nav-button:hover {
      border-color: rgba(56,189,248,0.55);
      transform: translateY(-1px);
    }
    .nav-button.active {
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.6);
      color: #dff7ff;
    }
    .nav-button:disabled {
      cursor: default;
      opacity: 0.45;
      transform: none;
    }
    .tab-row,
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .tab-button,
    .filter-button,
    .back-button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(30,41,59,0.78);
      color: var(--text);
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }
    .tab-button {
      padding: 12px 18px;
      background: rgba(15,23,42,0.82);
      font-weight: 600;
    }
    .tab-button:hover,
    .filter-button:hover,
    .back-button:hover {
      border-color: rgba(56,189,248,0.55);
      transform: translateY(-1px);
    }
    .tab-button.active,
    .filter-button.active {
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.6);
      color: #dff7ff;
    }
    .content-rows {
      display: grid;
      gap: 24px;
    }
    .content-row {
      display: grid;
      gap: 14px;
    }
    .content-row-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(51,65,85,0.72);
    }
    .content-row-title {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.02em;
    }
    .content-row-count {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }
    .object-card,
    .interaction-card,
    .decision-card,
    .empty-card,
    .header-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
    }
    .object-card {
      padding: 18px;
      display: grid;
      gap: 12px;
      cursor: pointer;
      min-height: 168px;
      transition: border-color 120ms ease, transform 120ms ease, box-shadow 120ms ease;
    }
    .object-card:hover {
      border-color: rgba(56,189,248,0.5);
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(2,6,23,0.22);
    }
    .object-card h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
    }
    .object-id {
      color: var(--muted);
      font-size: 12px;
      word-break: break-word;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(148,163,184,0.18);
      background: rgba(15,23,42,0.65);
      color: var(--subtle);
    }
    .catalog-approved { border-color: rgba(16,185,129,0.45); color: #d1fae5; }
    .catalog-draft { border-color: rgba(245,158,11,0.45); color: #fde68a; }
    .catalog-stub { border-color: rgba(148,163,184,0.35); color: #cbd5e1; }
    .ard-risk { border-color: rgba(245,158,11,0.45); color: #fde68a; }
    .ard-decision { border-color: rgba(59,130,246,0.45); color: #bfdbfe; }
    .ard-status { border-color: rgba(148,163,184,0.35); color: #cbd5e1; }
    .ps-badge {
      border-color: rgba(20,184,166,0.45);
      color: #99f6e4;
      background: rgba(20,184,166,0.12);
    }
    .saas-badge {
      border-color: rgba(168,85,247,0.45);
      color: #e9d5ff;
      background: rgba(168,85,247,0.14);
    }
    .appliance-badge {
      border-color: rgba(245,158,11,0.45);
      color: #fde68a;
      background: rgba(245,158,11,0.14);
    }
    .info-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      background: rgba(59,130,246,0.18);
      border: 1px solid rgba(59,130,246,0.38);
      color: #bfdbfe;
      width: fit-content;
    }
    .intent-ha {
      border-color: rgba(16,185,129,0.45);
      color: #bbf7d0;
      background: rgba(16,185,129,0.14);
    }
    .intent-sa {
      border-color: rgba(245,158,11,0.45);
      color: #fde68a;
      background: rgba(245,158,11,0.14);
    }
    .ard-link {
      color: #93c5fd;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: rgba(147,197,253,0.45);
      text-underline-offset: 2px;
    }
    .ard-link:hover { color: #dbeafe; }
    .risk-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      background: rgba(245,158,11,0.18);
      border: 1px solid rgba(245,158,11,0.38);
      color: #fde68a;
      cursor: pointer;
      width: fit-content;
    }
    .risk-badge:hover { border-color: rgba(245,158,11,0.62); }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .data-table th,
    .data-table td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(51,65,85,0.75);
      text-align: left;
      vertical-align: top;
    }
    .data-table th {
      color: var(--muted);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .ard-detail-card {
      display: grid;
      gap: 16px;
      padding: 22px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
    }
    .ard-detail-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }
    .ard-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--subtle);
      font-size: 13px;
    }
    .ard-section {
      display: grid;
      gap: 8px;
    }
    .ard-section h3 {
      margin: 0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .ard-section p,
    .ard-section div {
      margin: 0;
      color: var(--subtle);
      line-height: 1.6;
    }
    .view-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .detail-layout {
      display: grid;
      gap: 22px;
    }
    .detail-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .detail-tab {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(30,41,59,0.78);
      color: var(--text);
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
    }
    .detail-tab.active {
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.6);
      color: #dff7ff;
    }
    .detail-panel[hidden] {
      display: none !important;
    }
    .header-card {
      padding: 22px;
      display: grid;
      gap: 14px;
    }
    .header-top {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }
    .header-title h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
    }
    .header-title .object-id {
      margin-top: 6px;
      font-size: 13px;
    }
    .header-description {
      color: var(--subtle);
      line-height: 1.6;
      font-size: 14px;
    }
    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }
    .action-button {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(15,23,42,0.82);
      color: var(--text);
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
      text-decoration: none;
    }
    .action-button:hover {
      border-color: rgba(56,189,248,0.55);
      transform: translateY(-1px);
    }
    .action-button.secondary {
      background: rgba(30,41,59,0.82);
    }
    .owner-line {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      color: var(--muted);
      font-size: 13px;
    }
    .middle-grid {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 22px;
      align-items: start;
    }
    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }
    .section-card h3 {
      margin: 0 0 14px;
      font-size: 16px;
    }
    #detail-cy {
      width: 100%;
      height: 350px;
      border-radius: 14px;
      border: 1px solid rgba(51,65,85,0.85);
      background: #0f172a;
    }
    .interactions-list {
      display: grid;
      gap: 12px;
      max-height: 350px;
      overflow: auto;
      padding-right: 4px;
    }
    .interaction-card {
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .requirement-card,
    .odc-card {
      padding: 14px;
      display: grid;
      gap: 10px;
      background: rgba(15,23,42,0.55);
      border: 1px solid rgba(51,65,85,0.85);
      border-radius: 14px;
    }
    .interaction-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .interaction-name {
      font-weight: 600;
      line-height: 1.4;
    }
    .interaction-notes {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .interaction-ref {
      color: #7dd3fc;
      font-size: 12px;
      word-break: break-word;
    }
    .requirement-name,
    .odc-name {
      font-weight: 600;
      line-height: 1.4;
    }
    .requirement-name {
      font-size: 17px;
      color: var(--text);
    }
    .requirement-description,
    .requirement-rationale,
    .mechanism-line,
    .odc-control-line {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .requirement-rationale-label,
    .mechanism-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .mechanism-list {
      display: grid;
      gap: 10px;
    }
    .mechanism-item {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(51,65,85,0.85);
      background: rgba(15,23,42,0.45);
      display: grid;
      gap: 6px;
    }
    .mechanism-text {
      color: var(--subtle);
      font-size: 13px;
      line-height: 1.5;
    }
    .mechanism-example {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .control-badges,
    .odc-control-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .control-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      color: #93c5fd;
    }
    .control-badge.conditional {
      background: #4a3414;
      border-color: #f59e0b;
      color: #fcd34d;
    }
    .control-mode {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.32);
      color: inherit;
      font-size: 11px;
      white-space: nowrap;
    }
    .section-stack {
      display: grid;
      gap: 12px;
    }
    .topology-layout {
      display: grid;
      gap: 18px;
    }
    .topology-strip,
    .scaling-unit-box,
    .service-group-box,
    .deployment-target-cluster {
      background: rgba(15,23,42,0.78);
      border-radius: 18px;
    }
    .topology-strip {
      border: 1px solid var(--border);
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .topology-strip-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .topology-interaction {
      min-width: 120px;
      display: grid;
      gap: 6px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(51,65,85,0.8);
      background: rgba(30,41,59,0.9);
    }
    .topology-interaction-icon,
    .topology-node-icon {
      width: 96px;
      height: 96px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      background: rgba(249,115,22,0.18);
      color: #fdba74;
      border: 1px solid rgba(249,115,22,0.35);
    }
    .topology-interaction-icon.network {
      background: rgba(16,185,129,0.18);
      border-color: rgba(16,185,129,0.35);
      color: #bbf7d0;
    }
    .topology-interaction-icon.storage {
      background: rgba(59,130,246,0.18);
      border-color: rgba(59,130,246,0.35);
      color: #bfdbfe;
    }
    .topology-interaction-icon.compute {
      background: rgba(168,85,247,0.18);
      border-color: rgba(168,85,247,0.35);
      color: #e9d5ff;
    }
    .topology-interaction-icon.cloud {
      background: rgba(148,163,184,0.18);
      border-color: rgba(148,163,184,0.35);
      color: #e2e8f0;
    }
    .topology-scaling-units,
    .topology-unscoped-groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
      align-items: start;
    }
    .topology-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(51,65,85,0.85);
      border-radius: 14px;
      background: rgba(15,23,42,0.72);
    }
    .topology-filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .topology-filter-button {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(71,85,105,0.8);
      background: rgba(30,41,59,0.94);
      color: #e2e8f0;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    }
    .topology-filter-button.active {
      border-color: rgba(14,165,233,0.65);
      background: rgba(14,165,233,0.16);
      color: #bae6fd;
    }
    .topology-filter-help {
      color: var(--muted);
      font-size: 14px;
    }
    .scaling-unit-header,
    .deployment-target-header,
    .service-group-header,
    .service-group-section-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .scaling-unit-title,
    .deployment-target-title,
    .service-group-title,
    .service-group-section-title {
      font-size: 15px;
      font-weight: 700;
      color: #f8fafc;
    }
    .location-badge,
    .lane-label,
    .scaling-unit-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      background: rgba(15,23,42,0.7);
      border: 1px solid rgba(148,163,184,0.3);
      color: #e2e8f0;
    }
    .location-badge.aws {
      border-color: rgba(233,30,140,0.45);
      color: #fbcfe8;
    }
    .scaling-unit-content,
    .deployment-target-content,
    .service-group-content {
      display: grid;
      gap: 14px;
    }
    .deployment-target-columns {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }
    .topology-tier-column {
      display: grid;
      gap: 12px;
      min-width: 0;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(71,85,105,0.82);
      background: rgba(15,23,42,0.52);
    }
    .topology-tier-header {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(71,85,105,0.8);
      background: rgba(15,23,42,0.72);
      font-size: 14px;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: 0.03em;
    }
    .topology-tier-header.presentation {
      border-color: rgba(249,115,22,0.45);
      color: #fdba74;
    }
    .topology-tier-column:has(.topology-tier-header.presentation) {
      border-color: rgba(249,115,22,0.52);
      background: linear-gradient(180deg, rgba(249,115,22,0.24) 0%, rgba(249,115,22,0.12) 26%, rgba(15,23,42,0.68) 58%, rgba(15,23,42,0.54) 100%);
    }
    .topology-tier-header.application {
      border-color: rgba(20,184,166,0.45);
      color: #99f6e4;
    }
    .topology-tier-column:has(.topology-tier-header.application) {
      border-color: rgba(20,184,166,0.52);
      background: linear-gradient(180deg, rgba(20,184,166,0.24) 0%, rgba(20,184,166,0.12) 26%, rgba(15,23,42,0.68) 58%, rgba(15,23,42,0.54) 100%);
    }
    .topology-tier-header.data {
      border-color: rgba(59,130,246,0.45);
      color: #bfdbfe;
    }
    .topology-tier-column:has(.topology-tier-header.data) {
      border-color: rgba(59,130,246,0.52);
      background: linear-gradient(180deg, rgba(59,130,246,0.24) 0%, rgba(59,130,246,0.12) 26%, rgba(15,23,42,0.68) 58%, rgba(15,23,42,0.54) 100%);
    }
    .topology-tier-header.utility {

ility does this appliance provide?\",\n      \"rationale\": \"The capability is the reason the appliance exists in the architecture.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"capability\",\n          \"example\": \"capability: load-balancing\"\n        }\n      ]\n    },\n    {\n      \"id\": \"resilience-model\",\n      \"description\": \"What is the resilience model of this appliance \\u2014 is it inherently highly available, single instance, or clustered?\\n\",\n      \"rationale\": \"A blackbox appliance still needs an explicit answer for the resilience posture the adopter is depending on.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"resilienceModel\",\n          \"example\": \"Inherently highly available within the managed service control plane\"\n        }\n      ]\n    },\n    {\n      \"id\": \"network-placement\",\n      \"description\": \"Where does this appliance sit in the network topology?\",\n      \"rationale\": \"Placement defines exposure and traffic path.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"networkPlacement\",\n          \"example\": \"networkPlacement: public-facing\"\n        }\n      ]\n    },\n    {\n      \"id\": \"patching-ownership\",\n      \"description\": \"Who is responsible for firmware and software updates?\",\n      \"rationale\": \"A blackbox component still needs clear update ownership.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"patchingOwner\",\n          \"example\": \"patchingOwner: aws-managed\"\n        }\n      ]\n    },\n    {\n      \"id\": \"configurable-surface\",\n      \"description\": \"What configuration surface does the organization control on this appliance?\\n\",\n      \"rationale\": \"The object should capture what the adopter can actually configure rather than pretending the hidden host is visible.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"configurableSurface\",\n          \"example\": \"Listener rules, target groups, and TLS certificates are customer-managed\"\n        }\n      ]\n    },\n    {\n      \"id\": \"failure-domain\",\n      \"description\": \"What failure domain does this appliance introduce?\",\n      \"rationale\": \"Blackbox shared components can create broad impact boundaries that must be explicit.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"failureDomain\",\n          \"example\": \"Shared dependency for all traffic entering the protected application path\"\n        }\n      ]\n    },\n    {\n      \"id\": \"compliance-posture\",\n      \"description\": \"What compliance certifications does this appliance carry?\",\n      \"rationale\": \"Compliance posture must be explicit when the underlying implementation is opaque.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"complianceCerts\",\n          \"allowEmpty\": true,\n          \"example\": \"complianceCerts: [SOC2, ISO27001]\"\n        }\n      ]\n    }\n  ],\n  \"_source\": \"odcs/odc-appliance-abb.yaml\"\n}", "existsInCatalog": true}, {"id": "odc.saas-service", "name": "SaaS Service Object Definition Checklist", "type": "odc", "typeLabel": "ODC", "filterType": "odc", "category": "", "serviceCategory": "", "description": "Structured checklist of required questions and answers used to define a complete and correct SaaS Service. A SaaS Service is a vendor-managed offering that an organization subscribes to. Its underlying architecture is entirely blackbox to the adopter, so the object definition must focus on the capability consumed, the integration boundary, and the operational and compliance assurances available to the adopter.\n", "vers rocessing Agreement in place with this vendor?", "rationale": "A SaaS dependency that handles organizational data requires explicit contractual treatment.", "canBeSatisfiedBy": [{"mechanism": "field", "key": "dpaNotes", "example": "dpaNotes: DPA signed 2024-03, covers FERPA and COPPA"}]}, {"id": "compliance-certifications", "description": "What compliance certifications does the vendor carry?", "rationale": "Blackbox services need external attestations or certifications when internal architecture evidence is unavailable.", "canBeSatisfiedBy": [{"mechanism": "field", "key": "complianceCerts", "allowEmpty": true, "example": "complianceCerts: [SOC2 Type II, ISO27001]"}]}, {"id": "authentication-model", "description": "How does the organization authenticate to this service?", "rationale": "SaaS consumption must define how identities are established and federated into the vendor platform.", "canBeSatisfiedBy": [{"mechanism": "field", "key": "authenticationModel", "example": "authenticationModel: saml"}]}, {"id": "audit-visibility", "description": "What logging, audit, or event visibility does the consumer have into this service?", "rationale": "Blackbox services must still define what operational and security evidence is visible to the adopter.", "canBeSatisfiedBy": [{"mechanism": "architecturalDecision", "key": "auditVisibility"}]}, {"id": "health-status-visibility", "description": "How can the consumer observe the health, status, or incident state of this service?", "rationale": "Vendor-managed services require an explicit answer for how outages or degradations are detected by the adopter.", "canBeSatisfiedBy": [{"mechanism": "field", "key": "incidentNotificationProcess", "example": "incidentNotificationProcess: Vendor status page plus email incident notifications"}, {"mechanism": "architecturalDecision", "key": "healthStatusVisibility"}]}, {"id": "failure-domain", "description": "What is the failure domain of this SaaS dependency?", "rationale": "Shared vendor dependencies can create large failure domains and that scope must be explicit.", "canBeSatisfiedBy": [{"mechanism": "architecturalDecision", "key": "failureDomain"}]}, {"id": "vendor-sla", "description": "What is the vendor's SLA commitment?", "rationale": "SaaS service quality must be defined in terms available to the adopter, not hidden internal design.", "canBeSatisfiedBy": [{"mechanism": "field", "key": "vendorSLA", "example": "vendorSLA: 99.99% uptime, 24x7 support"}]}], "satisfiesODC": [], "appliesTo": {"type": "rbb", "category": "service", "serviceCategory": "saas"}, "inherits": "", "scalingUnits": [], "serviceGroups": [], "appliesPattern": "", "architectureRisksAndDecisions": [], "affectedComponent": "", "impact": "", "mitigationPath": "", "decisionRationale": "", "relatedARDs": [], "linkedSDM": "", "frameworkKind": "", "defaultSelection": false, "controlCount": 0, "hasRiskRef": false, "outboundRefs": [], "referencedBy": [], "editorSchema": {"requiredFields": ["schemaVersion", "id", "type", "name", "description", "requirements"], "optionalFields": ["version", "catalogStatus", "lifecycleStatus", "owner", "tags", "appliesTo", "inherits"], "fieldTypes": {"owner": "dict", "tags": "list", "appliesTo": "dict", "requirements": "list"}, "enumFields": {"catalogStatus": ["stub", "draft", "approved"], "lifecycleStatus": ["pre-invest", "invest", "maintain", "disinvest", "exit"]}, "enumListFields": {}, "collectionSchemas": {"requirements": "requirement"}, "schemaPath": "schemas/odc.schema.yaml"}, "detail": "{\n  \"schemaVersion\": \"1.0\",\n  \"id\": \"odc.saas-service\",\n  \"type\": \"odc\",\n  \"name\": \"SaaS Service Object Definition Checklist\",\n  \"description\": \"Structured checklist of required questions and answers used to define a complete and correct SaaS Service. A SaaS Service is a vendor-managed offering that an organization subscribes to. Its underlying architecture is entirely blackbox to the adopter, so the object definition must focus on the capability consumed, the integration boundary, and the operational and compliance assurances available to the adopter.\\n\",\n  \"version\": \"1.0.0\",\n  \"catalogStatus\": \"approved\",\n  \"lifecycleStatus\": \"invest\",\n  \"owner\": {\n    \"team\": \"cloud-architecture\",\n    \"contact\": \"cloud-architecture@example.com\"\n  },\n  \"tags\": [\n    \"saas\",\n    \"checklist\",\n    \"definition\"\n  ],\n  \"appliesTo\": {\n    \"type\": \"rbb\",\n    \"category\": \"service\",\n    \"serviceCategory\": \"saas\"\n  },\n  \"requirements\": [\n    {\n      \"id\": \"function\",\n      \"description\": \"What capability does this SaaS service provide?\",\n      \"rationale\": \"Capability is the core architectural reason the service exists.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"capability\",\n          \"example\": \"capability: waf\"\n        }\n      ]\n    },\n    {\n      \"id\": \"data-boundary\",\n      \"description\": \"Does data leave the infrastructure boundary through this service?\",\n      \"rationale\": \"The data boundary determines whether the service is modeled as SaaS and what governance obligations follow.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"dataLeavesInfrastructure\",\n          \"example\": \"dataLeavesInfrastructure: true\"\n        }\n      ]\n    },\n    {\n      \"id\": \"data-residency\",\n      \"description\": \"What are the vendor's data residency commitments? Critical for FERPA, HIPAA-adjacent, and PII data.\\n\",\n      \"rationale\": \"Data residency commitments are required before regulated or sensitive workloads can depend on a blackbox vendor platform.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"dataResidencyCommitment\",\n          \"example\": \"dataResidencyCommitment: US-only, AWS us-east-1\"\n        }\n      ]\n    },\n    {\n      \"id\": \"data-processing-agreement\",\n      \"description\": \"Is a Data Processing Agreement in place with this vendor?\",\n      \"rationale\": \"A SaaS dependency that handles organizational data requires explicit contractual treatment.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"dpaNotes\",\n          \"example\": \"dpaNotes: DPA signed 2024-03, covers FERPA and COPPA\"\n        }\n      ]\n    },\n    {\n      \"id\": \"compliance-certifications\",\n      \"description\": \"What compliance certifications does the vendor carry?\",\n      \"rationale\": \"Blackbox services need external attestations or certifications when internal architecture evidence is unavailable.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"complianceCerts\",\n          \"allowEmpty\": true,\n          \"example\": \"complianceCerts: [SOC2 Type II, ISO27001]\"\n        }\n      ]\n    },\n    {\n      \"id\": \"authentication-model\",\n      \"description\": \"How does the organization authenticate to this service?\",\n      \"rationale\": \"SaaS consumption must define how identities are established and federated into the vendor platform.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"authenticationModel\",\n          \"example\": \"authenticationModel: saml\"\n        }\n      ]\n    },\n    {\n      \"id\": \"audit-visibility\",\n      \"description\": \"What logging, audit, or event visibility does the consumer have into this service?\",\n      \"rationale\": \"Blackbox services must still define what operational and security evidence is visible to the adopter.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"auditVisibility\"\n        }\n      ]\n    },\n    {\n      \"id\": \"health-status-visibility\",\n      \"description\": \"How can the consumer observe the health, status, or incident state of this service?\",\n      \"rationale\": \"Vendor-managed services require an explicit answer for how outages or degradations are detected by the adopter.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"incidentNotificationProcess\",\n          \"example\": \"incidentNotificationProcess: Vendor status page plus email incident notifications\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"healthStatusVisibility\"\n        }\n      ]\n    },\n    {\n      \"id\": \"failure-domain\",\n      \"description\": \"What is the failure domain of this SaaS dependency?\",\n      \"rationale\": \"Shared vendor dependencies can create large failure domains and that scope must be explicit.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"failureDomain\"\n        }\n      ]\n    },\n    {\n      \"id\": \"vendor-sla\",\n      \"description\": \"What is the vendor's SLA commitment?\",\n      \"rationale\": \"SaaS service quality must be defined in terms available to the adopter, not hidden internal design.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"vendorSLA\",\n          \"example\": \"vendorSLA: 99.99% uptime, 24x7 support\"\n        }\n      ]\n    }\n  ],\n  \"_source\": \"odcs/odc-saas-service.yaml\"\n}", "existsInCatalog": true}, {"id": "odc.compliance-framework", "name": "Compliance Framework ODC", "type": "odc", "typeLabel": "ODC", "filterType": "odc", "category": "", "serviceCategory": "", "description": "Structured checklist for defining a compliance framework in DRAFT. This ODC is aimed at translating control source material into DRAFT-specific control semantics rather than restating the underlying framework text.\n", "version": "1.0.0", "catalogStatus": "draft", "lifecycleStatus": "invest", "status": "", "product": "", "runsOn": "", "subtype": "", "vendor": "", "productName": "", "productVersion": "", "classification": "", "platformDependency": "", "addressesConcerns": [], "configurations": [], "deploymentConfigurations": [], "capability": "", "networkPlacement": "", "patchingOwner": "", "complianceCerts": [], "dataLeavesInfrastructure": null, "dataResidencyCommitment": "", "dpaNotes": "", "vendorSLA": "", "authenticationModel": "", "incidentNotificationProcess": "", "owner": {"team": "cloud-architecture", "contact": "cloud-architecture@example.com"}, "shape": "barrel", "color": "#10b981", "source": "odcs/odc.compliance-framework.yaml", "tags": ["odc", "compliance"], "ardCategory": "", "internalComponents": [], "externalInteractions": [], "architecturalDecisions": {}, "requirements": [{"id": "control-identity", "description": "Every control must declare the source control identifier and the friendly control name used by the organization or source framework.\n", "rationale": "AI or human authors can usually extract these fields directly from a source spreadsheet, document, or user interview.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}, {"id": "authoritative-source", "description": "Every control must carry an authoritative source link so the full control text can be reviewed outside DRAFT.\n", "rationale": "DRAFT should not restate the source framework text when the original control definition can be linked directly.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}, {"id": "requirement-mode", "description": "Every control must declare whether it is always required or only applies conditionally.\n", "rationale": "DRAFT must distinguish mandatory frameworks such as organization-wide controls from conditional frameworks such as TX-RAMP, PCI, or HIPAA.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}, {"id": "draft-applicability", "description": "Every control must declare which DRAFT object scopes it can apply to.\n", "rationale": "Source security specialists may know the control, but DRAFT needs an architecture-specific applicability mapping to place the control onto the correct ODCs and objects.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}, {"id": "valid-answer-types", "description": "Every control must declare which DRAFT answer mechanisms are valid for satisfying the control.\n", "rationale": "Controls are only useful in DRAFT if the framework tells the architect whether the answer should come from an ABB, ABB configuration, deployment configuration, external interaction, direct field, or architectural decision.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}, {"id": "conditional-applicability", "description": "Conditional controls must explicitly declare N/A handling and the applicability metadata used to decide when the control is in scope.\n", "rationale": "Conditional frameworks should not burden users with controls that are out of scope for the product or deployment being defined.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}, {"id": "related-concern", "description": "When the control refines an existing ODC concern, it should identify that related concern explicitly.\n", "rationale": "This helps DRAFT merge the control into the effective checklist instead of rendering it as an orphaned control.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}], "satisfiesODC": [], "appliesTo": {"type": "compliance_framework"}, "inherits": "", "scalingUnits": [], "serviceGroups": [], "appliesPattern": "", "architectureRisksAndDecisions": [], "affectedComponent": "", "impact": "", "mitigationPath": "", "decisionRationale": "", "relatedARDs": [], "linkedSDM": "", "frameworkKind": "", "defaultSelection": false, "controlCount": 0, "hasRiskRef": false, "outboundRefs": [], "referencedBy": [], "editorSchema": {"requiredFields": ["schemaVersion", "id", "type", "name", "description", "requirements"], "optionalFields": ["version", "catalogStatus", "lifecycleStatus", "owner", "tags", "appliesTo", "inherits"], "fieldTypes": {"owner": "dict", "tags": "list", "appliesTo": "dict", "requirements": "list"}, "enumFields": {"catalogStatus": ["stub", "draft", "approved"], "lifecycleStatus": ["pre-invest", "invest", "maintain", "disinvest", "exit"]}, "enumListFields": {}, "collectionSchemas": {"requirements": "requirement"}, "schemaPath": "schemas/odc.schema.yaml"}, "detail": "{\n  \"schemaVersion\": \"1.0\",\n  \"id\": \"odc.compliance-framework\",\n  \"type\": \"odc\",\n  \"name\": \"Compliance Framework ODC\",\n  \"description\": \"Structured checklist for defining a compliance framework in DRAFT. This ODC is aimed at translating control source material into DRAFT-specific control semantics rather than restating the underlying framework text.\\n\",\n  \"version\": \"1.0.0\",\n  \"catalogStatus\": \"draft\",\n  \"lifecycleStatus\": \"invest\",\n  \"owner\": {\n    \"team\": \"cloud-architecture\",\n    \"contact\": \"cloud-architecture@example.com\"\n  },\n  \"tags\": [\n    \"odc\",\n    \"compliance\"\n  ],\n  \"appliesTo\": {\n    \"type\": \"compliance_framework\"\n  },\n  \"requirements\": [\n    {\n      \"id\": \"control-identity\",\n      \"description\": \"Every control must declare the source control identifier and the friendly control name used by the organization or source framework.\\n\",\n      \"rationale\": \"AI or human authors can usually extract these fields directly from a source spreadsheet, document, or user interview.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controls\"\n        }\n      ]\n    },\n    {\n      \"id\": \"authoritative-source\",\n      \"description\": \"Every control must carry an authoritative source link so the full control text can be reviewed outside DRAFT.\\n\",\n      \"rationale\": \"DRAFT should not restate the source framework text when the original control definition can be linked directly.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controls\"\n        }\n      ]\n    },\n    {\n      \"id\": \"requirement-mode\",\n      \"description\": \"Every control must declare whether it is always required or only applies conditionally.\\n\",\n      \"rationale\": \"DRAFT must distinguish mandatory frameworks such as organization-wide controls from conditional frameworks such as TX-RAMP, PCI, or HIPAA.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controls\"\n        }\n      ]\n    },\n    {\n      \"id\": \"draft-applicability\",\n      \"description\": \"Every control must declare which DRAFT object scopes it can apply to.\\n\",\n      \"rationale\": \"Source security specialists may know the control, but DRAFT needs an architecture-specific applicability mapping to place the control onto the correct ODCs and objects.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controls\"\n        }\n      ]\n    },\n    {\n      \"id\": \"valid-answer-types\",\n      \"description\": \"Every control must declare which DRAFT answer mechanisms are valid for satisfying the control.\\n\",\n      \"rationale\": \"Controls are only useful in DRAFT if the framework tells the architect whether the answer should come from an ABB, ABB configuration, deployment configuration, external interaction, direct field, or architectural decision.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controls\"\n        }\n      ]\n    },\n    {\n      \"id\": \"conditional-applicability\",\n      \"description\": \"Conditional controls must explicitly declare N/A handling and the applicability metadata used to decide when the control is in scope.\\n\",\n      \"rationale\": \"Conditional frameworks should not burden users with controls that are out of scope for the product or deployment being defined.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controls\"\n        }\n      ]\n    },\n    {\n      \"id\": \"related-concern\",\n      \"description\": \"When the control refines an existing ODC concern, it should identify that related concern explicitly.\\n\",\n      \"rationale\": \"This helps DRAFT merge the control into the effective checklist instead of rendering it as an orphaned control.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controls\"\n        }\n      ]\n    }\n  ],\n  \"_source\": \"odcs/odc.compliance-framework.yaml\"\n}", "existsInCatalog": true}, {"id": "odc.host", "name": "Host Object Definition Checklist", "type": "odc", "typeLabel": "ODC", "filterType": "odc", "category": "", "serviceCategory": "", "description": "Structured checklist of required questions and answers used to define a complete and correct host RBB.", "version": "3.0.0", "catalogStatus": "approved", "lifecycleStatus": "maintain", "status": "", "product": "", "runsOn": "", "subtype": "", "vendor": "", "productName": "", "productVersion": "", "classification": "", "platformDependency": "", "addressesConcerns": [], "configurations": [], "deploymentConfigurations": [], "capability": "", "networkPlacement": "", "patchingOwner": "", "complianceCerts": [], "dataLeavesInfrastructure": null, "dataResidencyCommitment": "", "dpaNotes": "", "vendorSLA": "", "authenticationModel": "", "incidentNotificationProcess": "", "owner": {"team": "cloud-architecture", "contact": "cloud-architecture@example.com"}, "shape": "barrel", "color": "#3b82f6", "source": "odcs/odc.host.yaml", "tags": ["host", "checklist", "definition"], "ardCategory": "", "internalComponents": [], "externalInteractions": [], "architecturalDecisions": {}, "requirements": [{"id": "operating-system", "description": "The plicit.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"hardwareAbb\",\n          \"example\": \"hardwareAbb: abb.hardware.amazon-ec2-standard\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"authentication\",\n      \"description\": \"The host must address how administrators and services authenticate to the platform.\",\n      \"rationale\": \"Identity control is a baseline host requirement because unmanaged access breaks supportability and auditability.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"authentication\"\n          },\n          \"example\": \"Active Directory or another enterprise identity platform.\"\n        },\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"concern\": \"authentication\"\n          },\n          \"example\": \"An ABB installed locally that provides host authentication behavior.\"\n        },\n        {\n          \"mechanism\": \"abbConfiguration\",\n          \"criteria\": {\n            \"concern\": \"authentication\"\n          },\n          \"example\": \"An Operating System ABB configuration that defines the authentication model.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"authenticationApproach\",\n          \"example\": \"A documented local or federated authentication model when the dependency is not expressed as a platform interaction.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"log-management\",\n      \"description\": \"The host must address how logs leave the host and reach an operationally supported logging destination.\",\n      \"rationale\": \"Logging is required for troubleshooting, security response, and evidentiary review.\",\n      \"canBeSatisfiedBy\": [\n lfare-monitoring\"\n          },\n          \"example\": \"An ABB configuration that enables local health telemetry or metrics export.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"healthWelfareMonitoringApproach\",\n          \"example\": \"A documented explanation of the host monitoring pattern when the implementation is not captured directly.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"security-monitoring\",\n      \"description\": \"The host must address endpoint security or runtime security monitoring.\",\n      \"rationale\": \"Hosts must show how they are protected and observed by a security control plane.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"security\"\n          },\n          \"example\": \"CrowdStrike Falcon Platform or Wiz Cloud Security.\"\n        },\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"concern\": \"security-monitoring\"\n          },\n          \"example\": \"An installed ABB that provides endpoint or runtime security monitoring.\"\n        },\n        {\n          \"mechanism\": \"abbConfiguration\",\n          \"criteria\": {\n            \"concern\": \"security-monitoring\"\n          },\n          \"example\": \"An ABB configuration that enables local security telemetry or runtime protection behavior.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"securityMonitoringApproach\",\n          \"example\": \"A documented statement of the host security monitoring pattern.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"patch-management\",\n      \"description\": \"The host must address how patching is orchestrated and what operational mechanism applies updates.\",\n      \"rationale\": uestions and answers used to define a complete and correct software distribution manifest.", "version": "1.0.0", "catalogStatus": "approved", "lifecycleStatus": "invest", "status": "", "product": "", "runsOn": "", "subtype": "", "vendor": "", "productName": "", "productVersion": "", "classification": "", "platformDependency": "", "addressesConcerns": [], "configurations": [], "deploymentConfigurations": [], "capability": "", "networkPlacement": "", "patchingOwner": "", "complianceCerts": [], "dataLeavesInfrastructure": null, "dataResidencyCommitment": "", "dpaNotes": "", "vendorSLA": "", "authenticationModel": "", "incidentNotificationProcess": "", "owner": {"team": "cloud-architecture", "contact": "cloud-architecture@example.com"}, "shape": "barrel", "color": "#10b981", "source": "odcs/odc.sdm.yaml", "tags": ["sdm", "checklist", "definition"], "ardCategory": "", "internalComponents": [], "externalInteractions": [], "architecturalDecisions": {}, "requirements": [{"id": "ra-conformance", "description": "The SDM must reference a valid RA ID or explicitly document that no applicable RA exists yet.", "rationale": "Connecting deployments to patterns enables governance discoverability and impact analysis.", "canBeSatisfiedBy": [{"mechanism": "field", "key": "appliesPattern", "example": "ra.dotnet.three-tier.ha"}, {"mechanism": "architecturalDecision", "key": "noApplicablePattern", "example": "No applicable RA exists yet for this deployment shape"}], "minimumSatisfactions": 1}, {"id": "service-groups", "description": "The SDM must declare the service groups that make up the deployed product.", "rationale": "A deployment manifest is incomplete until the real deployed service group structure is explicit.", "canBeSatisfiedBy": [{"mechanism": "internalComponent", "criteria": {"role": "service-group"}, "example": "Frontend UI, Data Services, Shared Event Processing Services"}], "minimumSatisfactions": 1}, {"id": "deployment-targets", "description": "Every service group must dec ibility", "description": "How can the consumer observe the health, status, or incident state of this service?", "rationale": "Vendor-managed services require an explicit answer for how outages or degradations are detected by the adopter.", "canBeSatisfiedBy": [{"mechanism": "field", "key": "incidentNotificationProcess", "example": "incidentNotificationProcess: Vendor status page plus email incident notifications"}, {"mechanism": "architecturalDecision", "key": "healthStatusVisibility"}]}, {"id": "failure-domain", "description": "What is the failure domain of this SaaS dependency?", "rationale": "Shared vendor dependencies can create large failure domains and that scope must be explicit.", "canBeSatisfiedBy": [{"mechanism": "architecturalDecision", "key": "failureDomain"}]}, {"id": "vendor-sla", "description": "What is the vendor's SLA commitment?", "rationale": "SaaS service quality must be defined in terms available to the adopter, not hidden internal design.", "canBeSatisfiedBy": [{"mechanism": "field", "key": "vendorSLA", "example": "vendorSLA: 99.99% uptime, 24x7 support"}]}], "satisfiesODC": [], "appliesTo": {"type": "rbb", "category": "service", "serviceCategory": "saas"}, "inherits": "", "scalingUnits": [], "serviceGroups": [], "appliesPattern": "", "architectureRisksAndDecisions": [], "affectedComponent": "", "impact": "", "mitigationPath": "", "decisionRationale": "", "relatedARDs": [], "linkedSDM": "", "frameworkKind": "", "defaultSelection": false, "controlCount": 0, "hasRiskRef": false, "outboundRefs": [], "referencedBy": [], "editorSchema": {"requiredFields": ["schemaVersion", "id", "type", "name", "description", "requirements"], "optionalFields": ["version", "catalogStatus", "lifecycleStatus", "owner", "tags", "appliesTo", "inherits"], "fieldTypes": {"owner": "dict", "tags": "list", "appliesTo": "dict", "requirements": "list"}, "enumFields": {"catalogStatus": ["stub", "draft", "approved"], "lifecycleStatus": ["pre-invest", "invest", "maintain", "disinv ture: true\"\n        }\n      ]\n    },\n    {\n      \"id\": \"data-residency\",\n      \"description\": \"What are the vendor's data residency commitments? Critical for FERPA, HIPAA-adjacent, and PII data.\\n\",\n      \"rationale\": \"Data residency commitments are required before regulated or sensitive workloads can depend on a blackbox vendor platform.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"dataResidencyCommitment\",\n          \"example\": \"dataResidencyCommitment: US-only, AWS us-east-1\"\n        }\n      ]\n    },\n    {\n      \"id\": \"data-processing-agreement\",\n      \"description\": \"Is a Data Processing Agreement in place with this vendor?\",\n      \"rationale\": \"A SaaS dependency that handles organizational data requires explicit contractual treatment.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"dpaNotes\",\n          \"example\": \"dpaNotes: DPA signed 2024-03, covers FERPA and COPPA\"\n        }\n      ]\n    },\n    {\n      \"id\": \"compliance-certifications\",\n      \"description\": \"What compliance certifications does the vendor carry?\",\n      \"rationale\": \"Blackbox services need external attestations or certifications when internal architecture evidence is unavailable.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"complianceCerts\",\n          \"allowEmpty\": true,\n          \"example\": \"complianceCerts: [SOC2 Type II, ISO27001]\"\n        }\n      ]\n    },\n    {\n      \"id\": \"authentication-model\",\n      \"description\": \"How does the organization authenticate to this service?\",\n      \"rationale\": \"SaaS consumption must define how identities are established and federated into the vendor platform.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"authenticationModel\",\n          \"example\": \"authenticationModel: saml\"\n        }\n      ]\n    },\n    {\n      \"id\": \"audit-visibility\",\n      \"description\": \"What logging, audit, or event visibility does the consumer have into this service?\",\n      \"rationale\": \"Blackbox services must still define what operational and security evidence is visible to the adopter.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"auditVisibility\"\n        }\n      ]\n    },\n    {\n      \"id\": \"health-status-visibility\",\n      \"description\": \"How can the consumer observe the health, status, or incident state of this service?\",\n      \"rationale\": \"Vendor-managed services require an explicit answer for how outages or degradations are detected by the adopter.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"incidentNotificationProcess\",\n          \"example\": \"incidentNotificationProcess: Vendor status page plus email incident notifications\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"healthStatusVisibility\"\n        }\n      ]\n    },\n    {\n      \"id\": \"failure-domain\",\n      \"description\": \"What is the failure domain of this SaaS dependency?\",\n      \"rationale\": \"Shared vendor dependencies can create large failure domains and that scope must be explicit.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"failureDomain\"\n        }\n      ]\n    },\n    {\n      \"id\": \"vendor-sla\",\n      \"description\": \"What is the vendor's SLA commitment?\",\n      \"rationale\": \"SaaS service quality must be defined in terms available to the adopter, not hidden internal design.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"vendorSLA\",\n          \"example\": \"vendorSLA: 99.99% uptime, 24x7 support\"\n        }\n      ]\n    }\n  ],\n  \"_source\": \"odcs/odc-saas-service.yaml\"\n}", "existsInCatalog": true}, "odc.compliance-framework": {"id": "odc.compliance-framework", "name": "Compliance Framework ODC", "type": "odc", "typeLabel": "ODC", "filterType": "odc", "category": "", "serviceCategory": "", "description": "Structured checklist for defining a compliance framework in DRAFT. This ODC is aimed at translating control source material into DRAFT-specific control semantics rather than restating the underlying framework text.\n", "version": "1.0.0", "catalogStatus": "draft", "lifecycleStatus": "invest", "status": "", "product": "", "runsOn": "", "subtype": "", "vendor": "", "productName": "", "productVersion": "", "classification": "", "platformDependency": "", "addressesConcerns": [], "configurations": [], "deploymentConfigurations": [], "capability": "", "networkPlacement": "", "patchingOwner": "", "complianceCerts": [], "dataLeavesInfrastructure": null, "dataResidencyCommitment": "", "dpaNotes": "", "vendorSLA": "", "authenticationModel": "", "incidentNotificationProcess": "", "owner": {"team": "cloud-architecture", "contact": "cloud-architecture@example.com"}, "shape": "barrel", "color": "#10b981", "source": "odcs/odc.compliance-framework.yaml", "tags": ["odc", "compliance"], "ardCategory": "", "internalComponents": [], "externalInteractions": [], "architecturalDecisions": {}, "requirements": [{"id": "control-identity", "description": "Every control must declare the source control identifier and the friendly control name used by the organization or source framework.\n", "rationale": "AI or human authors can usually extract these fields directly from a source spreadsheet, document, or user interview.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}, {"id": "authoritative-source", "description": "Every control must carry an authoritative source link so the full control text can be reviewed outside DRAFT.\n", "rationale": "DRAFT should not restate the source framework text when the original control definition can be linked directly.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}, {"id": "requirement-mode", "description": "Every control must declare whether it is always required or only applies conditionally.\n", "rationale": "DRAFT must distinguish mandatory frameworks such as organization-wide controls from conditional frameworks such as TX-RAMP, PCI, or HIPAA.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}, {"id": "draft-applicability", "description": "Every control must declare which DRAFT object scopes it can apply to.\n", "rationale": "Source security specialists may know the control, but DRAFT needs an architecture-specific applicability mapping to place the control onto the correct ODCs and objects.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}, {"id": "valid-answer-types", "description": "Every control must declare which DRAFT answer mechanisms are valid for satisfying the control.\n", "rationale": "Controls are only useful in DRAFT if the framework tells the architect whether the answer should come from an ABB, ABB configuration, deployment configuration, external interaction, direct field, or architectural decision.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}, {"id": "conditional-applicability", "description": "Conditional controls must explicitly declare N/A handling and the applicability metadata used to decide when the control is in scope.\n", "rationale": "Conditional frameworks should not burden users with controls that are out of scope for the product or deployment being defined.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}, {"id": "related-concern", "description": "When the control refines an existing ODC concern, it should identify that related concern explicitly.\n", "rationale": "This helps DRAFT merge the control into the effective checklist instead of rendering it as an orphaned control.\n", "canBeSatisfiedBy": [{"mechanism": "field", "key": "controls"}]}], "satisfiesODC": [], "appliesTo": {"type": "compliance_framework"}, "inherits": "", "scalingUnits": [], "serviceGroups": [], "appliesPattern": "", "architectureRisksAndDecisions": [], "affectedComponent": "", "impact": "", "mitigationPath": "", "decisionRationale": "", "relatedARDs": [], "linkedSDM": "", "frameworkKind": "", "defaultSelection": false, "controlCount": 0, "hasRiskRef": false, "outboundRefs": [], "referencedBy": [], "editorSchema": {"requiredFields": ["schemaVersion", "id", "type", "name", "description", "requirements"], "optionalFields": ["version", "catalogStatus", "lifecycleStatus", "owner", "tags", "appliesTo", "inherits"], "fieldTypes": {"owner": "dict", "tags": "list", "appliesTo": "dict", "requirements": "list"}, "enumFields": {"catalogStatus": ["stub", "draft", "approved"], "lifecycleStatus": ["pre-invest", "invest", "maintain", "disinvest", "exit"]}, "enumListFields": {}, "collectionSchemas": {"requirements": "requirement"}, "schemaPath": "schemas/odc.schema.yaml"}, "detail": "{\n  \"schemaVersion\": \"1.0\",\n  \"id\": \"odc.compliance-framework\",\n  \"type\": \"odc\",\n  \"name\": \"Compliance Framework ODC\",\n  \"description\": \"Structured checklist for defining a compliance framework in DRAFT. This ODC is aimed at translating control source material into DRAFT-specific control semantics rather than restating the underlying framework text.\\n\",\n  \"version\": \"1.0.0\",\n  \"catalogStatus\": \"draft\",\n  \"lifecycleStatus\": \"invest\",\n  \"owner\": {\n    \"team\": \"cloud-architecture\",\n    \"contact\": \"cloud-architecture@example.com\"\n  },\n  \"tags\": [\n    \"odc\",\n    \"compliance\"\n  ],\n  \"appliesTo\": {\n    \"type\": \"compliance_framework\"\n  },\n  \"requirements\": [\n    {\n      \"id\": \"control-identity\",\n      \"description\": \"Every control must declare the source control identifier and the friendly control name used by the organization or source framework.\\n\",\n      \"rationale\": \"AI or human authors can usually extract these fields directly from a source spreadsheet, document, or user interview.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controls\"\n        }\n      ]\n    },\n    {\n      \"id\": \"authoritative-source\",\n      \"description\": \"Every control must carry an authoritative source link so the full control text can be reviewed outside DRAFT.\\n\",\n      \"rationale\": \"DRAFT should not restate the source framework text when the original control definition can be linked directly.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controls\"\n        }\n      ]\n    },\n    {\n      \"id\": \"requirement-mode\",\n      \"description\": \"Every control must declare whether it is always required or only applies conditionally.\\n\",\n      \"rationale\": \"DRAFT must distinguish mandatory frameworks such as organization-wide controls from conditional frameworks such as TX-RAMP, PCI, or HIPAA.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controls\"\n        }\n      ]\n    },\n    {\n      \"id\": \"draft-applicability\",\n      \"description\": \"Every control must declare which DRAFT object scopes it can apply to.\\n\",\n      \"rationale\": \"Source security specialists may know the control, but DRAFT needs an architecture-specific applicability mapping to place the control onto the correct ODCs and objects.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controls\"\n        }\n      ]\n    },\n    {\n      \"id\": \"valid-answer-types\",\n      \"description\": \"Every control must declare which DRAFT answer mechanisms are valid for satisfying the control.\\n\",\n      \"rationale\": table.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"monitoring\"\n          },\n          \"example\": \"Dynatrace, Nagios, or another host monitoring platform.\"\n        },\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"concern\": \"health-welfare-monitoring\"\n          },\n          \"example\": \"A locally installed ABB that exports host health telemetry.\"\n        },\n        {\n          \"mechanism\": \"abbConfiguration\",\n          \"criteria\": {\n            \"concern\": \"health-welfare-monitoring\"\n          },\n          \"example\": \"An ABB configuration that enables local health telemetry or metrics export.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"healthWelfareMonitoringApproach\",\n          \"example\": \"A documented explanation of the host monitoring pattern when the implementation is not captured directly.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"security-monitoring\",\n      \"description\": \"The host must address endpoint security or runtime security monitoring.\",\n      \"rationale\": \"Hosts must show how they are protected and observed by a security control plane.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"security\"\n          },\n          \"example\": \"CrowdStrike Falcon Platform or Wiz Cloud Security.\"\n        },\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"concern\": \"security-monitoring\"\n          },\n          \"example\": \"An installed ABB that provides endpoint or runtime security monitoring.\"\n        },\n        {\n          \"mechanism\": \"abbConfiguration\",\n          \"criteria\" iption\": \"The SDM must declare the service groups that make up the deployed product.\",\n      \"rationale\": \"A deployment manifest is incomplete until the real deployed service group structure is explicit.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"role\": \"service-group\"\n          },\n          \"example\": \"Frontend UI, Data Services, Shared Event Processing Services\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"deployment-targets\",\n      \"description\": \"Every service group must declare where it runs.\",\n      \"rationale\": \"Deployment reality is not complete until the execution boundary or target is explicit for each service group.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"deploymentTargets\",\n          \"example\": \"Service groups are placed in AWS Account - Team_Accelify_Prod\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"availability-requirement\",\n      \"description\": \"The product availability tier must be documented.\",\n      \"rationale\": \"Availability requirements justify deployment posture and inform operational support models.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"availabilityRequirement\",\n          \"example\": \"99.9%, business-hours, 24x7\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"additional-interactions\",\n      \"description\": \"Any external systems this product interacts with beyond what its component RBBs declare must be documented \\u2014 or explicitly stated as none.\",\n      \"rationale\": \"Product-specific integrations are invisible to the architecture without explicit declaration.\",\n      \"canBeSatisfiedBy\": [\n        {\n
