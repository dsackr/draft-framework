<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DRAFT Framework Toolkit</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --page: #0f172a;
      --panel: #111827;
      --card: #1e293b;
      --border: #334155;
      --muted: #94a3b8;
      --text: #e2e8f0;
      --subtle: #cbd5e1;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--page);
      color: var(--text);
      font-family: "SF Pro Display", "Segoe UI", sans-serif;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 1px;
      background: var(--border);
    }
    .sidebar,
    .main {
      background: linear-gradient(180deg, rgba(15,23,42,0.98), rgba(17,24,39,0.98));
    }
    .sidebar {
      padding: 24px 20px;
      border-right: 1px solid rgba(51,65,85,0.7);
    }
    .sidebar h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.02em;
    }
    .sidebar p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .sidebar-stack {
      display: grid;
      gap: 18px;
    }
    .sidebar-block,
    .legend-block {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(51,65,85,0.8);
    }
    .legend-title {
      margin: 0 0 12px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .legend-list {
      display: grid;
      gap: 10px;
    }
    .legend-item,
    .current-filter {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--subtle);
      font-size: 13px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      flex: 0 0 auto;
    }
    .main {
      padding: 28px;
    }
    .view-shell {
      display: grid;
      gap: 22px;
    }
    .top-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .nav-button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(15,23,42,0.72);
      color: var(--text);
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }
    .nav-button:hover {
      border-color: rgba(56,189,248,0.55);
      transform: translateY(-1px);
    }
    .nav-button.active {
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.6);
      color: #dff7ff;
    }
    .nav-button:disabled {
      cursor: default;
      opacity: 0.45;
      transform: none;
    }
    .tab-row,
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .tab-button,
    .filter-button,
    .back-button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(30,41,59,0.78);
      color: var(--text);
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }
    .tab-button {
      padding: 12px 18px;
      background: rgba(15,23,42,0.82);
      font-weight: 600;
    }
    .tab-button:hover,
    .filter-button:hover,
    .back-button:hover {
      border-color: rgba(56,189,248,0.55);
      transform: translateY(-1px);
    }
    .tab-button.active,
    .filter-button.active {
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.6);
      color: #dff7ff;
    }
    .content-rows {
      display: grid;
      gap: 24px;
    }
    .content-row {
      display: grid;
      gap: 14px;
    }
    .content-row-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(51,65,85,0.72);
    }
    .content-row-title {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.02em;
    }
    .content-row-count {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }
    .object-card,
    .interaction-card,
    .decision-card,
    .empty-card,
    .header-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
    }
    .object-card {
      padding: 18px;
      display: grid;
      gap: 12px;
      cursor: pointer;
      min-height: 168px;
      transition: border-color 120ms ease, transform 120ms ease, box-shadow 120ms ease;
    }
    .object-card:hover {
      border-color: rgba(56,189,248,0.5);
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(2,6,23,0.22);
    }
    .object-card h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
    }
    .object-id {
      color: var(--muted);
      font-size: 12px;
      word-break: break-word;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(148,163,184,0.18);
      background: rgba(15,23,42,0.65);
      color: var(--subtle);
    }
    .catalog-approved { border-color: rgba(16,185,129,0.45); color: #d1fae5; }
    .catalog-draft { border-color: rgba(245,158,11,0.45); color: #fde68a; }
    .catalog-stub { border-color: rgba(148,163,184,0.35); color: #cbd5e1; }
    .ard-risk { border-color: rgba(245,158,11,0.45); color: #fde68a; }
    .ard-decision { border-color: rgba(59,130,246,0.45); color: #bfdbfe; }
    .ard-status { border-color: rgba(148,163,184,0.35); color: #cbd5e1; }
    .ps-badge {
      border-color: rgba(20,184,166,0.45);
      color: #99f6e4;
      background: rgba(20,184,166,0.12);
    }
    .saas-badge {
      border-color: rgba(168,85,247,0.45);
      color: #e9d5ff;
      background: rgba(168,85,247,0.14);
    }
    .appliance-badge {
      border-color: rgba(245,158,11,0.45);
      color: #fde68a;
      background: rgba(245,158,11,0.14);
    }
    .info-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      background: rgba(59,130,246,0.18);
      border: 1px solid rgba(59,130,246,0.38);
      color: #bfdbfe;
      width: fit-content;
    }
    .intent-ha {
      border-color: rgba(16,185,129,0.45);
      color: #bbf7d0;
      background: rgba(16,185,129,0.14);
    }
    .intent-sa {
      border-color: rgba(245,158,11,0.45);
      color: #fde68a;
      background: rgba(245,158,11,0.14);
    }
    .ard-link {
      color: #93c5fd;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: rgba(147,197,253,0.45);
      text-underline-offset: 2px;
    }
    .ard-link:hover { color: #dbeafe; }
    .risk-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      background: rgba(245,158,11,0.18);
      border: 1px solid rgba(245,158,11,0.38);
      color: #fde68a;
      cursor: pointer;
      width: fit-content;
    }
    .risk-badge:hover { border-color: rgba(245,158,11,0.62); }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .data-table th,
    .data-table td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(51,65,85,0.75);
      text-align: left;
      vertical-align: top;
    }
    .data-table th {
      color: var(--muted);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .ard-detail-card {
      display: grid;
      gap: 16px;
      padding: 22px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
    }
    .ard-detail-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }
    .ard-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--subtle);
      font-size: 13px;
    }
    .ard-section {
      display: grid;
      gap: 8px;
    }
    .ard-section h3 {
      margin: 0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .ard-section p,
    .ard-section div {
      margin: 0;
      color: var(--subtle);
      line-height: 1.6;
    }
    .view-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .detail-layout {
      display: grid;
      gap: 22px;
    }
    .detail-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .detail-tab {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(30,41,59,0.78);
      color: var(--text);
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
    }
    .detail-tab.active {
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.6);
      color: #dff7ff;
    }
    .detail-panel[hidden] {
      display: none !important;
    }
    .header-card {
      padding: 22px;
      display: grid;
      gap: 14px;
    }
    .header-top {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }
    .header-title h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
    }
    .header-title .object-id {
      margin-top: 6px;
      font-size: 13px;
    }
    .header-description {
      color: var(--subtle);
      line-height: 1.6;
      font-size: 14px;
    }
    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }
    .action-button {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(15,23,42,0.82);
      color: var(--text);
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
      text-decoration: none;
    }
    .action-button:hover {
      border-color: rgba(56,189,248,0.55);
      transform: translateY(-1px);
    }
    .action-button.secondary {
      background: rgba(30,41,59,0.82);
    }
    .owner-line {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      color: var(--muted);
      font-size: 13px;
    }
    .middle-grid {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 22px;
      align-items: start;
    }
    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }
    .section-card h3 {
      margin: 0 0 14px;
      font-size: 16px;
    }
    #detail-cy {
      width: 100%;
      height: 350px;
      border-radius: 14px;
      border: 1px solid rgba(51,65,85,0.85);
      background: #0f172a;
    }
    .interactions-list {
      display: grid;
      gap: 12px;
      max-height: 350px;
      overflow: auto;
      padding-right: 4px;
    }
    .interaction-card {
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .requirement-card,
    .odc-card {
      padding: 14px;
      display: grid;
      gap: 10px;
      background: rgba(15,23,42,0.55);
      border: 1px solid rgba(51,65,85,0.85);
      border-radius: 14px;
    }
    .interaction-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .interaction-name {
      font-weight: 600;
      line-height: 1.4;
    }
    .interaction-notes {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .interaction-ref {
      color: #7dd3fc;
      font-size: 12px;
      word-break: break-word;
    }
    .requirement-name,
    .odc-name {
      font-weight: 600;
      line-height: 1.4;
    }
    .requirement-name {
      font-size: 17px;
      color: var(--text);
    }
    .requirement-description,
    .requirement-rationale,
    .mechanism-line,
    .odc-control-line {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .requirement-rationale-label,
    .mechanism-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .mechanism-list {
      display: grid;
      gap: 10px;
    }
    .mechanism-item {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(51,65,85,0.85);
      background: rgba(15,23,42,0.45);
      display: grid;
      gap: 6px;
    }
    .mechanism-text {
      color: var(--subtle);
      font-size: 13px;
      line-height: 1.5;
    }
    .mechanism-example {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .control-badges,
    .odc-control-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .control-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      color: #93c5fd;
    }
    .control-badge.conditional {
      background: #4a3414;
      border-color: #f59e0b;
      color: #fcd34d;
    }
    .control-mode {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.32);
      color: inherit;
      font-size: 11px;
      white-space: nowrap;
    }
    .section-stack {
      display: grid;
      gap: 12px;
    }
    .topology-layout {
      display: grid;
      gap: 18px;
    }
    .topology-strip,
    .scaling-unit-box,
    .service-group-box,
    .deployment-target-cluster {
      background: rgba(15,23,42,0.78);
      border-radius: 18px;
    }
    .topology-strip {
      border: 1px solid var(--border);
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .topology-strip-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .topology-interaction {
      min-width: 120px;
      display: grid;
      gap: 6px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(51,65,85,0.8);
      background: rgba(30,41,59,0.9);
    }
    .topology-interaction-icon,
    .topology-node-icon {
      width: 96px;
      height: 96px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      background: rgba(249,115,22,0.18);
      color: #fdba74;
      border: 1px solid rgba(249,115,22,0.35);
    }
    .topology-interaction-icon.network {
      background: rgba(16,185,129,0.18);
      border-color: rgba(16,185,129,0.35);
      color: #bbf7d0;
    }
    .topology-interaction-icon.storage {
      background: rgba(59,130,246,0.18);
      border-color: rgba(59,130,246,0.35);
      color: #bfdbfe;
    }
    .topology-interaction-icon.compute {
      background: rgba(168,85,247,0.18);
      border-color: rgba(168,85,247,0.35);
      color: #e9d5ff;
    }
    .topology-interaction-icon.cloud {
      background: rgba(148,163,184,0.18);
      border-color: rgba(148,163,184,0.35);
      color: #e2e8f0;
    }
    .topology-scaling-units,
    .topology-unscoped-groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
      align-items: start;
    }
    .topology-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(51,65,85,0.85);
      border-radius: 14px;
      background: rgba(15,23,42,0.72);
    }
    .topology-filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .topology-filter-button {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(71,85,105,0.8);
      background: rgba(30,41,59,0.94);
      color: #e2e8f0;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    }
    .topology-filter-button.active {
      border-color: rgba(14,165,233,0.65);
      background: rgba(14,165,233,0.16);
      color: #bae6fd;
    }
    .topology-filter-help {
      color: var(--muted);
      font-size: 14px;
    }
    .scaling-unit-header,
    .deployment-target-header,
    .service-group-header,
    .service-group-section-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .scaling-unit-title,
    .deployment-target-title,
    .service-group-title,
    .service-group-section-title {
      font-size: 15px;
      font-weight: 700;
      color: #f8fafc;
    }
    .location-badge,
    .lane-label,
    .scaling-unit-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      background: rgba(15,23,42,0.7);
      border: 1px solid rgba(148,163,184,0.3);
      color: #e2e8f0;
    }
    .location-badge.aws {
      border-color: rgba(233,30,140,0.45);
      color: #fbcfe8;
    }
    .scaling-unit-content,
    .deployment-target-content,
    .service-group-content {
      display: grid;
      gap: 14px;
    }
    .deployment-target-columns {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }
    .topology-tier-column {
      display: grid;
      gap: 12px;
      min-width: 0;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(71,85,105,0.82);
      background: rgba(15,23,42,0.52);
    }
    .topology-tier-header {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(71,85,105,0.8);
      background: rgba(15,23,42,0.72);
      font-size: 14px;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: 0.03em;
    }
    .topology-tier-header.presentation {
      border-color: rgba(249,115,22,0.45);
      color: #fdba74;
    }
    .topology-tier-column:has(.topology-tier-header.presentation) {
      border-color: rgba(249,115,22,0.52);
      background: linear-gradient(180deg, rgba(249,115,22,0.24) 0%, rgba(249,115,22,0.12) 26%, rgba(15,23,42,0.68) 58%, rgba(15,23,42,0.54) 100%);
    }
    .topology-tier-header.application {
      border-color: rgba(20,184,166,0.45);
      color: #99f6e4;
    }
    .topology-tier-column:has(.topology-tier-header.application) {
      border-color: rgba(20,184,166,0.52);
      background: linear-gradient(180deg, rgba(20,184,166,0.24) 0%, rgba(20,184,166,0.12) 26%, rgba(15,23,42,0.68) 58%, rgba(15,23,42,0.54) 100%);
    }
    .topology-tier-header.data {
      border-color: rgba(59,130,246,0.45);
      color: #bfdbfe;
    }
    .topology-tier-column:has(.topology-tier-header.data) {
      border-color: rgba(59,130,246,0.52);
      background: linear-gradient(180deg, rgba(59,130,246,0.24) 0%, rgba(59,130,246,0.12) 26%, rgba(15,23,42,0.68) 58%, rgba(15,23,42,0.54) 100%);
    }
    .topology-tier-header.utility {

ject Definition Checklist\",\n  \"description\": \"Structured checklist of required questions and answers used to define a complete and correct software distribution manifest.\",\n  \"version\": \"1.0.0\",\n  \"catalogStatus\": \"approved\",\n  \"lifecycleStatus\": \"invest\",\n  \"owner\": {\n    \"team\": \"cloud-architecture\",\n    \"contact\": \"cloud-architecture@example.com\"\n  },\n  \"tags\": [\n    \"sdm\",\n    \"checklist\",\n    \"definition\"\n  ],\n  \"appliesTo\": {\n    \"type\": \"software_distribution_manifest\"\n  },\n  \"requirements\": [\n    {\n      \"id\": \"ra-conformance\",\n      \"description\": \"The SDM must reference a valid RA ID or explicitly document that no applicable RA exists yet.\",\n      \"rationale\": \"Connecting deployments to patterns enables governance discoverability and impact analysis.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"appliesPattern\",\n          \"example\": \"ra.dotnet.three-tier.ha\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"noApplicablePattern\",\n          \"example\": \"No applicable RA exists yet for this deployment shape\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"service-groups\",\n      \"description\": \"The SDM must declare the service groups that make up the deployed product.\",\n      \"rationale\": \"A deployment manifest is incomplete until the real deployed service group structure is explicit.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"role\": \"service-group\"\n          },\n          \"example\": \"Frontend UI, Data Services, Shared Event Processing Services\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"deployment-targets\",\n      \"description\": \"Every service group must declare where it runs.\",\n      \"rationale\": \"Deployment reality is not complete until the execution boundary or target is explicit for each service group.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"deploymentTargets\",\n          \"example\": \"Service groups are placed in AWS Account - Team_Accelify_Prod\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"availability-requirement\",\n      \"description\": \"The product availability tier must be documented.\",\n      \"rationale\": \"Availability requirements justify deployment posture and inform operational support models.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"availabilityRequirement\",\n          \"example\": \"99.9%, business-hours, 24x7\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"additional-interactions\",\n      \"description\": \"Any external systems this product interacts with beyond what its component RBBs declare must be documented \\u2014 or explicitly stated as none.\",\n      \"rationale\": \"Product-specific integrations are invisible to the architecture without explicit declaration.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"any\"\n          },\n          \"example\": \"Product-specific SaaS integration, partner API\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"noAdditionalInteractions\",\n          \"example\": \"No additional interactions beyond component RBBs\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"data-classification\",\n      \"description\": \"The type of data this product stores or processes must be documented.\",\n      \"rationale\": \"Data classification dr me from an ABB, ABB configuration, deployment configuration, external interaction, direct field, or architectural decision.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controlSemantics\"\n        }\n      ]\n    },\n    {\n      \"id\": \"conditional-applicability\",\n      \"description\": \"Conditional controls must explicitly declare N/A handling and the applicability metadata used to decide when the control is in scope.\\n\",\n      \"rationale\": \"Conditional frameworks should not burden users with controls that are out of scope for the product or deployment being defined.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controlSemantics\"\n        }\n      ]\n    },\n    {\n      \"id\": \"related-concern\",\n      \"description\": \"When the control refines an existing ODC concern, it should identify that related concern explicitly.\\n\",\n      \"rationale\": \"This helps DRAFT merge the control into the effective checklist instead of rendering it as an orphaned control.\\n\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"controlSemantics\"\n        }\n      ]\n    }\n  ],\n  \"_source\": \"odcs/odc.compliance-profile.yaml\"\n}", "existsInCatalog": true}, "odc.drafting-session": {"id": "odc.drafting-session", "name": "Drafting Session Object Definition Checklist", "type": "odc", "typeLabel": "ODC", "filterType": "odc", "category": "", "serviceCategory": "", "description": "Structured checklist used to capture partial architecture-authoring sessions, generated outputs, and unresolved follow-up questions in a machine-readable way.", "version": "1.0.0", "catalogStatus": "approved", "lifecycleStatus": "invest", "status": "", "product": "", "runsOn": "", "subtype": "", "vendor": "", "productName": "", "productVersion": "", "classification": "", "platformDependency": "", "addressesConcerns" tions": 1}, {"id": "unresolved-questions", "description": "The session must explicitly capture the questions that remain open.", "rationale": "Partial drafting only scales if open questions are machine-readable and easy to revisit later.", "canBeSatisfiedBy": [{"mechanism": "field", "key": "unresolvedQuestions", "example": "Is each district deployed with exactly one DB engine?"}], "minimumSatisfactions": 1}, {"id": "next-steps", "description": "The session must record the follow-up actions needed to close the remaining gaps.", "rationale": "An unresolved question without a next step is easy to lose and hard to revisit.", "canBeSatisfiedBy": [{"mechanism": "field", "key": "nextSteps", "example": "Confirm ECS-native Java runtime and rebind the application component"}], "minimumSatisfactions": 1}], "satisfiesODC": [], "appliesTo": {"type": "drafting_session"}, "inherits": "", "scalingUnits": [], "serviceGroups": [], "appliesPattern": "", "architectureRisksAndDecisions": [], "affectedComponent": "", "impact": "", "mitigationPath": "", "decisionRationale": "", "relatedARDs": [], "linkedSDM": "", "frameworkKind": "", "defaultSelection": false, "controlCount": 0, "semanticCount": 0, "hasRiskRef": false, "outboundRefs": [], "referencedBy": [], "editorSchema": {"requiredFields": ["schemaVersion", "id", "type", "name", "description", "requirements"], "optionalFields": ["version", "catalogStatus", "lifecycleStatus", "owner", "tags", "appliesTo", "inherits"], "fieldTypes": {"owner": "dict", "tags": "list", "appliesTo": "dict", "requirements": "list"}, "enumFields": {"catalogStatus": ["stub", "draft", "approved"], "lifecycleStatus": ["pre-invest", "invest", "maintain", "disinvest", "exit"]}, "enumListFields": {}, "collectionSchemas": {"requirements": "requirement"}, "schemaPath": "schemas/odc.schema.yaml"}, "detail": "{\n  \"schemaVersion\": \"1.0\",\n  \"id\": \"odc.drafting-session\",\n  \"type\": \"odc\",\n  \"name\": \"Drafting Session Object Definition Checklist\",\n  \"description\": \"Structured checklist used to capture partial architecture-authoring sessions, generated outputs, and unresolved follow-up questions in a machine-readable way.\",\n  \"version\": \"1.0.0\",\n  \"catalogStatus\": \"approved\",\n  \"lifecycleStatus\": \"invest\",\n  \"owner\": {\n    \"team\": \"cloud-architecture\",\n    \"contact\": \"cloud-architecture@example.com\"\n  },\n  \"tags\": [\n    \"drafting-session\",\n    \"checklist\",\n    \"intake\"\n  ],\n  \"appliesTo\": {\n    \"type\": \"drafting_session\"\n  },\n  \"requirements\": [\n    {\n      \"id\": \"target-object\",\n      \"description\": \"The session must state what object type it is trying to produce and, when available, the concrete object id it is building toward.\",\n      \"rationale\": \"A drafting session is only useful if a later reviewer can tell what the session is trying to create or refine.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"primaryObjectType\",\n          \"example\": \"software_distribution_manifest\"\n        },\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"primaryObjectId\",\n          \"example\": \"sdm.tx-erp-sis-hrms\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"source-artifacts\",\n      \"description\": \"The session must record the source materials that informed the drafting work.\",\n      \"rationale\": \"Later reviewers need to know what pages, diagrams, interviews, or files the best-effort answers came from.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"sourceArtifacts\",\n          \"example\": \"Confluence page, interview notes, architecture diagram\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"generated-objects\",\n      \"description\": \"The session must record what YAML objects were created, proposed, or stubbed during the session.\",\n      \"rationale\": \"Session output should be directly traceable to the architecture content it produced.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"generatedObjects\",\n          \"example\": \"sdm.tx-erp-sis-hrms, ps.tx-erp.application, ard.tx-erp.001\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"unresolved-questions\",\n      \"description\": \"The session must explicitly capture the questions that remain open.\",\n      \"rationale\": \"Partial drafting only scales if open questions are machine-readable and easy to revisit later.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"unresolvedQuestions\",\n          \"example\": \"Is each district deployed with exactly one DB engine?\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"next-steps\",\n      \"description\": \"The session must record the follow-up actions needed to close the remaining gaps.\",\n      \"rationale\": \"An unresolved question without a next step is easy to lose and hard to revisit.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"nextSteps\",\n          \"example\": \"Confirm ECS-native Java runtime and rebind the application component\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    }\n  ],\n  \"_source\": \"odcs/odc.drafting-session.yaml\"\n}", "existsInCatalog": true}, "odc.host": {"id": "odc.host", "name": "Host Object Definition Checklist", "type": "odc", "typeLabel": "ODC", "filterType": "odc", "category": "", "serviceCategory": "", "description": "Structured checklist of required questions and answers used to define a complete and correct host RBB.", "version": "3.0.0", "catalogStatus": "approved", "lifecycleStatus": "maintain", "status": "", "product": "", "runsOn": "", "subtype": "", "vendor": "", "pro },\n  \"requirements\": [\n    {\n      \"id\": \"operating-system\",\n      \"description\": \"The host must declare the Operating System ABB that defines the operating system baseline.\",\n      \"rationale\": \"A host is not complete until the operating system product baseline is explicit.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"osAbb\",\n          \"example\": \"osAbb: abb.os.microsoft-windowsserver-2022\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"compute-platform\",\n      \"description\": \"The host must declare the Compute Platform ABB that defines the physical or virtual compute substrate.\",\n      \"rationale\": \"A host is not complete until the compute substrate is explicit.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"field\",\n          \"key\": \"hardwareAbb\",\n          \"example\": \"hardwareAbb: abb.hardware.amazon-ec2-standard\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"authentication\",\n      \"description\": \"The host must address how administrators and services authenticate to the platform.\",\n      \"rationale\": \"Identity control is a baseline host requirement because unmanaged access breaks supportability and auditability.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"authentication\"\n          },\n          \"example\": \"Active Directory or another enterprise identity platform.\"\n        },\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"concern\": \"authentication\"\n          },\n          \"example\": \"An ABB installed locally that provides host authentication behavior.\"\n        },\n        {\n          \"mechanism\": \"abbConfiguration\",\n          \"criteria\": {\n            \"concern\": \"authentication\"\n          },\n          \"example\": \"An Operating System ABB configuration that defines the authentication model.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"authenticationApproach\",\n          \"example\": \"A documented local or federated authentication model when the dependency is not expressed as a platform interaction.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"log-management\",\n      \"description\": \"The host must address how logs leave the host and reach an operationally supported logging destination.\",\n      \"rationale\": \"Logging is required for troubleshooting, security response, and evidentiary review.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"logging\"\n          },\n          \"example\": \"Centralized Logging or a managed SIEM pipeline.\"\n        },\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"concern\": \"log-management\"\n          },\n          \"example\": \"A locally installed ABB that implements host log management.\"\n        },\n        {\n          \"mechanism\": \"abbConfiguration\",\n          \"criteria\": {\n            \"concern\": \"log-management\"\n          },\n          \"example\": \"An Operating System ABB configuration that redirects logs to a dedicated volume or forwarding path.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"loggingApproach\",\n          \"example\": \"A documented log shipping design for cases where the platform is described indirectly.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"health-welfare-monitoring\",\n      \"description\": \"The host must address health and welfare monitoring for performance, availability, and operational telemetry.\",\n      \"rationale\": \"Hosts must show how operators know whether the platform is healthy and supportable.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"monitoring\"\n          },\n          \"example\": \"Dynatrace, Nagios, or another host monitoring platform.\"\n        },\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"concern\": \"health-welfare-monitoring\"\n          },\n          \"example\": \"A locally installed ABB that exports host health telemetry.\"\n        },\n        {\n          \"mechanism\": \"abbConfiguration\",\n          \"criteria\": {\n            \"concern\": \"health-welfare-monitoring\"\n          },\n          \"example\": \"An ABB configuration that enables local health telemetry or metrics export.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"healthWelfareMonitoringApproach\",\n          \"example\": \"A documented explanation of the host monitoring pattern when the implementation is not captured directly.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"security-monitoring\",\n      \"description\": \"The host must address endpoint security or runtime security monitoring.\",\n      \"rationale\": \"Hosts must show how they are protected and observed by a security control plane.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"security\"\n          },\n          \"example\": \"CrowdStrike Falcon Platform or Wiz Cloud Security.\"\n        },\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"concern\": \"security-monitoring\"\n          },\n          \"example\": \"An installed ABB that provides endpoint or runtime security monitoring.\"\n        },\n        {\n          \"mechanism\": \"abbConfiguration\",\n          \"criteria\": {\n            \"concern\": \"security-monitoring\"\n          },\n          \"example\": \"An ABB configuration that enables local security telemetry or runtime protection behavior.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"securityMonitoringApproach\",\n          \"example\": \"A documented statement of the host security monitoring pattern.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"patch-management\",\n      \"description\": \"The host must address how patching is orchestrated and what operational mechanism applies updates.\",\n      \"rationale\": \"Patching is a governance control, not an implementation detail that can be left implicit.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"patch-management\"\n          },\n          \"example\": \"Automox Patch Management.\"\n        },\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"concern\": \"patch-management\"\n          },\n          \"example\": \"An installed ABB that performs or coordinates patch execution.\"\n        },\n        {\n          \"mechanism\": \"abbConfiguration\",\n          \"criteria\": {\n            \"concern\": \"patch-management\"\n          },\n          \"example\": \"An ABB configuration that defines how the platform is patched without a separate external orchestrator.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"patchManagementApproach\",\n          \"example\": \"A documented patch orchestration model when a platform interaction is not explicitly modeled.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    }\n  ],\n  \"_sour dress how service-generated logs are produced and delivered beyond host-level logging.\",\n      \"rationale\": \"Service logs are distinct from host logs and are required for supportability and evidentiary review.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"logging\"\n          },\n          \"example\": \"Centralized logging pipeline for application or service logs.\"\n        },\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"concern\": \"log-management\"\n          },\n          \"example\": \"A local logging component that handles service log forwarding or collection.\"\n        },\n        {\n          \"mechanism\": \"abbConfiguration\",\n          \"criteria\": {\n            \"concern\": \"log-management\"\n          },\n          \"example\": \"A function ABB configuration that defines service log collection and export.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"serviceLogging\",\n          \"example\": \"A documented service logging pattern when modeled indirectly.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"health-welfare-monitoring\",\n      \"description\": \"The service must address how operators observe service health, welfare, and operational telemetry.\",\n      \"rationale\": \"A service is incomplete until the monitoring pattern for service-level health is explicit.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"monitoring\"\n          },\n          \"example\": \"Centralized monitoring platform used for service telemetry and health evaluation.\"\n        },\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"concern\": \"health-w     let currentSdmScalingFilter = 'all';
    let suppressHashSync = false;
    let selectedFrameworkId = (() => {
      try {
        const saved = window.localStorage.getItem('draft-framework:selected-framework');
        if (saved && objectLookup[saved]) {
          return saved;
        }
      } catch (error) {}
      return complianceData.defaultProfileId || complianceProfiles[0]?.id || null;
    })();
    let impactLifecycleFilters = Object.fromEntries(
      impactLifecycleOrder.map(status => [status, status !== 'exit'])
    );

    Object.entries(lifecycleColors).forEach(([label, value]) => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="dot" style="background:${'#' + value}"></span><span>${label}</span>`;
      legend.appendChild(item);
    });

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatTitleCase(value) {
      return String(value || '')
        .split(/[-_]/g)
        .filter(Boolean)
        .map(part => part.charAt(0).toUpperCase() + part.slice(1))
        .join(' ');
    }

    function formatKeyLabel(value) {
      return formatTitleCase(String(value || '').replace(/\./g, '-'));
    }

    function relatedConcernOptions() {
      const values = new Set();
      allObjects
        .filter(object => object.type === 'odc')
        .forEach(object => {
          (object.requirements || []).forEach(requirement => {
            if (requirement?.id) {
              values.add(String(requirement.id));
            }
          });
        });
      return Array.from(values).sort((a, b) => a.localeCompare(b));
    }

    function formatTypeLabel(typeValue) {
      const normalized = String(typeValue || '');
      if (normalized === 'abb') return 'ABB';
      if (normalized === 'rbb') return 'RBB';
      if (normalized === 'odc') return 'ODC';
      if (normalized === 'ard') return 'ARD';
      if (normalized === 'software_distribution_manifest') return 'Software Distribution Manifest';
      if (normalized === 'reference_architecture') return 'Reference Architecture';
      if (normalized === 'compliance_framework') return 'Compliance Framework';
      if (normalized === 'compliance_profile') return 'Compliance Profile';
      return formatTitleCase(normalized.replace(/[._-]/g, ' '));
    }

    function capabilityClass(capability) {
      return ({
        'authentication': 'cap-authentication',
        'logging': 'cap-logging',
        'security': 'cap-security',
        'monitoring': 'cap-monitoring',
        'patch-management': 'cap-patch-management'
      }[capability] || 'cap-default');
    }

    function catalogStatusClass(status) {
      return ({
        'approved': 'catalog-approved',
        'draft': 'catalog-draft',
        'stub': 'catalog-stub'
      }[status] || 'catalog-stub');
    }

    function lifecycleBadge(status) {
      const color = '#' + (lifecycleColors[status] || lifecycleColors.unknown);
      return `<span class="badge"><span class="dot" style="background:${color}"></span>${escapeHtml(status)}</span>`;
    }

    function catalogBadge(status) {
      return `<span class="badge ${catalogStatusClass(status)}">${escapeHtml(status)}</span>`;
    }

    function ardCategoryBadge(category) {
      const normalized = category === 'decision' ? 'decision' : 'risk';
      return `<span class="badge ard-${normalized}">${escapeHtml(normalized)}</span>`;
    }

    function ardStatusBadge(status) {
      return `<span class="badge ard-status">${escapeHtml(status || 'unknown')}</span>`;
    }

    function productBadge(product) {
      return `<span class="badge ps-badge">${escapeHtml(product || 'unknown product')}</span>`;
    }

    function saasBadge() {
      return '<span class="badge saas-badge">SaaS</span>';
    }

    function applianceBadge() {
      return '<span class="badge appliance-badge">appliance</span>';
    }

    function intentBadge(intent) {
      const normalized = String(intent || '').toLowerCase();
      const cls = normalized === 'ha' ? 'intent-ha' : normalized === 'sa' ? 'intent-sa' : '';
      return `<span class="badge ${cls}">${escapeHtml((intent || '').toUpperCase())}</span>`;
    }

    function boolBadge(value, trueLabel = 'true', falseLabel = 'false') {
      const active = value === true;
      const text = active ? trueLabel : falseLabel;
      const cls = active ? 'saas-badge' : 'catalog-stub';
      return `<span class="badge ${cls}">${escapeHtml(text)}</span>`;
    }

    function currentHashState() {
      const raw = window.location.hash.replace(/^#/, '');
      return new URLSearchParams(raw);
    }

    function setHashState(values) {
      if (suppressHashSync) return;
      const params = new URLSearchParams();
      Object.entries(values).forEach(([key, value]) => {
        if (value !== null && value !== undefined && String(value).trim() !== '') {
          params.set(key, value);
        }
      });
      const nextHash = params.toString();
      const currentHash = window.location.hash.replace(/^#/, '');
      if (nextHash === currentHash) return;
      suppressHashSync = true;
      window.location.hash = nextHash;
      window.setTimeout(() => {
        suppressHashSync = false;
      }, 0);
    }

    function categoryConfig(categoryId = activeCategory) {
      return CATEGORY_CONFIG.find(category => category.id === categoryId) || CATEGORY_CONFIG[0];
    }

    function activeFilterConfig() {
      const category = categoryConfig();
      return category.filters.find(filter => filter.id === activeFilter) || category.filters[0];
    }

    function formatListFilterLabel(filterId) {
      const category = categoryConfig();
      const filter = category.filters.find(item => item.id === filterId);
      return filter?.label || 'All';
    }

    function syncHashForListView() {
      setHashState({
        view: 'list',
        category: activeCategory !== 'software' ? activeCategory : null,
        filter: activeFilter !== 'all' ? activeFilter : null
      });
    }

    function syncHashForDetailView(id) {
      setHashState({ view: 'detail', id });
    }

    function syncHashForImpactView() {
      setHashState({ view: 'impact', id: impactSelectedId, q: impactSearchTerm || null });
    }

    function applyRouteFromHash() {
      if (suppressHashSync) return;
      const params = currentHashState();
      const view = params.get('view');
      if (view === 'detail') {
        const objectId = params.get('id');
        if (objectId && objectLookup[objectId]) {
          currentDetailId = objectId;
          navHistory.length = 0;
          renderDetailView();
          return;
        }
      }
      if (view === 'impact') {
        const objectId = params.get('id');
        impactSelectedId = objectId && objectLookup[objectId] ? objectId : null;
        impactSearchTerm = params.get('q') || '';
        renderImpactView();
        return;
      }
      const category = params.get('category');
      activeCategory = CATEGORY_CONFIG.some(item => item.id === category) ? category : 'software';
      const requestedFilter = params.get('filter');
      const categoryFilters = categoryConfig(activeCategory).filters;
      activeFilter = categoryFilters.some(item => item.id === requestedFilter)
        ? requestedFilter
        : requestedFilter && categoryFilters.some(item => item.types.includes(requestedFilter))
          ? requestedFilter
          : 'all';
      currentDetailId = null;
      renderListView();
    }

    function topNavMarkup() {
      return `
        <div class="top-nav">
          <button class="nav-button ${currentMode === 'list' ? 'active' : ''}" data-nav="list">List View</button>
          <button class="nav-button ${currentMode === 'detail' ? 'active' : ''}" data-nav="detail" ${currentDetailId ? '' : 'disabled'}>Detail View</button>
          <button class="nav-button ${currentMode === 'impact' ? 'active' : ''}" data-nav="impact">Impact Analysis</button>
        </div>
      `;
    }

    function renderSidebarContent(contentHtml) {
      sidebarContent.innerHTML = contentHtml;
    }

    function selectedFramework() {
      return (selectedFrameworkId && objectLookup[selectedFrameworkId]) || complianceProfiles[0] || null;
    }

    function selectedFrameworkControls() {
      return complianceData.controlsByProfile?.[selectedFrameworkId] || [];
    }

    function controlModeLabel(control) {
      if ((control.requirementMode || 'mandatory') === 'conditional') {
        return control.naAllowed ? 'Conditional / N-A allowed' : 'Conditional';
      }
      return 'Required';
    }

    function scopeForObject(object) {
      if (!object) return null;
      if (object.type === 'odc') {
        const appliesTo = object.appliesTo || {};
        if (appliesTo.type === 'rbb') {
          if (appliesTo.category === 'host') return 'rbb.host';
          if (appliesTo.category === 'service' && appliesTo.serviceCategory === 'general') return 'rbb.service.general';
          if (appliesTo.category === 'service' && appliesTo.serviceCategory === 'database') return 'rbb.service.database';
          if (appliesTo.category === 'service' && appliesTo.serviceCategory === 'product') return 'rbb.service.product';
          if (appliesTo.category === 'service' && appliesTo.serviceCategory === 'saas') return 'rbb.service.saas';
        }
        if (appliesTo.type === 'reference_architecture') return 'ra';
        if (appliesTo.type === 'software_distribution_manifest') return 'sdm';
        if (appliesTo.type === 'abb' && appliesTo.subtype === 'appliance') return 'abb.appliance';
        return null;
      }
      if (object.type === 'rbb') {
        if (object.category === 'host') return 'rbb.host';
        if (object.category === 'service' && object.serviceCategory === 'general') return 'rbb.service.general';
        if (object.category === 'service' && object.serviceCategory === 'database') return 'rbb.service.database';
        if (object.category === 'service' && object.serviceCategory === 'product') return 'rbb.service.product';
        if (object.category === 'service' && object.serviceCategory === 'saas') return 'rbb.service.saas';
      }
      if (object.type === 'reference_architecture') return 'ra';
      if (object.type === 'software_distribution_manifest') return 'sdm';
      if (object.type === 'abb' && object.subtype === 'appliance') return 'abb.appliance';
      return null;
    }

    function controlsForRequirement(object, requirementId) {
      const scope = scopeForObject(object);
      if (!scope || !requirementId) return [];
      return selectedFrameworkControls().filter(control =>
        (control.appliesTo || []).includes(scope) &&
        (control.relatedConcern || '') === requirementId
      );
    }

    function additionalControlsForObject(object) {
      const scope = scopeForObject(object);
      if (!scope) return [];
      return selectedFrameworkControls().filter(control =>
        (control.appliesTo || []).includes(scope) &&
        !(control.relatedConcern || '').trim()
      );
    }

    function complianceFrameworkMarkup() {
      if (!complianceProfiles.length) {
        return '';
      }
      const current = selectedFramework();
      return `
        <div class="sidebar-block">
          <div class="legend-title">Compliance Profile</div>
          <select id="framework-select" class="sidebar-select">
            ${complianceProfiles.map(profile => `
              <option value="${profile.id}" ${profile.id === current?.id ? 'selected' : ''}>${escapeHtml(profile.name)}</option>
            `).join('')}
          </select>
          <div class="sidebar-help">${escapeHtml(current?.description || 'Select the DRAFT compliance profile used to extend the effective ODC checklist.')}</div>
        </div>
      `;
    }

    function currentFilterMarkup() {
      return `
        <div class="sidebar-block">
          <div class="legend-title">Current Filter</div>
          <div class="current-filter"><span class="dot" style="background:#38bdf8"></span><span>${escapeHtml(categoryConfig().label)} / ${escapeHtml(formatListFilterLabel(activeFilter))}</span></div>
        </div>
      `;
    }

    function sidebarMarkup(extraMarkup = '') {
      return `${complianceFrameworkMarkup()}${currentFilterMarkup()}${extraMarkup}`;
    }

    function rerenderCurrentView() {
      if (currentMode === 'detail') {
        renderDetailView();
        return;
      }
      if (currentMode === 'impact') {
        renderImpactView();
        return;
      }
      renderListView();
    }

    function attachSidebarHandlers() {
      const frameworkSelect = document.getElementById('framework-select');
      if (!frameworkSelect) {
        return;
      }
      frameworkSelect.addEventListener('change', event => {
        selectedFrameworkId = event.target.value || complianceData.defaultProfileId || complianceProfiles[0]?.id || null;
        try {
          window.localStorage.setItem('draft-framework:selected-framework', selectedFrameworkId || '');
        } catch (error) {}
        rerenderCurrentView();
      });
    }

    function attachTopNavHandlers() {
      appRoot.querySelectorAll('[data-nav]').forEach(button => {
        button.addEventListener('click', () => {
          const nav = button.dataset.nav;
          if (nav === 'list') {
            destroyImpactCy();
            renderListView();
            return;
          }
          if (nav === 'detail' && currentDetailId) {
            destroyImpactCy();
            renderDetailView();
            return;
          }
          if (nav === 'impact') {
            renderImpactView();
          }
        });
      });
    }

    function impactGroupForObject(object) {
      return object.type || 'unknown';
    }

    function destroyImpactCy() {
      if (impactCy) {
        impactCy.destroy();
        impactCy = null;
      }
    }

    function filterObjectsByTypes(types) {
      const allowed = new Set(types);
      return allObjects.filter(object => allowed.has(object.type));
    }

    function filterObjects() {
      return filterObjectsByTypes(activeFilterConfig().types);
    }

    function listRowMarkup(row, objects) {
      if (!objects.length) {
        return '';
      }
      return `
        <section class="content-row">
          <div class="content-row-header">
            <h2 class="content-row-title">${escapeHtml(row.label)}</h2>
            <span class="content-row-count">${objects.length} objects</span>
          </div>
          <div class="cards-grid">
            ${objects.map(object => objectCardMarkup(object)).join('')}
          </div>
        </section>
      `;
    }

    function objectCardTitle(object) {
      if (object.type !== 'odc') {
        return object.name;
      }
      const trimmed = String(object.name || '').replace(/\s+Object Definition Checklist$/i, '');
      if (trimmed === 'Appliance ABB') {
        return 'Appliance';
      }
      return trimmed;
    }

    function objectCardMarkup(object) {
      return `
        <article class="object-card" data-object-id="${object.id}">
          <div>
            <h3>${escapeHtml(objectCardTitle(object))}</h3>
            <div class="object-id">${escapeHtml(object.id)}</div>
          </div>
          <div class="badges">
            ${lifecycleBadge(object.lifecycleStatus)}
            ${catalogBadge(object.catalogStatus)}
            ${object.type === 'ard' ? ardCategoryBadge(object.ardCategory) : ''}
            ${object.type === 'ard' ? ardStatusBadge(object.status) : ''}
            ${object.type === 'rbb' && object.serviceCategory === 'product' ? productBadge(object.product) : ''}
            ${object.type === 'rbb' && object.serviceCategory === 'saas' ? saasBadge() : ''}
          </div>
          <div class="badges">
            <div class="badge">${escapeHtml(object.typeLabel)}</div>
            ${object.type === 'rbb' && object.serviceCategory === 'product' ? `<div class="object-id">${escapeHtml(object.product)}</div>` : ''}
            ${object.type === 'abb' && object.subtype === 'appliance' ? applianceBadge() : ''}
          </div>
        </article>
      `;
    }

    function abbClassificationLabel(value) {
      return formatTitleCase(String(value || 'unknown').replace(/-/g, ' '));
    }

    function renderListView() {
      currentMode = 'list';
      currentDetailId = null;
      destroyDetailCy();
      destroyImpactCy();
      const category = categoryConfig();
      const filtered = filterObjects();
      const rows = activeFilter === 'all'
        ? category.rows.map(row => ({ row, objects: filterObjectsByTypes(row.types) })).filter(section => section.objects.length)
        : (() => {
            const filter = activeFilterConfig();
            const row = category.rows.find(item => item.id === activeFilter)
              || { id: filter.id, label: filter.label, types: filter.types };
            return [{ row, objects: filtered }];
          })();
      syncHashForListView();
      renderSidebarContent(sidebarMarkup());
      appRoot.innerHTML = `
        <div class="view-shell">
          ${topNavMarkup()}
          <div class="tab-row">
            ${CATEGORY_CONFIG.map(categoryItem => `<button class="tab-button ${categoryItem.id === activeCategory ? 'active' : ''}" data-category-tab="${categoryItem.id}">${escapeHtml(categoryItem.label)}</button>`).join('')}
          </div>
          <div class="filter-row">
            ${category.filters.map(filter => `<button class="filter-button ${filter.id === activeFilter ? 'active' : ''}" data-filter="${filter.id}">${escapeHtml(filter.label)}</button>`).join('')}
          </div>
          <div class="view-title">
            <span>${filtered.length} objects</span>
            <span>Showing ${escapeHtml(category.label)}${activeFilter === 'all' ? '' : ` / ${escapeHtml(formatListFilterLabel(activeFilter))}`}</span>
          </div>
          <div class="content-rows">
            ${rows.map(section => listRowMarkup(section.row, section.objects)).join('') || `<div class="empty-card" style="padding:24px;">No objects in this view.</div>`}
          </div>
        </div>
      `;

      appRoot.querySelectorAll('[data-category-tab]').forEach(button => {
        button.addEventListener('click', () => {
          activeCategory = button.dataset.categoryTab;
          activeFilter = 'all';
          renderListView();
        });
      });

      appRoot.querySelectorAll('[data-filter]').forEach(button => {
        button.addEventListener('click', () => {
          activeFilter = button.dataset.filter;
          renderListView();
        });
      });

      appRoot.querySelectorAll('[data-object-id]').forEach(card => {
        card.addEventListener('click', () => {
          showDetailView(card.dataset.objectId);
        });
      });

      attachTopNavHandlers();
      attachSidebarHandlers();
    }

    function flattenDecisionEntries(prefix, value, entries) {
      if (value && typeof value === 'object' && !Array.isArray(value)) {
        Object.entries(value).forEach(([childKey, childValue]) => {
          flattenDecisionEntries(prefix ? `${prefix}.${childKey}` : childKey, childValue, entries);
        });
        return;
      }
      const rendered = Array.isArray(value) ? value.join(', ') : String(value);
      entries.push({ key: prefix, value: rendered });
    }

    function decisionMarkup(object) {
      const decisions = object.architecturalDecisions || {};
      const entries = [];
      flattenDecisionEntries('', decisions, entries);
      if (!entries.length) {
        return '<div class="empty-card">No architectural decisions are defined for this object.</div>';
      }
      return `
        <div class="decisions-grid single">
          <section class="decision-card">
            <h4>Architecture Decisions</h4>
            <dl class="definition-list">
              ${entries.map(entry => `<dt>${escapeHtml(entry.key)}</dt><dd>${escapeHtml(entry.value)}</dd>`).join('')}
            </dl>
          </section>
        </div>
      `;
    }

    function interactionMarkup(object) {
      const interactions = object.externalInteractions || [];
      if (!interactions.length) {
        return '<div class="empty-card">No external interactions are documented for this object.</div>';
      }
      return `
        <div class="interactions-list">
          ${interactions.map(interaction => `
            <article class="interaction-card">
              <div class="interaction-top">
                <div class="interaction-name">${escapeHtml(interaction.name || 'External Interaction')}</div>
                <span class="badge ${capabilityClass(interaction.capability)}">${escapeHtml(interaction.capability || 'other')}</span>
              </div>
              ${interaction.notes ? `<div class="interaction-notes">${escapeHtml(interaction.notes)}</div>` : ''}
              ${interaction.ref ? `<div class="interaction-ref">${escapeHtml(interaction.ref)}</div>` : ''}
            </article>
          `).join('')}
        </div>
      `;
    }

    function requirementMechanismSentence(mechanism) {
      if (mechanism.mechanism === 'externalInteraction') {
        return `externalInteraction(capability=${mechanism.criteria?.capability || 'unknown'})`;
      }
      if (mechanism.mechanism === 'internalComponent') {
        return `internalComponent(role=${mechanism.criteria?.role || 'unknown'})`;
      }
      if (mechanism.mechanism === 'architecturalDecision') {
        return `architecturalDecision(key=${mechanism.key || 'unknown'})`;
      }
      return mechanism.mechanism || 'unknown';
    }

    function controlBadges(controls) {
      if (!controls || !controls.length) {
        return '<span class="interaction-notes">No required controls added by the selected framework.</span>';
      }
      return controls.map(control => `
        ${control.externalReference
          ? `<a class="control-badge ${control.requirementMode === 'conditional' ? 'conditional' : ''}" href="${escapeHtml(control.externalReference)}" target="_blank" rel="noopener noreferrer">${escapeHtml(control.controlId || '')}${control.name ? ` - ${escapeHtml(control.name)}` : ''}<span class="control-mode">${escapeHtml(controlModeLabel(control))}</span></a>`
          : `<span class="control-badge ${control.requirementMode === 'conditional' ? 'conditional' : ''}">${escapeHtml(control.controlId || '')}${control.name ? ` - ${escapeHtml(control.name)}` : ''}<span class="control-mode">${escapeHtml(controlModeLabel(control))}</span></span>`}
      `).join('');
    }

    function odcRequirementsMarkup(object) {
      const requirements = object.requirements || [];
      const framework = selectedFramework();
      const extraControls = additionalControlsForObject(object);
      if (!requirements.length) {
        return '<div class="empty-card">No requirements are documented for this ODC.</div>';
      }
      return `
        <section class="section-card">
          <h3>Requirements</h3>
          <div class="section-stack">
            ${requirements.map(requirement => `
              <article class="requirement-card">
                <div class="requirement-name">${escapeHtml(formatTitleCase(requirement.id || 'requirement'))}</div>
                <div class="requirement-description">${escapeHtml(requirement.description || '')}</div>
                ${requirement.rationale ? `
                  <div class="requirement-rationale-label">Rationale</div>
                  <div class="requirement-rationale">${escapeHtml(requirement.rationale)}</div>
                ` : ''}
                <div class="mechanism-label">Required Controls${framework ? ` / ${escapeHtml(framework.name)}` : ''}</div>
                <div class="control-badges">${controlBadges(controlsForRequirement(object, requirement.id || ''))}</div>
                <div class="mechanism-label">Can be satisfied by</div>
                <div class="mechanism-list">
                  ${(requirement.canBeSatisfiedBy || []).map(mechanism => `
                    <div class="mechanism-item">
                      <div class="mechanism-text">${escapeHtml(requirementMechanismSentence(mechanism))}</div>
                      ${mechanism.example ? `<div class="mechanism-example">${escapeHtml(mechanism.example)}</div>` : ''}
                    </div>
                  `).join('')}
                </div>
              </article>
            `).join('')}
          </div>
          ${extraControls.length ? `
            <div class="mechanism-label" style="margin-top:16px;">Additional Framework Controls</div>
            <div class="control-badges">${controlBadges(extraControls)}</div>
          ` : ''}
        </section>
      `;
    }

    function rbbOdcMarkup(object) {
      const odcIds = object.satisfiesODC || [];
      const framework = selectedFramework();
      if (!odcIds.length) {
        return '';
      }
      return `
        <section class="section-card">
          <h3>ODC Satisfaction${framework ? ` / ${escapeHtml(framework.name)}` : ''}</h3>
          <div class="section-stack">
            ${odcIds.map(odcId => {
              const odc = objectLookup[odcId];
              const requirements = odc?.requirements || [];
              return `
                <article class="odc-card">
                  <div class="odc-name">Satisfies: ${escapeHtml(odcId)}</div>
                  ${requirements.length ? requirements.map(requirement => `
                    <div class="odc-control-line">└─ ${escapeHtml(requirement.id || 'requirement')} → ${escapeHtml(controlsForRequirement(odc, requirement.id || '').map(control => control.controlId).join(', ') || 'No required controls')}</div>
                  `).join('') : '<div class="interaction-notes">No requirements found on referenced ODC.</div>'}
                </article>
              `;
            }).join('')}
          </div>
        </section>
      `;
    }

    function sdmRisksMarkup(object) {
      const references = object.architectureRisksAndDecisions || [];
      if (!references.length) {
        return '';
      }
      return `
        <section class="section-card">
          <h3>Architecture Risks and Decisions</h3>
          <div class="section-stack">
            ${references.map(entry => {
              const ard = objectLookup[entry.ref];
              return `
                <article class="odc-card">
                  <div class="odc-name">
                    ${ard ? `<span class="ard-link" data-object-link="${ard.id}">${escapeHtml(ard.name)}</span>` : escapeHtml(entry.ref || 'Unknown ARD')}
                  </div>
                  <div class="object-id">${escapeHtml(entry.ref || '')}</div>
                </article>
              `;
            }).join('')}
          </div>
        </section>
      `;
    }

    function sdmServiceGroupsMarkup(object) {
      const groups = object.serviceGroups || [];
      const scalingUnits = new Map((object.scalingUnits || []).map(unit => [unit.name, unit]));
      if (!groups.length) {
        return '<div class="empty-card">No service groups are documented for this software distribution manifest.</div>';
      }
      return `
        <section class="section-card">
          <h3>Service Groups</h3>
          <div class="section-stack">
            ${groups.map(group => {
              const scalingUnit = group.scalingUnit ? scalingUnits.get(group.scalingUnit) : null;
              const externalInteractions = (group.externalInteractions || []).filter(item => (item.type || 'external') !== 'internal');
              const internalInteractions = (group.externalInteractions || []).filter(item => (item.type || 'external') === 'internal');
              const rbbEntries = group.rbbs || [];
              const productCount = rbbEntries.filter(entry => objectLookup[entry.ref]?.serviceCategory === 'product').length;
              const saasCount = rbbEntries.filter(entry => objectLookup[entry.ref]?.serviceCategory === 'saas').length;
              const reusableCount = rbbEntries.filter(entry => {
                const serviceCategory = objectLookup[entry.ref]?.serviceCategory;
                return !['product', 'saas'].includes(serviceCategory || '');
              }).length;
              return `
                <article class="odc-card">
                  <div class="odc-name">${escapeHtml(group.name || 'Unnamed Service Group')}</div>
                  <div class="interaction-notes">${escapeHtml(group.deploymentTarget || 'Unspecified deployment target')}</div>
                  <div class="badges">
                    ${group.scalingUnit ? `<span class="badge">${escapeHtml(group.scalingUnit)}</span>` : '<span class="badge">unscoped</span>'}
                    ${scalingUnit?.type ? `<span class="badge">${escapeHtml(scalingUnit.type)}</span>` : ''}
                    ${productCount ? `<span class="badge ps-badge">${productCount} PS</span>` : ''}
                    ${reusableCount ? `<span class="badge">${reusableCount} RBB</span>` : ''}

                    ${saasCount ? saasBadge() : ''}
                  </div>
                  ${externalInteractions.length ? `<div class="interaction-notes"><strong>External:</strong> ${escapeHtml(externalInteractions.map(item => item.name).join(', '))}</div>` : ''}
                  ${internalInteractions.length ? `<div class="interaction-notes"><strong>Internal:</strong> ${escapeHtml(internalInteractions.map(item => `${item.name} → ${item.ref || 'unknown'}`).join(', '))}</div>` : ''}

    function productServiceDetailMarkup(object) {

      if (ownInteractions.length) {

      const ownDecisions = object?.architecturalDecisions || {};

        return object;

            <dl class="definition-list">

              ${object.platformDependency ? `<dt>Platform Dependency</dt><dd>${escapeHtml(object.platformDependency)}</dd>` : ''}

    function saasServiceDetailMarkup(object) {

        <section class="section-card">

          <div class="section-stack">
            <div class="badges">
              ${saasBadge()}

              ${catalogBadge(object.catalogStatus)}
              ${boolBadge(object.dataLeavesInfrastructure === true, 'Data Leaves Infrastructure', 'Data Stays In Boundary')}

    function complianceFrameworkDetailMarkup(object) {
      const frameworkSummary = (complianceData.frameworks || []).find(item => item.id === object.id);
      return `

          <h3>Compliance Framework</h3>

            </div>
            <div class="header-description">${escapeHtml(object.description || 'No description provided.')}</div>
          </div>
        </section>
      `;
