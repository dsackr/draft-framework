<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DRAFT Framework Toolkit</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --page: #0f172a;
      --panel: #111827;
      --card: #1e293b;
      --border: #334155;
      --muted: #94a3b8;
      --text: #e2e8f0;
      --subtle: #cbd5e1;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--page);
      color: var(--text);
      font-family: "SF Pro Display", "Segoe UI", sans-serif;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 1px;
      background: var(--border);
    }
    .sidebar,
    .main {
      background: linear-gradient(180deg, rgba(15,23,42,0.98), rgba(17,24,39,0.98));
    }
    .sidebar {
      padding: 24px 20px;
      border-right: 1px solid rgba(51,65,85,0.7);
    }
    .sidebar h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.02em;
    }
    .sidebar p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .sidebar-stack {
      display: grid;
      gap: 18px;
    }
    .sidebar-block,
    .legend-block {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(51,65,85,0.8);
    }
    .legend-title {
      margin: 0 0 12px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .legend-list {
      display: grid;
      gap: 10px;
    }
    .legend-item,
    .current-filter {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--subtle);
      font-size: 13px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      flex: 0 0 auto;
    }
    .main {
      padding: 28px;
    }
    .view-shell {
      display: grid;
      gap: 22px;
    }
    .top-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .nav-button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(15,23,42,0.72);
      color: var(--text);
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }
    .nav-button:hover {
      border-color: rgba(56,189,248,0.55);
      transform: translateY(-1px);
    }
    .nav-button.active {
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.6);
      color: #dff7ff;
    }
    .nav-button:disabled {
      cursor: default;
      opacity: 0.45;
      transform: none;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .filter-button,
    .back-button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(30,41,59,0.78);
      color: var(--text);
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }
    .filter-button:hover,
    .back-button:hover {
      border-color: rgba(56,189,248,0.55);
      transform: translateY(-1px);
    }
    .filter-button.active {
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.6);
      color: #dff7ff;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }
    .object-card,
    .interaction-card,
    .decision-card,
    .empty-card,
    .header-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
    }
    .object-card {
      padding: 18px;
      display: grid;
      gap: 12px;
      cursor: pointer;
      min-height: 168px;
      transition: border-color 120ms ease, transform 120ms ease, box-shadow 120ms ease;
    }
    .object-card:hover {
      border-color: rgba(56,189,248,0.5);
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(2,6,23,0.22);
    }
    .object-card h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
    }
    .object-id {
      color: var(--muted);
      font-size: 12px;
      word-break: break-word;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(148,163,184,0.18);
      background: rgba(15,23,42,0.65);
      color: var(--subtle);
    }
    .catalog-approved { border-color: rgba(16,185,129,0.45); color: #d1fae5; }
    .catalog-draft { border-color: rgba(245,158,11,0.45); color: #fde68a; }
    .catalog-stub { border-color: rgba(148,163,184,0.35); color: #cbd5e1; }
    .ard-risk { border-color: rgba(245,158,11,0.45); color: #fde68a; }
    .ard-decision { border-color: rgba(59,130,246,0.45); color: #bfdbfe; }
    .ard-status { border-color: rgba(148,163,184,0.35); color: #cbd5e1; }
    .ps-badge {
      border-color: rgba(20,184,166,0.45);
      color: #99f6e4;
      background: rgba(20,184,166,0.12);
    }
    .variant-ha {
      border-color: rgba(16,185,129,0.45);
      color: #bbf7d0;
      background: rgba(16,185,129,0.14);
    }
    .variant-sa {
      border-color: rgba(245,158,11,0.45);
      color: #fde68a;
      background: rgba(245,158,11,0.14);
    }
    .ard-link {
      color: #93c5fd;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: rgba(147,197,253,0.45);
      text-underline-offset: 2px;
    }
    .ard-link:hover { color: #dbeafe; }
    .risk-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      background: rgba(245,158,11,0.18);
      border: 1px solid rgba(245,158,11,0.38);
      color: #fde68a;
      cursor: pointer;
      width: fit-content;
    }
    .risk-badge:hover { border-color: rgba(245,158,11,0.62); }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .data-table th,
    .data-table td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(51,65,85,0.75);
      text-align: left;
      vertical-align: top;
    }
    .data-table th {
      color: var(--muted);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .ard-detail-card {
      display: grid;
      gap: 16px;
      padding: 22px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
    }
    .ard-detail-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }
    .ard-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--subtle);
      font-size: 13px;
    }
    .ard-section {
      display: grid;
      gap: 8px;
    }
    .ard-section h3 {
      margin: 0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .ard-section p,
    .ard-section div {
      margin: 0;
      color: var(--subtle);
      line-height: 1.6;
    }
    .view-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .detail-layout {
      display: grid;
      gap: 22px;
    }
    .detail-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .detail-tab {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(30,41,59,0.78);
      color: var(--text);
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
    }
    .detail-tab.active {
      background: rgba(56,189,248,0.18);
      border-color: rgba(56,189,248,0.6);
      color: #dff7ff;
    }
    .detail-panel[hidden] {
      display: none !important;
    }
    .header-card {
      padding: 22px;
      display: grid;
      gap: 14px;
    }
    .header-top {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }
    .header-title h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
    }
    .header-title .object-id {
      margin-top: 6px;
      font-size: 13px;
    }
    .header-description {
      color: var(--subtle);
      line-height: 1.6;
      font-size: 14px;
    }
    .owner-line {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      color: var(--muted);
      font-size: 13px;
    }
    .middle-grid {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 22px;
      align-items: start;
    }
    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }
    .section-card h3 {
      margin: 0 0 14px;
      font-size: 16px;
    }
    #detail-cy {
      width: 100%;
      height: 350px;
      border-radius: 14px;
      border: 1px solid rgba(51,65,85,0.85);
      background: #0f172a;
    }
    .interactions-list {
      display: grid;
      gap: 12px;
      max-height: 350px;
      overflow: auto;
      padding-right: 4px;
    }
    .interaction-card {
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .requirement-card,
    .aag-card {
      padding: 14px;
      display: grid;
      gap: 10px;
      background: rgba(15,23,42,0.55);
      border: 1px solid rgba(51,65,85,0.85);
      border-radius: 14px;
    }
    .interaction-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .interaction-name {
      font-weight: 600;
      line-height: 1.4;
    }
    .interaction-notes {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .interaction-ref {
      color: #7dd3fc;
      font-size: 12px;
      word-break: break-word;
    }
    .requirement-name,
    .aag-name {
      font-weight: 600;
      line-height: 1.4;
    }
    .requirement-name {
      font-size: 17px;
      color: var(--text);
    }
    .requirement-description,
    .requirement-rationale,
    .mechanism-line,
    .aag-control-line {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .requirement-rationale-label,
    .mechanism-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .mechanism-list {
      display: grid;
      gap: 10px;
    }
    .mechanism-item {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(51,65,85,0.85);
      background: rgba(15,23,42,0.45);
      display: grid;
      gap: 6px;
    }
    .mechanism-text {
      color: var(--subtle);
      font-size: 13px;
      line-height: 1.5;
    }
    .mechanism-example {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .control-badges,
    .aag-control-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .control-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      color: #93c5fd;
    }
    .section-stack {
      display: grid;
      gap: 12px;
    }
    .topology-layout {
      display: grid;
      gap: 18px;
    }
    .topology-strip,
    .location-box,
    .eks-box,
    .cluster-box {
      background: rgba(15,23,42,0.78);
      border-radius: 18px;
    }
    .topology-strip {
      border: 1px solid var(--border);
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .topology-strip-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .topology-interaction {
      min-width: 120px;
      display: grid;
      gap: 6px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(51,65,85,0.8);
      background: rgba(30,41,59,0.9);
    }
    .topology-interaction-icon,
    .topology-node-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(249,115,22,0.18);
      color: #fdba74;
      border: 1px solid rgba(249,115,22,0.35);
    }
    .topology-interaction-icon.network {
      background: rgba(16,185,129,0.18);
      border-color: rgba(16,185,129,0.35);
      color: #bbf7d0;
    }
    .topology-interaction-icon.storage {
      background: rgba(59,130,246,0.18);
      border-color: rgba(59,130,246,0.35);
      color: #bfdbfe;
    }
    .topology-interaction-icon.compute {
      background: rgba(168,85,247,0.18);
      border-color: rgba(168,85,247,0.35);
      color: #e9d5ff;
    }
    .topology-interaction-icon.cloud {
      background: rgba(148,163,184,0.18);
      border-color: rgba(148,163,184,0.35);
      color: #e2e8f0;
    }
    .topology-locations {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
      align-items: start;
    }
    .location-box {
      padding: 16px;
      display: grid;
      gap: 14px;
      border: 2px solid #37474f;
      background: rgba(30,41,59,0.9);
      min-width: 0;
    }
    .location-box.aws {
      border-color: #e91e8c;
      background: linear-gradient(180deg, rgba(233,30,140,0.08), rgba(30,41,59,0.92));
    }
    .location-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .location-title {
      font-size: 15px;
      font-weight: 700;
      color: #f8fafc;
    }
    .location-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      background: rgba(15,23,42,0.7);
      border: 1px solid rgba(148,163,184,0.3);
      color: #e2e8f0;
    }
    .location-box.aws .location-badge {
      border-color: rgba(233,30,140,0.45);
      color: #fbcfe8;
    }
    .location-content {
      display: grid;
      gap: 14px;
    }
    .cluster-box {
      padding: 14px;
      border: 2px dashed rgba(249,115,22,0.7);
      background: rgba(249,115,22,0.06);
      display: grid;
      gap: 12px;
    }
    .cluster-label,
    .eks-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fdba74;
    }
    .eks-box {
      padding: 14px;
      border: 2px dashed rgba(71,85,105,0.9);
      background: rgba(15,23,42,0.74);
      display: grid;
      gap: 12px;
    }
    .eks-label {
      color: #cbd5e1;
    }
    .node-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .topology-node {
      position: relative;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(71,85,105,0.85);
      background: rgba(30,41,59,0.95);
      display: grid;
      gap: 10px;
      min-width: 180px;
      min-height: 100px;
      cursor: pointer;
      transition: border-color 120ms ease, transform 120ms ease, box-shadow 120ms ease;
    }
    .topology-node:hover {
      border-color: rgba(56,189,248,0.45);
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(2,6,23,0.2);
    }
    .topology-node.ps-node {
      background: rgba(45,66,74,0.95);
      border-color: rgba(20,184,166,0.35);
    }
    .topology-node.pod {
      border-color: rgba(59,130,246,0.45);
      background: rgba(30,41,59,0.88);
    }
    .topology-node-icon.pod {
      background: rgba(59,130,246,0.18);
      color: #93c5fd;
      border-color: rgba(59,130,246,0.35);
    }
    .topology-node-label {
      font-size: 13px;
      font-weight: 600;
      color: #f8fafc;
      line-height: 1.35;
    }
    .topology-node-flags {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .ps-corner {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: rgba(20,184,166,0.18);
      border: 1px solid rgba(20,184,166,0.4);
      color: #99f6e4;
    }
    .topology-node-meta {
      font-size: 11px;
      color: var(--muted);
    }
    .topology-risk {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(245,158,11,0.18);
      border: 1px solid rgba(245,158,11,0.42);
      color: #fde68a;
      cursor: pointer;
      font-size: 13px;
    }
    .topology-risk:hover {
      border-color: rgba(245,158,11,0.72);
    }
    .impact-sidebar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      display: grid;
      gap: 14px;
      max-height: calc(100vh - 160px);
      overflow: auto;
    }
    .impact-search {
      width: 100%;
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 12px;
      background: rgba(15,23,42,0.78);
      color: var(--text);
      padding: 11px 12px;
      font: inherit;
    }
    .search-results,
    .impact-group-list {
      display: grid;
      gap: 8px;
    }
    .search-result,
    .impact-item {
      border: 1px solid rgba(51,65,85,0.85);
      border-radius: 12px;
      background: rgba(15,23,42,0.55);
      padding: 10px 12px;
      cursor: pointer;
      display: grid;
      gap: 4px;
    }
    .search-result:hover,
    .impact-item:hover {
      border-color: rgba(56,189,248,0.45);
    }
    .impact-item-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .impact-group {
      display: grid;
      gap: 10px;
    }
    .impact-group h4 {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .impact-graph-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      display: grid;
      gap: 14px;
      min-width: 0;
      overflow: hidden;
    }
    .impact-graph-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .lifecycle-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }
    .lifecycle-filter-button {
      border: 1px solid rgba(51,65,85,0.9);
      border-radius: 999px;
      background: rgba(15,23,42,0.78);
      color: var(--subtle);
      padding: 8px 12px;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, opacity 120ms ease;
      opacity: 0.78;
    }
    .lifecycle-filter-button:hover {
      transform: translateY(-1px);
      border-color: rgba(148,163,184,0.45);
    }
    .lifecycle-filter-button.active {
      color: #f8fafc;
      border-color: transparent;
      opacity: 1;
    }
    .lifecycle-filter-button.exit-filter {
      border-style: dashed;
      opacity: 0.55;
    }
    .lifecycle-filter-button.exit-filter:not(.active) {
      text-decoration: line-through;
    }
    #impact-cy {
      width: 100%;
      min-width: 0;
      height: 720px;
      border-radius: 14px;
      border: 1px solid rgba(51,65,85,0.85);
      background: #0f172a;
      overflow: hidden;
    }
    .impact-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 auto;
    }
    .decisions-card {
      background: rgba(30,41,59,0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .decisions-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .decisions-grid.single {
      grid-template-columns: 1fr;
    }
    .decision-card {
      padding: 16px;
    }
    .decision-card h4 {
      margin: 0 0 12px;
      font-size: 15px;
    }
    .definition-list {
      display: grid;
      grid-template-columns: minmax(120px, 180px) 1fr;
      gap: 10px 14px;
      margin: 0;
      font-size: 13px;
    }
    .definition-list dt {
      color: var(--muted);
      font-weight: 600;
    }
    .definition-list dd {
      margin: 0;
      color: var(--subtle);
      word-break: break-word;
    }
    .empty-card {
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .cap-authentication { background: rgba(139,92,246,0.18); border-color: rgba(139,92,246,0.4); color: #ddd6fe; }
    .cap-logging { background: rgba(59,130,246,0.18); border-color: rgba(59,130,246,0.4); color: #bfdbfe; }
    .cap-security { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.4); color: #fecaca; }
    .cap-monitoring { background: rgba(16,185,129,0.18); border-color: rgba(16,185,129,0.4); color: #bbf7d0; }
    .cap-patch-management { background: rgba(245,158,11,0.18); border-color: rgba(245,158,11,0.4); color: #fde68a; }
    .cap-default { background: rgba(100,116,139,0.18); border-color: rgba(100,116,139,0.4); color: #cbd5e1; }
    @media (max-width: 1200px) {
      .middle-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid rgba(51,65,85,0.7); }
      .main { padding: 20px; }
      .decisions-grid { grid-template-columns: 1fr; }
      .definition-list { grid-template-columns: 1fr; }
    }

 Analysis Guideline\",\n  \"description\": \"Requirement model for host RBB approval focused on platform integrations and variant readiness.\",\n  \"version\": \"2.0.0\",\n  \"catalogStatus\": \"approved\",\n  \"lifecycleStatus\": \"maintain\",\n  \"owner\": {\n    \"team\": \"cloud-architecture\",\n    \"contact\": \"cloud-architecture@example.com\"\n  },\n  \"tags\": [\n    \"host\",\n    \"analysis\",\n    \"governance\"\n  ],\n  \"appliesTo\": {\n    \"type\": \"rbb\",\n    \"category\": \"host\"\n  },\n  \"requirements\": [\n    {\n      \"id\": \"authentication\",\n      \"description\": \"The host must address how administrators and services authenticate to the platform.\",\n      \"rationale\": \"Identity control is a baseline host requirement because unmanaged access breaks supportability and auditability.\",\n      \"controlReferences\": [\n        \"CC.SecurityCompliance.04.2.2\",\n        \"CC.SecurityCompliance.04.4.1\"\n      ],\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"authentication\"\n          },\n          \"example\": \"Active Directory or another enterprise identity platform.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"authenticationApproach\",\n          \"example\": \"A documented local or federated authentication model when the dependency is not expressed as a platform interaction.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"logging\",\n      \"description\": \"The host must address how logs leave the host and reach an operationally supported logging destination.\",\n      \"rationale\": \"Logging is required for troubleshooting, security response, and evidentiary review.\",\n      \"controlReferences\": [\n        \"CC.SecurityCompliance.06.1.1\"\n      ],\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"logging\"\n          },\n          \"example\": \"Centralized Logging or a managed SIEM pipeline.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"loggingApproach\",\n          \"example\": \"A documented log shipping design for cases where the platform is described indirectly.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"security-monitoring\",\n      \"description\": \"The host must address endpoint security or runtime security monitoring.\",\n      \"rationale\": \"Hosts must show how they are protected and observed by a security control plane.\",\n      \"controlReferences\": [\n        \"CC.SecurityCompliance.06.3.1\"\n      ],\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"security\"\n          },\n          \"example\": \"CrowdStrike Falcon Platform or Wiz Cloud Security.\"\n        },\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"role\": \"agent\"\n          },\n          \"example\": \"An installed security agent ABB that enables the platform interaction.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"securityMonitoringApproach\",\n          \"example\": \"A documented statement of the host security monitoring pattern.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"patch-management\",\n      \"description\": \"The host must address how patching is orchestrated and what operational mechanism applies updates.\",\n      \"rationale\": \"Patching is a governance control, not an implementation detail that can be left implicit.\",\n      \"controlReferences\": [\n        \"CC.SecurityCompliance.03.1.1\",\n        \"CC.SecurityCompliance.03.2.1\"\n      ],\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"externalInteraction\",\n          \"criteria\": {\n            \"capability\": \"patch-management\"\n          },\n          \"example\": \"Automox Patch Management.\"\n        },\n        {\n          \"mechanism\": \"internalComponent\",\n          \"criteria\": {\n            \"role\": \"agent\"\n          },\n          \"example\": \"An endpoint agent ABB that performs or coordinates patch execution.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"patchManagementApproach\",\n          \"example\": \"A documented patch orchestration model when a platform interaction is not explicitly modeled.\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"variant-defined\",\n      \"description\": \"At least one host variant must exist and document its patching cadence and backup approach.\",\n      \"rationale\": \"A host standard is incomplete unless at least one supported operating mode is documented with its maintenance and recovery posture.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"patchingCadence\",\n          \"example\": \"The HA or SA variant defines monthly or emergency-only patching.\"\n        },\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"backupApproach\",\n          \"example\": \"The HA or SA variant defines image backup, snapshot, or restore strategy.\"\n        }\n      ],\n      \"minimumSatisfactions\": 2\n    }\n  ],\n  \"_source\": \"aags/aag.host.yaml\"\n}", "existsInCatalog": true}, "aag.ra": {"id": "aag.ra", "name": "Reference Architecture Analysis Guideline", "type": "aag", "typeLabel": "AAG", "filterType": "aag", "category": "", "serviceCategory": "", "description": "Interview guide for defining a complete and usable Reference Architecture pattern.", "version": "1.0. ure the why behind the pattern design.", "canBeSatisfiedBy": [{"mechanism": "architecturalDecision", "key": "architecturalDecisions", "example": "all tiers HA, autoscaling on web tier, AlwaysOn on data tier"}], "minimumSatisfactions": 1}], "satisfiesAAG": [], "inherits": "", "requiredRBBs": [], "deployedRBBs": [], "deployedProductServices": [], "appliesPattern": "", "architectureRisksAndDecisions": [], "affectedComponent": "", "impact": "", "mitigationPath": "", "decisionRationale": "", "relatedARDs": [], "controlReferences": [], "linkedDA": "", "hasRiskRef": false, "outboundRefs": [], "referencedBy": [], "detail": "{\n  \"schemaVersion\": \"1.0\",\n  \"id\": \"aag.ra\",\n  \"type\": \"aag\",\n  \"name\": \"Reference Architecture Analysis Guideline\",\n  \"description\": \"Interview guide for defining a complete and usable Reference Architecture pattern.\",\n  \"version\": \"1.0.0\",\n  \"catalogStatus\": \"approved\",\n  \"lifecycleStatus\": \"invest\",\n  \"owner\": {\n    \"team\": \"cloud-architecture\",\n    \"contact\": \"cloud-architecture@example.com\"\n  },\n  \"tags\": [\n    \"ra\",\n    \"analysis\",\n    \"governance\"\n  ],\n  \"appliesTo\": {\n    \"type\": \"reference_architecture\"\n  },\n  \"requirements\": [\n    {\n      \"id\": \"pattern-type\",\n      \"description\": \"The RA must have a descriptive unique name that allows an engineering leader to identify whether their application fits the pattern.\",\n      \"rationale\": \"An ambiguous pattern name leads to misapplication and inconsistent deployments.\",\n      \"canBeSatisfiedBy\": [\n        {\n          \"mechanism\": \"architecturalDecision\",\n          \"key\": \"patternType\",\n          \"example\": \"3-Tier .NET High Availability, 2-Tier Java Standard Performance\"\n        }\n      ],\n      \"minimumSatisfactions\": 1\n    },\n    {\n      \"id\": \"required-rbbs\",\n      \"description\": \"Every RBB required by this pattern must be listed with a role that describes its function       if (mechanism.mechanism === 'architecturalDecision') {
        return `architecturalDecision(key=${mechanism.key || 'unknown'})`;
      }
      return mechanism.mechanism || 'unknown';
    }

    function controlBadges(controls) {
      if (!controls || !controls.length) {
        return '<span class="interaction-notes">No control references</span>';
      }
      return controls.map(control => `<span class="control-badge">${escapeHtml(control)}</span>`).join('');
    }

    function aagRequirementsMarkup(object) {
      const requirements = object.requirements || [];
      if (!requirements.length) {
        return '<div class="empty-card">No requirements are documented for this AAG.</div>';

          <h3>Requirements</h3>
          <div class="section-stack">

              <article class="requirement-card">
                <div class="requirement-name">${escapeHtml(formatTitleCase(requirement.id || 'requirement'))}</div>

                  <div class="requirement-rationale-label">Rationale</div>
                  <div class="requirement-rationale">${escapeHtml(requirement.rationale)}</div>
                ` : ''}
                ${(requirement.controlReferences || []).length ? `
                  <div class="mechanism-label">Security and Compliance Controls</div>
                  <div class="control-badges">${controlBadges(requirement.controlReferences || [])}</div>
                ` : ''}
                <div class="mechanism-label">Can be satisfied by</div>
                <div class="mechanism-list">
                  ${(requirement.canBeSatisfiedBy || []).map(mechanism => `

                      <div class="mechanism-text">${escapeHtml(requirementMechanismSentence(mechanism))}</div>

              </article>

    function rbbAagMarkup(object) {
      const aagIds = object.satisfiesAAG || [];

        return '';
      }
      return `
        <section class="section-card">
          <h3>AAG Satisfaction</h3>

            ${aagIds.map(aagId => {
              const aag = objectLookup[aagId];
              const requirements = aag?.requirements || [];
              return `
                <article class="aag-card">
                  <div class="aag-name">Satisfies: ${escapeHtml(aagId)}</div>
                  ${requirements.length ? requirements.map(requirement => `
                    <div class="aag-control-line">└─ ${escapeHtml(requirement.id || 'requirement')} → ${escapeHtml((requirement.controlReferences || []).join(', ') || 'No control references')}</div>
                  `).join('') : '<div class="interaction-notes">No requirements found on referenced AAG.</div>'}
                </article>
              `;
            }).join('')}
          </div>
        </section>

    function daRisksMarkup(object) {
      const references = object.architectureRisksAndDecisions || [];

        <section class="section-card">

          <div class="section-stack">

                <article class="aag-card">
                  <div class="aag-name">
                    ${ard ? `<span class="ard-link" data-object-link="${ard.id}">${escapeHtml(ard.name)}</span>` : escapeHtml(entry.ref || 'Unknown ARD')}

                  <div class="object-id">${escapeHtml(entry.ref || '')}</div>
                </article>

            }).join('')}
          </div>
        </section>

    function deployedRbbTableMarkup(object) {

    function deployedProductServicesTableMarkup(object) {

                    <td>${item.variant ? variantBadge(item.variant) : ''}</td>
                    <td>${escapeHtml(item.location || '')}</td>
                    <td>${item.riskRef ? (risk ? `<span class="risk-badge" data-object-link="${risk.id}">⚠ ARD</span>` : `<span class="risk-badge" title="Missing ARD reference">⚠ Missing</span>`) : ''}</td>

    function productServiceDetailMarkup(object) {
      const variants = Object.entries(object.variants || {});
      return `
        <section class="section-card">
          <h3>Product Service</h3>
          <div class="section-stack">
            <div class="badges">
              ${productBadge(object.product)}
              ${lifecycleBadge(object.lifecycleStatus)}
            </div>
            <div><strong>ID:</strong> <span class="object-id">${escapeHtml(object.id)}</span></div>
            <div><strong>Runs On:</strong> ${object.runsOn && objectLookup[object.runsOn] ? `<span class="ard-link" data-object-link="${object.runsOn}">${escapeHtml(object.runsOn)}</span>` : escapeHtml(object.runsOn || '')}</div>
            <div class="header-description">${escapeHtml(object.description || 'No description provided.')}</div>
          </div>
        </section>
        <section class="section-card">
          <h3>Variants</h3>
          ${variants.length ? `
            <table class="data-table">
              <thead>
                <tr>
                  <th>Variant</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody>
                ${variants.map(([variantName, variant]) => `
                  <tr>
                    <td>${variantBadge(variantName)}</td>
                    <td>${escapeHtml(variant?.notes || '')}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          ` : '<div class="empty-card">No variants are documented for this product service.</div>'}
        </section>
      `;
    }

    function instanceLabel(value) {
      return formatTitleCase(String(value || 'unnamed').replace(/\./g, ' ').replace(/_/g, ' '));
    }

    function shortRefLabel(ref) {
      const object = objectLookup[ref];
      if (!object) {
        return formatTitleCase((ref || '').split('.').slice(-1)[0] || 'service');
      }
      return object.name
        .replace(/\s+(Web Service|Application Service|Database Service|Service)$/i, '')
        .replace(/\s+RBB$/i, '');
    }

    function topologyInteractionIcon(interaction) {
      const capability = interaction.capability || '';
      const name = String(interaction.name || '').toLowerCase();
      if (capability === 'load-balancing') return { icon: '🟢', cls: 'network' };
      if (name.includes('sftp')) return { icon: '📥', cls: 'storage' };
      if (capability === 'data-persistence') return { icon: '💾', cls: 'storage' };
      if (name.includes('lambda') || capability === 'compute') return { icon: 'λ', cls: 'compute' };
      if (name.includes('eks') || capability === 'container-orchestration') return { icon: '⬢', cls: 'compute' };
      return { icon: '☁', cls: 'cloud' };
    }

    function isContainerHostObject(object) {
      return !!object && object.type === 'rbb' && object.category === 'host' && String(object.id || '').startsWith('rbb.host.container.');
    }

    function topologyNodeIcon(entry, objectType = 'rbb') {
      const ref = entry.ref || '';
      const object = objectLookup[ref];
      const serviceObject = objectType === 'product_service' && object?.runsOn ? objectLookup[object.runsOn] : object;
      if (objectType === 'product_service' && isContainerHostObject(objectLookup[object?.runsOn])) {
        return { icon: '⬢', cls: 'pod' };
      }
      if (ref.startsWith('rbb.service.web.')) return { icon: '🖥', cls: '' };
      if (ref.startsWith('rbb.service.app.')) return { icon: '🗂', cls: '' };
      if (ref.startsWith('rbb.service.dbms.')) return { icon: '🛢', cls: '' };
      if (ref.startsWith('rbb.service.messaging.')) return { icon: '📬', cls: '' };
      if (serviceObject?.serviceCategory === 'web') return { icon: '🖥', cls: '' };
      if (serviceObject?.serviceCategory === 'app') return { icon: '🗂', cls: '' };
      if (serviceObject?.serviceCategory === 'dbms') return { icon: '🛢', cls: '' };
      if (serviceObject?.serviceCategory === 'messaging') return { icon: '📬', cls: '' };
      return { icon: '🖧', cls: '' };
    }

    function locationPresentation(location) {
      const text = String(location || 'Unspecified');
      if (/AWS Account/i.test(text)) {
        return { cls: 'aws', badge: 'AWS', icon: '🟧' };
      }
      if (/Datacenter|\bDC\b/i.test(text)) {
        return { cls: 'datacenter', badge: 'DC', icon: '☁' };
      }
      return { cls: 'generic', badge: 'Host', icon: '🖧' };
    }

    function clusterReplicaCount(entry) {
      const service = objectLookup[entry.ref];
      const count = service?.variants?.ha?.architecturalDecisions?.minNodes;
      return Number.isInteger(count) && count > 0 ? count : 3;
    }

    function topologyNodeMarkup(entry, options = {}) {
      const {
        objectType = 'rbb',
        overrideLabel = null,
        meta = '',
        variant = entry.variant || '',
        psLabel = false,
      } = options;
      const icon = topologyNodeIcon(entry, objectType);
      const risk = entry.riskRef ? objectLookup[entry.riskRef] : null;
      const targetId = entry.ref || '';
      return `
        <article class="topology-node ${icon.cls} ${psLabel ? 'ps-node' : ''}" ${targetId && objectLookup[targetId] ? `data-object-link="${escapeHtml(targetId)}"` : ''}>
          ${entry.riskRef ? (risk ? `<span class="topology-risk" data-object-link="${risk.id}" title="${escapeHtml(risk.name)}">⚠</span>` : `<span class="topology-risk" title="Missing ARD reference">?</span>`) : ''}
          <div class="topology-node-flags">
            ${psLabel ? '<span class="ps-corner">PS</span>' : '<span></span>'}
            ${psLabel && variant ? variantBadge(variant) : '<span></span>'}
          </div>
          <span class="topology-node-icon ${icon.cls}">${icon.icon}</span>
          <div class="topology-node-label">${escapeHtml(overrideLabel || instanceLabel(entry.instance))}</div>
          ${meta ? `<div class="topology-node-meta">${escapeHtml(meta)}</div>` : ''}
        </article>
      `;
    }

    function clusterMarkup(ref, entries, options = {}) {
      const { objectType = 'rbb' } = options;
      const service = objectLookup[ref];
      const labelBase = shortRefLabel(ref);
      const clusterLabel = service?.serviceCategory === 'web' ? `${labelBase} ASG` : `${labelBase} Cluster`;
      const cards = [];
      entries.forEach(entry => cards.push(topologyNodeMarkup(entry, { objectType, psLabel: objectType === 'product_service' })));
      return `
        <section class="cluster-box">
          <div class="cluster-label">${escapeHtml(clusterLabel)}</div>
          <div class="node-grid">
            ${cards.join('')}
          </div>
        </section>
      `;
    }

    function renderDeploymentTopology(da) {
      const deployedProductServices = da.deployedProductServices || [];
      const deployedRbbs = da.deployedRBBs || [];
      const deployed = [...deployedProductServices, ...deployedRbbs];
      const knownLocations = deployed.map(item => item.location).filter(Boolean);
      const defaultLocation = knownLocations[0] || 'Unspecified';
      const byLocation = new Map();

      deployed.forEach(entry => {
        const location = entry.location || defaultLocation || 'Unspecified';
        if (!byLocation.has(location)) {
          byLocation.set(location, []);
        }
        byLocation.get(location).push(entry);
      });

      const externalMarkup = (da.externalInteractions || []).length ? `
        <section class="topology-strip">
          <div class="legend-title">External Interactions</div>
          <div class="topology-strip-grid">
            ${(da.externalInteractions || []).map(interaction => {
              const icon = topologyInteractionIcon(interaction);
              return `
                <article class="topology-interaction">
                  <span class="topology-interaction-icon ${icon.cls}">${icon.icon}</span>
                  <div class="topology-node-label">${escapeHtml(interaction.name || 'External Interaction')}</div>
                  <div class="topology-node-meta">${escapeHtml(interaction.capability || 'other')}</div>
                </article>
              `;
            }).join('')}
          </div>
        </section>
      ` : '';

      const locationMarkup = [...byLocation.entries()].map(([location, entries]) => {
        const meta = locationPresentation(location);
        const productServices = entries.filter(entry => deployedProductServices.includes(entry));
        const rbbs = entries.filter(entry => deployedRbbs.includes(entry));
        const eksEntries = productServices.filter(entry => isContainerHostObject(objectLookup[objectLookup[entry.ref]?.runsOn]));
        const standardPsEntries = productServices.filter(entry => !isContainerHostObject(objectLookup[objectLookup[entry.ref]?.runsOn]));
        const psClusters = new Map();
        const standalonePs = [];
        const rbbClusters = new Map();
        const standaloneRbbs = [];

        standardPsEntries.forEach(entry => {
          const key = `${entry.ref}::${entry.variant}`;
          if (entry.variant === 'ha') {
            if (!psClusters.has(key)) {
              psClusters.set(key, []);
            }
            psClusters.get(key).push(entry);
          } else {
            standalonePs.push(entry);
          }
        });

        rbbs.forEach(entry => {
          if (entry.variant === 'ha') {
            const key = `${entry.ref}::${entry.variant}`;
            if (!rbbClusters.has(key)) {
              rbbClusters.set(key, []);
            }
            rbbClusters.get(key).push(entry);
          } else {
            standaloneRbbs.push(entry);
          }
        });

        return `
          <section class="location-box ${meta.cls}">
            <div class="location-header">
              <div class="location-title">${escapeHtml(location)}</div>
              <span class="location-badge">${meta.icon} ${escapeHtml(meta.badge)}</span>
            </div>
            <div class="location-content">
              ${[...psClusters.entries()]
                .map(([key, groupEntries]) => groupEntries.length > 1 ? clusterMarkup(key.split('::')[0], groupEntries, { objectType: 'product_service' }) : `<div class="node-grid">${groupEntries.map(entry => topologyNodeMarkup(entry, { objectType: 'product_service', psLabel: true })).join('')}</div>`)
                .join('')}
              ${standalonePs.length ? `<div class="node-grid">${standalonePs.map(entry => topologyNodeMarkup(entry, { objectType: 'product_service', psLabel: true })).join('')}</div>` : ''}
              ${standaloneRbbs.length ? `<div class="node-grid">${standaloneRbbs.map(entry => topologyNodeMarkup(entry, { objectType: 'rbb' })).join('')}</div>` : ''}
              ${[...rbbClusters.entries()].map(([key, groupEntries]) => clusterMarkup(key.split('::')[0], groupEntries, { objectType: 'rbb' })).join('')}
              ${eksEntries.length ? `
                <section class="eks-box">
                  <div class="eks-label">EKS</div>
                  <div class="node-grid">
                    ${eksEntries.map(entry => topologyNodeMarkup(entry, { objectType: 'product_service', psLabel: true })).join('')}
                  </div>
                </section>
              ` : ''}
            </div>
          </section>
        `;
      }).join('');

      return `
        <div class="topology-layout">
          ${externalMarkup}
          <div class="topology-locations">
            ${locationMarkup || '<div class="empty-card">No deployment topology data is available for this deployment architecture.</div>'}
          </div>
        </div>
      `;
    }

    function ardDetailMarkup(object) {
      return `
        <section class="ard-detail-card">
          <h2 class="ard-detail-title">${escapeHtml(object.name)}</h2>
          <div class="ard-meta">
            <span>${escapeHtml(object.id)}</span>
            ${ardCategoryBadge(object.ardCategory)}
            ${ardStatusBadge(object.status)}
            ${object.linkedDA && objectLookup[object.linkedDA] ? `<span>Linked DA: <span class="ard-link" data-object-link="${object.linkedDA}">${escapeHtml(object.linkedDA)}</span></span>` : object.linkedDA ? `<span>Linked DA: ${escapeHtml(object.linkedDA)}</span>` : ''}
          </div>
          <section class="ard-section">
            <h3>Description</h3>
            <p>${escapeHtml(object.description || '')}</p>
          </section>
          <section class="ard-section">
            <h3>Affected Component</h3>
            <div>${escapeHtml(object.affectedComponent || '')}</div>
          </section>
          <section class="ard-section">
            <h3>Impact</h3>
            <p>${escapeHtml(object.impact || '')}</p>
          </section>
          ${object.mitigationPath ? `
            <section class="ard-section">
              <h3>Mitigation Path</h3>
              <p>${escapeHtml(object.mitigationPath)}</p>
            </section>
          ` : ''}
          ${object.decisionRationale ? `
            <section class="ard-section">
              <h3>Decision Rationale</h3>
              <p>${escapeHtml(object.decisionRationale)}</p>
            </section>
          ` : ''}
          ${(object.relatedARDs || []).length ? `
            <section class="ard-section">
              <h3>Related ARDs</h3>
              <div class="section-stack">
                ${object.relatedARDs.map(ardId => objectLookup[ardId]
                  ? `<span class="ard-link" data-object-link="${ardId}">${escapeHtml(ardId)}</span>`
                  : `<span>${escapeHtml(ardId)}</span>`
                ).join('')}
              </div>
            </section>
          ` : ''}
        </section>
      `;
    }

    function usedByMarkup(object) {
      const inbound = object.referencedBy || [];
      if (!inbound.length) {
        return '';
      }
      return `
        <section class="section-card">
          <h3>Used By</h3>
          <div class="section-stack">
            ${inbound.map(reference => {
              const source = objectLookup[reference.source];
              return `
                <article class="aag-card">
                  <div class="aag-name">
                    ${source ? `<span class="ard-link" data-object-link="${source.id}">${escapeHtml(source.name)}</span>` : escapeHtml(reference.source)}
                  </div>
                  <div class="object-id">${escapeHtml(reference.source)}</div>
                  <div class="interaction-notes">${escapeHtml(reference.path || '')}</div>
                </article>
              `;
            }).join('')}
          </div>
        </section>
      `;
    }

    function genericObjectMarkup(object) {
      const detail = JSON.parse(object.detail || '{}');
      const rows = Object.entries(detail)
        .filter(([key]) => !key.startsWith('_'))
        .map(([key, value]) => {
          const rendered = typeof value === 'object' ? JSON.stringify(value) : String(value);
          return `<dt>${escapeHtml(key)}</dt><dd>${escapeHtml(rendered)}</dd>`;
        })
        .join('');
      return `
        <section class="section-card">
          <h3>Object Data</h3>
          <dl class="definition-list">
            ${rows}
          </dl>
        </section>
      `;
    }

    function attachObjectLinkHandlers(root = document) {
      root.querySelectorAll('[data-object-link]').forEach(link => {
        link.addEventListener('click', event => {
          event.stopPropagation();
          showDetailView(link.dataset.objectLink);
        });
      });
    }

    function showDetailView(id, pushHistory = true) {
      if (pushHistory && currentDetailId) {
        navHistory.push(currentDetailId);
      }
      currentDetailId = id;
      destroyImpactCy();
      renderDetailView();
    }

    function renderDetailView() {
      currentMode = 'detail';
      const object = objectLookup[currentDetailId];
      if (!object) {
        renderListView();
        return;
      }
      syncHashForDetailView(object.id);
      renderSidebarContent(currentFilterMarkup());
      const headerMarkup = `
        <section class="header-card">
          <div class="header-top">
            <div class="header-title">
              <h2>${escapeHtml(object.name)}</h2>
              <div class="object-id">${escapeHtml(object.id)}</div>
            </div>
            <div class="badges">
              <span class="badge">${escapeHtml(object.typeLabel)}</span>
              ${lifecycleBadge(object.lifecycleStatus)}
              ${catalogBadge(object.catalogStatus)}
            </div>
          </div>
          <div class="header-description">${escapeHtml(object.description || 'No description provided.')}</div>
          <div class="owner-line">
            <span><strong>Owner:</strong> ${escapeHtml(object.owner?.team || 'Unknown')}</span>
            <span><strong>Contact:</strong> ${escapeHtml(object.owner?.contact || 'Unknown')}</span>
            <span><strong>Source:</strong> ${escapeHtml(object.source || 'Generated')}</span>
          </div>
        </section>
      `;

      let detailBody = '';
      if (object.type === 'aag') {
        detailBody = `
          ${headerMarkup}
          ${aagRequirementsMarkup(object)}
          ${usedByMarkup(object)}
        `;
      } else if (object.type === 'ard') {
        detailBody = `
          ${ardDetailMarkup(object)}
          ${usedByMarkup(object)}
        `;
      } else if (object.type === 'product_service') {
        detailBody = `
          ${headerMarkup}
          ${productServiceDetailMarkup(object)}
          ${usedByMarkup(object)}
        `;
      } else if (object.type === 'deployment_architecture') {
        detailBody = `
          ${headerMarkup}
          <div class="detail-tabs">
            <button class="detail-tab" data-da-tab="details">Details</button>
            <button class="detail-tab active" data-da-tab="topology">Deployment Topology</button>
          </div>
          <div class="detail-panel" data-da-panel="details" hidden>
            <section class="section-card">
              <h3>Applied Pattern</h3>
              <div class="section-stack">
                ${object.appliesPattern && objectLookup[object.appliesPattern]
                  ? `<span class="ard-link" data-object-link="${object.appliesPattern}">${escapeHtml(object.appliesPattern)}</span>`
                  : `<span class="interaction-notes">${escapeHtml(object.appliesPattern || 'No applied reference architecture documented.')}</span>`}
              </div>
            </section>
            ${deployedProductServicesTableMarkup(object)}
            ${deployedRbbTableMarkup(object)}
            <section class="section-card">
              <h3>External Interactions</h3>
              ${interactionMarkup(object)}
            </section>
            ${daRisksMarkup(object)}
            <section class="decisions-card">
              <h3>Architectural Decisions</h3>
            ${object.architecturalDecisions && Object.keys(object.architecturalDecisions).length
                ? `<div class="decisions-grid single"><section class="decision-card"><dl class="definition-list">${Object.entries(object.architecturalDecisions).map(([key, value]) => `<dt>${escapeHtml(key)}</dt><dd>${escapeHtml(Array.isArray(value) ? value.join(', ') : String(value))}</dd>`).join('')}</dl></section></div>`

    function destroyDetailCy() {
      if (detailCy) {
        detailCy.destroy();
        detailCy = null;

    function buildDetailElements(object) {
      const nodes = [
        {
          data: {
            id: object.id,
            label: object.name,
            shape: object.shape,
            color: object.color,
            lifecycleStatus: object.lifecycleStatus,
            nodeWidth: object.type === 'abb' || object.type === 'rbb' ? 150 : 140,
            nodeHeight: object.type === 'abb' || object.type === 'rbb' ? 90 : 80,
            textMaxWidth: object.type === 'abb' || object.type === 'rbb' ? 150 : 140
          },
          classes: object.name.length > 20 ? 'long-label' : ''
        }
      ];
      const edges = [];
      const seen = new Set([object.id]);

      (object.internalComponents || []).forEach((component, index) => {
        const refObject = objectLookup[component.ref];
        if (!refObject || seen.has(refObject.id)) {
          return;
        }
        seen.add(refObject.id);
        nodes.push({
          data: {
            id: refObject.id,
            label: refObject.name,
            shape: refObject.shape,
            color: refObject.color,
            lifecycleStatus: refObject.lifecycleStatus,
            nodeWidth: refObject.type === 'abb' || refObject.type === 'rbb' ? 140 : 130,
            nodeHeight: refObject.type === 'abb' || refObject.type === 'rbb' ? 84 : 78,
            textMaxWidth: refObject.type === 'abb' || refObject.type === 'rbb' ? 140 : 130
          },
          classes: refObject.name.length > 20 ? 'long-label' : ''
        });
        edges.push({
          data: {
            id: `${object.id}-${refObject.id}-${index}`,
            source: object.id,
            target: refObject.id,
            label: component.role || 'component'
          }
        });
      });

      return [...nodes, ...edges];
    }

    function renderInternalDiagram(object) {
      destroyDetailCy();
      detailCy = cytoscape({
        container: document.getElementById('detail-cy'),
        elements: buildDetailElements(object),
        layout: {

          padding: 30,

          roots: [object.id]

        style: [

              'shape': 'data(shape)',

              'color': 'e2e8f0',
              'font-size': 11,
              'text-wrap': 'wrap',
              'text-max-width': 'data(textMaxWidth)',
              'text-valign': 'center',
              'text-halign': 'center',
              'width': 'data(nodeWidth)',
              'height': 'data(nodeHeight)',

            }

    function outboundCatalogRefs(object) {
      return (object?.outboundRefs || [])
        .map(reference => objectLookup[reference.target])
        .filter(Boolean);
    }

    function inboundCatalogRefs(object) {
      return (referencedByIndex[object?.id] || [])
        .map(reference => objectLookup[reference.source])
        .filter(Boolean);
    }

    function traverseDown(object, visited, collector) {
      outboundCatalogRefs(object).forEach(target => {
        if (visited.has(target.id) || !deployableTypes.has(target.type)) {
          return;
        }
        visited.add(target.id);
        collector.add(target.id);
        traverseDown(target, visited, collector);
      });
    }

    function traverseUp(object, visited, collector) {
      inboundCatalogRefs(object).forEach(source => {
        if (visited.has(source.id) || !deployableTypes.has(source.type)) {
          return;
        }
        visited.add(source.id);
        collector.add(source.id);
        traverseUp(source, visited, collector);
      });
    }

    function computeImpactSelection(selectedId) {
      const selected = objectLookup[selectedId];
      const impacted = new Set();
      const siblings = new Set();

      if (!selected || !deployableTypes.has(selected.type)) {
        return { selected, impacted, siblings, supported: false };
      }

      if (selected.type === 'abb') {
        const parentObjects = inboundCatalogRefs(selected).filter(parent => deployableTypes.has(parent.type));
        parentObjects.forEach(parent => {
          impacted.add(parent.id);
          outboundCatalogRefs(parent).forEach(target => {
            if (target.id !== selected.id && deployableTypes.has(target.type)) {
              siblings.add(target.id);
            }
          });
          traverseUp(parent, new Set([selected.id, parent.id]), impacted);
        });
      } else if (selected.type === 'deployment_architecture') {
        traverseDown(selected, new Set([selected.id]), impacted);
      } else {
        traverseDown(selected, new Set([selected.id]), impacted);
        traverseUp(selected, new Set([selected.id]), impacted);
      }

      siblings.delete(selected.id);
      impacted.delete(selected.id);
      return { selected, impacted, siblings, supported: true };
    }

    function impactHighlightColor(kind) {
      if (kind === 'selected') return '#f59e0b';
      if (kind === 'sibling') return '#8b5cf6';
      return '#ef4444';
    }

    function groupedImpactObjects(selection) {
      const grouped = {};
      if (!selection.selected || !selection.supported) {
        return grouped;
      }

      const allIds = new Set([selection.selected.id, ...selection.impacted, ...selection.siblings]);
      [...allIds].forEach(id => {
        const object = objectLookup[id];
        if (!object || !deployableTypes.has(object.type)) {
          return;
        }
        const group = impactGroupForObject(object);
        const kind = id === selection.selected.id ? 'selected' : selection.siblings.has(id) ? 'sibling' : 'impacted';
        if (!grouped[group]) {
          grouped[group] = [];
        }
        grouped[group].push({ object, kind });
      });

      impactOrder.forEach(group => {
        if (grouped[group]) {
          grouped[group].sort((a, b) => a.object.name.localeCompare(b.object.name));
        }
      });
      return grouped;
    }

    function impactSidebarMarkup(selection) {
      const searchMatches = impactSearchTerm

          }).slice(0, 8)
        : [];

      const grouped = groupedImpactObjects(selection);
      const orderedGroups = [...impactOrder.filter(group => grouped[group]?.length), ...Object.keys(grouped).filter(group => !impactOrder.includes(group) && grouped[group]?.length)];
      const hasItems = orderedGroups.length > 0;

      return `
        <div class="sidebar-block">

          <div class="current-filter"><span class="dot" style="background:#38bdf8"></span><span>${escapeHtml(activeFilter)}</span></div>
        </div>
        <aside class="impact-sidebar">
          <div>
            <h3 style="margin:0 0 10px">Impact Analysis</h3>
            <input id="impact-search" class="impact-search" type="text" placeholder="Search by name or ID" value="${escapeHtml(impactSearchTerm)}">
          </div>
          ${searchMatches.length ? `

              ${searchMatches.map(match => `
                <div class="search-result" data-impact-select="${match.id}">

            </div>
          ` : impactSearchTerm ? '<div class="empty-card">No matching catalog objects.</div>' : ''}
          ${!impactSelectedId ? '<div class="empty-card">Search for an object to see its impact chain</div>' : ''}
          ${impactSelectedId && !selection.supported ? '<div class="empty-card">Impact analysis is available for catalog objects that participate in references.</div>' : ''}
          ${impactSelectedId && selection.supported && !hasItems ? '<div class="empty-card">No impacted catalog objects were found for the selected object.</div>' : ''}
          ${impactSelectedId && selection.supported && hasItems ? orderedGroups.map(group => grouped[group].length ? `
            <section class="impact-group">
              <h4>${escapeHtml(formatTypeLabel(group))}</h4>
              <div class="impact-group-list">
                ${grouped[group].map(entry => `
                  <div class="impact-item" data-impact-select="${entry.object.id}">
                    <div class="impact-item-top">
                      <span class="impact-dot" style="background:${impactHighlightColor(entry.kind)}"></span>
                      <strong>${escapeHtml(entry.object.name)}</strong>
                    </div>
                    <div class="object-id">${escapeHtml(entry.object.id)}</div>
                  </div>
                `).join('')}
              </div>
            </section>
          ` : '').join('') : ''}

      `;
    }

    function lifecycleFilterButtonsMarkup() {
      return `
        <div class="lifecycle-filter-row">
          ${impactLifecycleOrder.map(status => {
            const active = !!impactLifecycleFilters[status];
            const color = '#' + lifecycleColors[status];
            const classes = ['lifecycle-filter-button', active ? 'active' : '', status === 'exit' ? 'exit-filter' : '']
              .filter(Boolean)
              .join(' ');
            const style = active ? `background:${color};` : '';
            return `<button class="${classes}" style="${style}" data-impact-lifecycle="${status}">${escapeHtml(status)}</button>`;
          }).join('')}
        </div>
      `;
    }

    function buildImpactElements() {
      const cyNodes = allObjects
        .filter(object => deployableTypes.has(object.type))
        .map(object => ({
          data: {
            id: object.id,
            label: object.hasRiskRef ? `⚠ ${object.name}` : object.name,
            type: object.type,
            category: object.category || '',
            serviceCategory: object.serviceCategory || '',
            lifecycleStatus: object.lifecycleStatus,
            shape: object.type === 'reference_architecture' || object.type === 'deployment_architecture' ? 'round-rectangle' : object.shape,
            color: object.color,
            borderStyle: object.type === 'reference_architecture' ? 'dashed' : 'solid',
            nodeWidth: object.type === 'abb' || object.type === 'rbb' ? 145 : 150,
            nodeHeight: object.type === 'abb' || object.type === 'rbb' ? 86 : 92,
            textMaxWidth: object.type === 'abb' || object.type === 'rbb' ? 145 : 150
          },
          classes: object.name.length > 20 ? 'long-label' : ''
        }));

      const edgeIds = new Set();
      const edges = [];
      allObjects.filter(object => deployableTypes.has(object.type)).forEach(object => {
        (object.outboundRefs || []).forEach(reference => {
          if (objectLookup[reference.target] && deployableTypes.has(objectLookup[reference.target].type)) {
            const id = `${object.id}->${reference.target}:${reference.path}`;
            if (!edgeIds.has(id)) {
              edgeIds.add(id);
              edges.push({ data: { id, source: object.id, target: reference.target } });
            }
          }
        });
      });

      return [...cyNodes, ...edges];
    }

    function visibleImpactNodes() {
      return impactCy ? impactCy.nodes(':visible') : cytoscape().collection();
    }

    function serviceRbbNodesSorted(nodes) {
      const order = ['web', 'app', 'file', 'messaging', 'cache', 'dbms'];
      return nodes
        .filter(node => node.data('type') === 'rbb' && node.data('category') === 'service')
        .sort((a, b) => {
          const aCategory = a.data('serviceCategory') || 'other';
          const bCategory = b.data('serviceCategory') || 'other';
          const aIndex = order.includes(aCategory) ? order.indexOf(aCategory) : order.indexOf('cache');
          const bIndex = order.includes(bCategory) ? order.indexOf(bCategory) : order.indexOf('cache');
          if (aIndex !== bIndex) return aIndex - bIndex;
          return String(a.data('label') || '').localeCompare(String(b.data('label') || ''));
        });
    }

    function computeImpactPositions(nodes, containerWidth) {
      const ROW_HEIGHT = 120;
      const NODE_SPACING = 140;
      const TIER_GAP = 40;
      const safeWidth = Math.max(320, Math.floor(containerWidth));
      const nodeList = nodes.toArray();
      const knownIds = new Set();
      const addTier = tierNodes => {
        tierNodes.forEach(node => knownIds.add(node.id()));
        return tierNodes;
      };
      const tiers = [
        addTier(nodeList.filter(node => node.data('type') === 'deployment_architecture')),
        addTier(nodeList.filter(node => node.data('type') === 'reference_architecture')),
        addTier(nodeList.filter(node => node.data('type') === 'product_service')
          .sort((a, b) => String(a.data('label') || '').localeCompare(String(b.data('label') || '')))),
        addTier(serviceRbbNodesSorted(nodes)),
        addTier(nodeList.filter(node => node.data('type') === 'rbb' && node.data('category') === 'host')
          .sort((a, b) => String(a.data('label') || '').localeCompare(String(b.data('label') || '')))),
        addTier(nodeList.filter(node => node.data('type') === 'abb')
          .sort((a, b) => String(a.data('label') || '').localeCompare(String(b.data('label') || '')))),
        addTier(nodeList.filter(node => !knownIds.has(node.id()))
          .sort((a, b) => String(a.data('label') || '').localeCompare(String(b.data('label') || ''))))
      ];

      const positions = {};
      let currentY = 60;

      tiers.forEach(tierNodes => {
        if (!tierNodes.length) return;
        const nodesPerRow = Math.max(1, Math.floor(safeWidth / NODE_SPACING));
        tierNodes.forEach((node, index) => {
          const row = Math.floor(index / nodesPerRow);
          const col = index % nodesPerRow;
          const rowCount = Math.min(nodesPerRow, tierNodes.length - row * nodesPerRow);
          const contentWidth = Math.max(NODE_SPACING, (rowCount - 1) * NODE_SPACING);
          const startX = Math.max(40, (safeWidth - contentWidth) / 2);
          positions[node.id()] = {
            x: startX + col * NODE_SPACING,
            y: currentY + row * ROW_HEIGHT
          };
        });
        const rowsInTier = Math.ceil(tierNodes.length / nodesPerRow);
        currentY += rowsInTier * ROW_HEIGHT + TIER_GAP;
      });

      return positions;
    }

    function applyImpactLifecycleVisibility() {
      if (!impactCy) return;
      impactLifecycleOrder.forEach(status => {
        const selector = `node[lifecycleStatus = "${status}"]`;
        if (impactLifecycleFilters[status]) {
          impactCy.nodes(selector).show();
        } else {
          impactCy.nodes(selector).hide();
        }
      });
      impactCy.edges().forEach(edge => {
        if (edge.source().visible() && edge.target().visible()) {
          edge.show();
        } else {
          edge.hide();
        }
      });
    }

    function rerunImpactLayout() {
      if (!impactCy) return;
      impactCy.resize();
      applyImpactLifecycleVisibility();
      const container = document.getElementById('impact-cy');
      const containerWidth = (container?.clientWidth || impactCy.width() || 960) - 24;
      const visibleNodes = impactCy.nodes(':visible');
      const positions = computeImpactPositions(visibleNodes, containerWidth);
      impactCy.layout({
        name: 'preset',
        positions
      }).run();
      impactCy.resize();
    }

    function applyImpactStyles(selection) {
      if (!impactCy) return;
      impactCy.nodes().removeClass('selected-impact impacted-impact sibling-impact dim-impact base-impact');
      impactCy.edges().removeClass('active-edge dim-edge');

      if (!impactSelectedId || !selection.supported || !selection.selected || !impactCy.getElementById(selection.selected.id).nonempty()) {
        impactCy.nodes(':visible').addClass('base-impact');
        return;
      }

      impactCy.nodes(':visible').removeClass('base-impact').addClass('dim-impact');
      impactCy.edges().addClass('dim-edge');

      const highlighted = new Set([selection.selected.id, ...selection.impacted, ...selection.siblings]);
      highlighted.forEach(id => {
        const node = impactCy.getElementById(id);
        if (!node.nonempty()) return;
        node.removeClass('dim-impact');
        if (id === selection.selected.id) {
          node.addClass('selected-impact');
        } else if (selection.siblings.has(id)) {
          node.addClass('sibling-impact');
        } else {
          node.addClass('impacted-impact');
        }
      });

      impactCy.edges().forEach(edge => {
        if (highlighted.has(edge.source().id()) && highlighted.has(edge.target().id())) {
          edge.removeClass('dim-edge').addClass('active-edge');
        }
      });
    }

    function renderImpactGraph(selection) {
      destroyDetailCy();
      destroyImpactCy();
      impactCy = cytoscape({
        container: document.getElementById('impact-cy'),
        elements: buildImpactElements(),
        layout: { name: 'preset', positions: {} },
        style: [
          {
            selector: 'node',
            style: {
              'label': 'data(label)',
              'shape': 'data(shape)',
              'background-color': 'data(color)',
              'border-width': 2,
              'border-style': 'data(borderStyle)',
              'border-color': '334155',
              'color': 'e2e8f0',
              'font-size': 10,
              'text-wrap': 'wrap',
              'text-max-width': 'data(textMaxWidth)',
              'text-valign': 'center',
              'text-halign': 'center',
              'width': 'data(nodeWidth)',
              'height': 'data(nodeHeight)',
              'cursor': 'pointer',
              'opacity': 1
            }
          },
          {
            selector: 'edge',
            style: {
              'curve-style': 'bezier',
              'width': 1.8,
              'line-color': '64748b',
              'target-arrow-color': '64748b',
              'target-arrow-shape': 'triangle',
              'opacity': 0.35
            }
          },
          {
            selector: 'node.base-impact',
            style: {
              'opacity': 1
            }
          },
          {
            selector: 'node.dim-impact',
            style: {
              'opacity': 0.15
            }
          },
          {
            selector: 'node.selected-impact',
            style: {
              'opacity': 1,
              'border-color': 'f59e0b',
              'border-width': 4
            }
          },
          {
            selector: 'node.impacted-impact',
            style: {
              'opacity': 1,
              'border-color': 'ef4444',
              'border-width': 3
            }
          },
          {
            selector: 'node.sibling-impact',
            style: {
              'opacity': 1,
              'border-color': '8b5cf6',
              'border-width': 3
            }
          },
          {
            selector: 'edge.active-edge',
            style: {
              'opacity': 0.75
            }
          },
          {
            selector: 'edge.dim-edge',
            style: {
              'opacity': 0.1
            }
          }
        ]
      });
      impactCy.on('tap', 'node', evt => {
        selectImpactObject(evt.target.data('id'));
      });
      applyImpactLifecycleVisibility();
      applyImpactStyles(selection);
      rerunImpactLayout();
    }

    function runImpactAnalysis(id) {
      impactSelectedId = id;
      renderImpactView();
    }

    function selectImpactObject(id, promoteToSearch = false) {
      if (promoteToSearch && objectLookup[id]) {
        impactSearchTerm = objectLookup[id].name;
      }
      runImpactAnalysis(id);
    }

    function renderImpactView() {
      currentMode = 'impact';
      syncHashForImpactView();
      const selection = impactSelectedId ? computeImpactSelection(impactSelectedId) : { selected: null, impacted: new Set(), siblings: new Set(), supported: false };
      renderSidebarContent(impactSidebarMarkup(selection));
      appRoot.innerHTML = `
        <div class="view-shell">
          ${topNavMarkup()}
          <section class="impact-graph-card">
            <div class="impact-graph-top">
              <h3 style="margin:0">Impact Graph</h3>
              ${lifecycleFilterButtonsMarkup()}
            </div>
            <div id="impact-cy"></div>
          </section>
        </div>
      `;

      attachTopNavHandlers();
      const searchInput = document.getElementById('impact-search');
      if (searchInput) {
        searchInput.addEventListener('input', event => {
          impactSearchTerm = event.target.value;
          const cursorStart = event.target.selectionStart ?? impactSearchTerm.length;
          const cursorEnd = event.target.selectionEnd ?? impactSearchTerm.length;

          const refreshedInput = document.getElementById('impact-search');
          if (refreshedInput) {
            refreshedInput.focus();
            refreshedInput.setSelectionRange(cursorStart, cursorEnd);

          if (event.key === 'Enter') {

              runImpactAnalysis(firstMatch.id);

      appRoot.querySelectorAll('[data-impact-select]').forEach(item => {

          renderImpactView();
        });
      });
      renderImpactGraph(selection);
    }

    window.addEventListener('resize', () => {
      if (detailCy) {
        detailCy.resize();
        detailCy.fit(detailCy.elements(), 28);
      }
      if (impactCy) {
        rerunImpactLayout();
      }
    });

    window.addEventListener('hashchange', () => {
      applyRouteFromHash();
    });

    applyRouteFromHash();
  </script>
</body>
</html>
