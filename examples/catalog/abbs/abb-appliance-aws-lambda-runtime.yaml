schemaVersion: '1.0'
id: abb.appliance.aws-lambda-runtime
type: abb
subtype: appliance
name: AWS Lambda Runtime
description: 'AWS Lambda serverless execution environment. Runs organization-authored
  function code without requiring host management. Scales automatically. Host infrastructure
  is entirely blackbox.

  '
version: 1.0.0
catalogStatus: draft
lifecycleStatus: invest
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
tags:
- appliance
- lambda
vendor: Amazon Web Services
productName: AWS Lambda Runtime
productVersion: managed
classification: compute-platform
networkPlacement: vpc-private
patchingOwner: aws-managed
complianceCerts: []
externalInteractions:
- name: AWS IAM
  capabilities:
  - authentication
  notes: Lambda function and administrative access is controlled through AWS IAM.
- name: Amazon CloudWatch Logs
  capabilities:
  - log-management
  notes: Function logs are emitted to CloudWatch Logs for adopter visibility.
- name: Amazon CloudWatch Metrics
  capabilities:
  - health-welfare-monitoring
  notes: Runtime health and operational telemetry are observed through CloudWatch
    metrics and alarms.
architecturalDecisions:
  resilienceModel: Inherently multi-tenant and highly available within the AWS Lambda
    managed execution fabric.
  authenticationAccessModel: AWS IAM controls administrative access, function execution
    roles, and service-to-service authorization.
  configurableSurface: The adopter controls function configuration, IAM bindings,
    concurrency settings, environment variables, and event-source mappings.
  failureDomain: Shared serverless runtime dependency for the functions bound to this
    Lambda execution environment.
capabilities:
- compute
