schemaVersion: '1.0'
type: appliance_component
requiredFields:
- schemaVersion
- id
- type
- name
- vendor
- productName
- productVersion
- classification
- catalogStatus
- lifecycleStatus
optionalFields:
- description
- version
- owner
- tags
- capabilities
- configurations
- externalInteractions
- networkPlacement
- patchingOwner
- complianceCerts
- architecturalDecisions
- notes
- requirementGroups
- requirementImplementations
idPattern: ^appliance\.[a-z0-9-]+$
enumFields:
  catalogStatus:
  - stub
  - draft
  - approved
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
  networkPlacement:
  - public-facing
  - internal
  - vpc-private
  patchingOwner:
  - aws-managed
  - organization-scheduled
  - vendor-managed
  classification:
  - operating-system
  - compute-platform
  - software
  - agent
fieldTypes:
  owner: dict
  tags: list
  capabilities: list
  configurations: list
  externalInteractions: list
  complianceCerts: list
  architecturalDecisions: dict
  requirementGroups: list
  requirementImplementations: list
collectionSchemas:
  configurations: configuration
  externalInteractions: externalInteraction
  requirementImplementations: requirementImplementation
configuration:
  requiredFields:
  - id
  - name
  - description
  - capabilities
  fieldTypes:
    capabilities: list
externalInteraction:
  requiredFields:
  - capabilities
  optionalFields:
  - name
  - ref
  - notes
  - enabledBy
  fieldTypes:
    capabilities: list
requirementImplementation:
  requiredFields:
  - requirementGroup
  - requirementId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  fieldDescriptions:
    requirementGroup: Reference the requirement_group object that owns this requirement.
    requirementId: Reference the requirement id within the requirement group.
    status: Use satisfied, not-applicable, or not-compliant to record the object disposition.
  enumFields:
    status:
    - satisfied
    - not-applicable
    - not-compliant
    mechanism:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - externalInteraction
    - internalComponent
    - architecturalDecision
    - field
  fieldTypes:
    criteria: dict
aiHint: An Appliance Component is a vendor product that behaves like a service but has no
  modeled host, so an AI must answer service-like requirements directly on it.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally
    "1.0".
  id: Use a stable, namespaced object ID that matches this schema idPattern when one is declared.
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  vendor: Name the external vendor or provider for this technology or service.
  productName: Name the vendor product independently from the DRAFT object name.
  productVersion: Record the product version, release train, or managed/current marker.
  classification: Choose the one classification that describes the technology role.
  catalogStatus: Use stub, draft, or approved to describe catalog maturity, not company adoption
    disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired where this object
    still carries a lifecycle signal.
