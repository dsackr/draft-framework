schemaVersion: '1.0'
type: object_patch
requiredFields:
- schemaVersion
- id
- type
- name
- target
- patch
- catalogStatus
- lifecycleStatus
optionalFields:
- description
- version
- owner
- tags
- notes
idPattern: ^patch\.[a-z0-9.-]+$
enumFields:
  catalogStatus:
  - stub
  - draft
  - approved
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
fieldTypes:
  owner: dict
  tags: list
  patch: dict
aiHint: An Object Patch is a workspace overlay that deep-merges company or provider changes
  into a base framework object without editing the base copy.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally
    "1.0".
  id: Use a stable, namespaced object ID that matches this schema idPattern when one is declared.
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  target: Provide a valid target value for this object_patch object.
  patch: Provide a valid patch value for this object_patch object.
  catalogStatus: Use stub, draft, or approved to describe catalog maturity, not company adoption
    disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired where this object
    still carries a lifecycle signal.
