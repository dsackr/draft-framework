schemaVersion: '1.0'
type: product_service
requiredFields:
- schemaVersion
- id
- type
- name
- product
- runsOn
- catalogStatus
- lifecycleStatus
optionalFields:
- description
- version
- owner
- tags
- architecturalDecisions
- notes
- requirementGroups
- requirementImplementations
idPattern: ^product-service\.[a-z0-9-]+\.[a-z0-9-]+$
enumFields:
  catalogStatus:
  - stub
  - draft
  - approved
  lifecycleStatus:
  - pre-invest
  - invest
  - maintain
  - disinvest
  - exit
fieldTypes:
  owner: dict
  tags: list
  architecturalDecisions: dict
  requirementGroups: list
  requirementImplementations: list
collectionSchemas:
  requirementImplementations: requirementImplementation
requirementImplementation:
  requiredFields:
  - requirementGroup
  - requirementId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  fieldDescriptions:
    requirementGroup: Reference the requirement_group object that owns this requirement.
    requirementId: Reference the requirement id within the requirement group.
    status: Use satisfied, not-applicable, or not-compliant to record the object disposition.
  enumFields:
    status:
    - satisfied
    - not-applicable
    - not-compliant
    mechanism:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - externalInteraction
    - internalComponent
    - architecturalDecision
    - field
  fieldTypes:
    criteria: dict
aiHint: A Product Service defines a first-party runtime behavior inside a Software Deployment
  Pattern.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally
    "1.0".
  id: Use a stable, namespaced object ID that matches this schema idPattern when one is declared.
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  product: Provide a valid product value for this product_service object.
  runsOn: Provide a valid runsOn value for this product_service object.
  catalogStatus: Use stub, draft, or approved to describe catalog maturity, not company adoption
    disposition.
  lifecycleStatus: Use pre-invest, invest, maintain, disinvest, or exit where this object
    still carries a lifecycle signal.
