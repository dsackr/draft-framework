schemaVersion: '1.0'
type: product_service
requiredFields:
- schemaVersion
- uid
- type
- name
- product
- runsOn
- catalogStatus
- lifecycleStatus
optionalFields:
- aliases
- description
- version
- owner
- tags
- internalProcesses
- apiEndpoints
- internalComponents
- externalInteractions
- deploymentConfigurations
- architecturalDecisions
- notes
- requirementGroups
- requirementImplementations
enumFields:
  catalogStatus:
  - stub
  - draft
  - approved
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
fieldTypes:
  aliases: list
  owner: dict
  tags: list
  internalProcesses: list
  apiEndpoints: list
  internalComponents: list
  externalInteractions: list
  deploymentConfigurations: list
  architecturalDecisions: dict
  requirementGroups: list
  requirementImplementations: list
collectionSchemas:
  internalProcesses: internalProcess
  apiEndpoints: apiEndpoint
  internalComponents: internalComponent
  externalInteractions: externalInteraction
  deploymentConfigurations: deploymentConfiguration
  requirementImplementations: requirementImplementation
internalProcess:
  requiredFields:
  - name
  - role
  optionalFields:
  - description
  - exposesApi
  - communicationModel
  enumFields:
    communicationModel:
    - direct
    - queue-mediated
    - both
  fieldTypes:
    name: str
    role: str
    description: str
    exposesApi: bool
    communicationModel: str
  fieldDescriptions:
    name: Name the internal process, executable, worker, scheduler, conductor, or first-party runtime unit inside this Product Service.
    role: Use a short process role label such as api, worker, scheduler, conductor, or processor.
    description: Describe what this internal process does.
    exposesApi: Set true when this process directly exposes an API endpoint.
    communicationModel: Use direct, queue-mediated, or both to describe how this process communicates with peers or clients.
apiEndpoint:
  requiredFields:
  - name
  - protocol
  optionalFields:
  - path
  - authenticationModel
  - description
  - exposedBy
  enumFields:
    protocol:
    - REST
    - gRPC
    - GraphQL
    - WebSocket
    - AMQP
    - SMTP
    - other
    authenticationModel:
    - iam
    - api-key
    - oauth
    - saml
    - other
    - TBD
  fieldTypes:
    name: str
    path: str
    protocol: str
    authenticationModel: str
    description: str
    exposedBy: str
  fieldDescriptions:
    name: Name the API endpoint or interface exposed by this Product Service.
    path: Record the route, topic, queue, or address when one exists.
    protocol: Use REST, gRPC, GraphQL, WebSocket, AMQP, SMTP, or other for the interface protocol.
    authenticationModel: Use the service authentication model that applies to this endpoint.
    description: Describe the purpose or consumer-facing behavior of this endpoint.
    exposedBy: Reference the name of an internalProcesses entry that exposes this endpoint.
internalComponent:
  requiredFields:
  - ref
  optionalFields:
  - role
  - configuration
  - notes
  fieldTypes:
    ref: str
    role: str
    configuration: str
    notes: str
  fieldDescriptions:
    ref: Reference the Technology Component, Host, or deployable object consumed inside this Product Service.
    role: Describe the component role inside this Product Service.
    configuration: Reference a configuration id on the referenced Technology Component when this Product Service uses a specific named variant.
    notes: Add context that does not belong in role or configuration.
externalInteraction:
  requiredFields:
  - capabilities
  optionalFields:
  - name
  - ref
  - notes
  - enabledBy
  fieldTypes:
    capabilities: list
    name: str
    ref: str
    notes: str
    enabledBy: str
  fieldDescriptions:
    capabilities: List capability UIDs that this external interaction provides or supports.
    name: Name the external platform, service, or dependency when no catalog object is referenced.
    ref: Reference the catalog object that represents the interacted platform or service when it exists.
    notes: Explain how this Product Service interacts with the external dependency.
    enabledBy: Reference an internal Technology Component that enables this interaction, such as an agent or local client.
deploymentConfiguration:
  requiredFields:
  - id
  - name
  - description
  optionalFields:
  - addressesQualities
  - addsInternalComponents
  - addsExternalInteractions
  - addsArchitecturalDecisions
  - notes
  enumListFields:
    addressesQualities:
    - availability
    - scalability
    - recoverability
  fieldTypes:
    id: str
    name: str
    description: str
    addressesQualities: list
    addsInternalComponents: list
    addsExternalInteractions: list
    addsArchitecturalDecisions: dict
    notes: str
  fieldDescriptions:
    id: Use a stable id for this Product Service deployment variant.
    name: Name the deployment variant.
    description: Describe when this deployment variant is used.
    addressesQualities: List availability, scalability, or recoverability when this variant addresses those qualities.
    addsInternalComponents: List internal components added by this deployment variant.
    addsExternalInteractions: List external interactions added by this deployment variant.
    addsArchitecturalDecisions: Record architectural decisions added by this deployment variant.
    notes: Add context about the deployment variant.
requirementImplementation:
  requiredFields:
  - requirementGroup
  - requirementId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  fieldDescriptions:
    requirementGroup: Reference the requirement_group object that owns this requirement.
    requirementId: Reference the requirement id within the requirement group.
    status: Use satisfied, not-applicable, or not-compliant to record the object disposition.
  enumFields:
    status:
    - satisfied
    - not-applicable
    - not-compliant
    mechanism:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - externalInteraction
    - internalComponent
    - architecturalDecision
    - field
  fieldTypes:
    criteria: dict
aiHint: A Product Service defines first-party runtime behavior inside a Software Deployment Pattern and can document internal process decomposition, API surface, external interactions, internal component dependencies, and deployment variants.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally "1.0".
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  product: Provide a valid product value for this product_service object.
  runsOn: Provide a valid runsOn value for this product_service object.
  internalProcesses: List named first-party processes, workers, schedulers, conductors, or API units inside this Product Service.
  apiEndpoints: List APIs, protocol interfaces, topics, queues, or endpoint surfaces exposed by this Product Service.
  internalComponents: List Technology Components or deployable objects consumed inside this Product Service.
  externalInteractions: List outbound or external platform interactions used by this Product Service.
  deploymentConfigurations: List deployment variants that affect this Product Service architecture.
  catalogStatus: Use stub, draft, or approved to describe catalog maturity, not company adoption disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired where this object still carries a lifecycle signal.
  uid: Use the generated opaque UID for object identity. Do not edit it for display-name, product-name, or taxonomy changes.
  aliases: List prior or alternate human-readable names that should resolve to this object.
uidPattern: ^[0-9A-HJKMNP-TV-Z]{10}-[0-9A-HJKMNP-TV-Z]{4}$
