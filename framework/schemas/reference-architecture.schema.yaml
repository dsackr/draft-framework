schemaVersion: '1.0'
type: reference_architecture
requiredFields:
- schemaVersion
- id
- type
- name
- catalogStatus
- lifecycleStatus
optionalFields:
- description
- version
- owner
- tags
- patternType
- architecturalDecisions
- applicableDefinitionChecklist
- scalingUnits
- serviceGroups
- controlEnforcementProfiles
- controlImplementations
idPattern: ^reference-architecture\.[a-z0-9.-]+$
enumFields:
  catalogStatus:
  - stub
  - draft
  - approved
  lifecycleStatus:
  - pre-invest
  - invest
  - maintain
  - disinvest
  - exit
fieldTypes:
  owner: dict
  tags: list
  architecturalDecisions: dict
  scalingUnits: list
  serviceGroups: list
  controlEnforcementProfiles: list
  controlImplementations: list
collectionSchemas:
  scalingUnits: scalingUnit
  serviceGroups: serviceGroup
  controlImplementations: controlImplementation
scalingUnit:
  requiredFields:
  - name
  - type
  optionalFields:
  - instanceCount
  - notes
  enumFields:
    type:
    - replicable
    - shared
serviceGroup:
  requiredFields:
  - name
  optionalFields:
  - deploymentTarget
  - scalingUnit
  - standards
  - applianceComponents
  - externalInteractions
  fieldTypes:
    standards: list
    applianceComponents: list
    externalInteractions: list
  collectionSchemas:
    standards: standardEntry
    applianceComponents: applianceComponentEntry
    externalInteractions: externalInteraction
standardEntry:
  requiredFields:
  - ref
  optionalFields:
  - diagramTier
  - intent
  - instance
  - riskRef
  - notes
  enumFields:
    diagramTier:
    - presentation
    - application
    - data
    - utility
    intent:
    - ha
    - sa
applianceComponentEntry:
  requiredFields:
  - ref
  optionalFields:
  - notes
externalInteraction:
  requiredFields:
  - name
  optionalFields:
  - type
  - ref
  - capabilities
  - notes
  enumFields:
    type:
    - internal
    - external
  fieldTypes:
    capabilities: list
controlImplementation:
  requiredFields:
  - profile
  - controlId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  enumFields:
    status:
    - satisfied
    - not-applicable
    - opted-out
    mechanism:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - externalInteraction
    - architecturalDecision
    - field
  fieldTypes:
    criteria: dict
