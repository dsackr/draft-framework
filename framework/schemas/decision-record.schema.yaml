schemaVersion: '1.0'
type: decision_record
requiredFields:
- schemaVersion
- id
- type
- name
- category
- status
- catalogStatus
- lifecycleStatus
optionalFields:
- description
- version
- owner
- tags
- affectedComponent
- impact
- mitigationPath
- decisionRationale
- relatedDecisionRecords
- controlReferences
- linkedSoftwareDeployment
idPattern: ^decision\.[a-z0-9-]+\.[0-9]+$
enumFields:
  catalogStatus:
  - stub
  - draft
  - approved
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
  category:
  - risk
  - decision
  status:
  - open
  - accepted
  - mitigated
  - resolved
fieldTypes:
  owner: dict
  tags: list
  relatedDecisionRecords: list
  controlReferences: list
conditionalRequired:
- when:
    category: decision
  require:
  - decisionRationale
aiHint: A Decision Record captures an architecture decision, risk, mitigation, or status that
  an AI should preserve as a first-class object.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally
    "1.0".
  id: Use a stable, namespaced object ID that matches this schema idPattern when one is declared.
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  category: Provide a valid category value for this decision_record object.
  status: Provide a valid status value for this decision_record object.
  catalogStatus: Use stub, draft, or approved to describe catalog maturity, not company adoption
    disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired where this object
    still carries a lifecycle signal.
