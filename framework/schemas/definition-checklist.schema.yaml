schemaVersion: '1.0'
type: definition_checklist
requiredFields:
- schemaVersion
- id
- type
- name
- description
- requirements
optionalFields:
- version
- catalogStatus
- lifecycleStatus
- owner
- tags
- appliesTo
- inherits
idPattern: ^checklist\.[a-z0-9.-]+$
enumFields:
  catalogStatus:
  - stub
  - draft
  - approved
  lifecycleStatus:
  - pre-invest
  - invest
  - maintain
  - disinvest
  - exit
fieldTypes:
  owner: dict
  tags: list
  appliesTo: dict
  requirements: list
collectionSchemas:
  requirements: requirement
requirement:
  requiredFields:
  - id
  - description
  - canBeSatisfiedBy
  optionalFields:
  - rationale
  - minimumSatisfactions
  fieldTypes:
    canBeSatisfiedBy: list
  collectionSchemas:
    canBeSatisfiedBy: satisfactionMechanism
satisfactionMechanism:
  requiredFields:
  - mechanism
  optionalFields:
  - criteria
  - key
  - equals
  - allowEmpty
  - example
  fieldTypes:
    criteria: dict
    allowEmpty: bool
