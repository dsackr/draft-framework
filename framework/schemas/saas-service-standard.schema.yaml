schemaVersion: '1.0'
type: saas_service_standard
requiredFields:
- schemaVersion
- uid
- type
- name
- vendor
- dataLeavesInfrastructure
- catalogStatus
- lifecycleStatus
optionalFields:
- aliases
- description
- version
- owner
- tags
- capabilities
- dataResidencyCommitment
- dpaNotes
- vendorSLA
- authenticationModel
- complianceCerts
- incidentNotificationProcess
- architecturalDecisions
- notes
- requirementGroups
- requirementImplementations
enumFields:
  catalogStatus:
  - stub
  - draft
  - approved
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
  authenticationModel:
  - api-key
  - oauth
  - saml
  - other
  - TBD
fieldTypes:
  aliases: list
  owner: dict
  tags: list
  capabilities: list
  complianceCerts: list
  architecturalDecisions: dict
  dataLeavesInfrastructure: bool
  requirementGroups: list
  requirementImplementations: list
collectionSchemas:
  requirementImplementations: requirementImplementation
requirementImplementation:
  requiredFields:
  - requirementGroup
  - requirementId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  fieldDescriptions:
    requirementGroup: Reference the requirement_group object that owns this requirement.
    requirementId: Reference the requirement id within the requirement group.
    status: Use satisfied, not-applicable, or not-compliant to record the object disposition.
  enumFields:
    status:
    - satisfied
    - not-applicable
    - not-compliant
    mechanism:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - externalInteraction
    - internalComponent
    - architecturalDecision
    - field
  fieldTypes:
    criteria: dict
aiHint: A SaaS Service Standard defines a vendor-managed external service and its data-boundary responsibilities.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally "1.0".
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  vendor: Name the external vendor or provider for this technology or service.
  dataLeavesInfrastructure: Provide a valid dataLeavesInfrastructure value for this saas_service_standard object.
  catalogStatus: Use stub, draft, or approved to describe catalog maturity, not company adoption disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired where this object still carries a lifecycle signal.
  uid: Use the generated opaque UID for object identity. Do not edit it for display-name, product-name, or taxonomy changes.
  aliases: List prior or alternate human-readable names that should resolve to this object.
uidPattern: ^[0-9A-HJKMNP-TV-Z]{10}-[0-9A-HJKMNP-TV-Z]{4}$
