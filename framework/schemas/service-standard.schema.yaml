schemaVersion: '1.0'
type: service_standard
requiredFields:
- schemaVersion
- id
- type
- name
- hostStandard
- primaryTechnologyComponent
- internalComponents
- catalogStatus
- lifecycleStatus
optionalFields:
- description
- version
- owner
- tags
- requirementGroups
- architecturalDecisions
- externalInteractions
- deploymentConfigurations
- requirementImplementations
idPattern: ^service\.[a-z0-9.-]+$
enumFields:
  catalogStatus:
  - stub
  - draft
  - approved
  lifecycleStatus:
  - candidate
  - preferred
  - existing-only
  - deprecated
  - retired
fieldTypes:
  owner: dict
  tags: list
  architecturalDecisions: dict
  internalComponents: list
  externalInteractions: list
  deploymentConfigurations: list
  requirementGroups: list
  requirementImplementations: list
collectionSchemas:
  internalComponents: internalComponent
  externalInteractions: externalInteraction
  deploymentConfigurations: deploymentConfiguration
  requirementImplementations: requirementImplementation
internalComponent:
  requiredFields:
  - ref
  optionalFields:
  - role
  - notes
externalInteraction:
  requiredFields:
  - capabilities
  optionalFields:
  - name
  - ref
  - notes
  - enabledBy
  fieldTypes:
    capabilities: list
deploymentConfiguration:
  requiredFields:
  - id
  - name
  - description
  optionalFields:
  - addressesQualities
  - addsInternalComponents
  - addsExternalInteractions
  - addsArchitecturalDecisions
  - notes
  enumListFields:
    addressesQualities:
    - availability
    - scalability
    - recoverability
  fieldTypes:
    addressesQualities: list
    addsInternalComponents: list
    addsExternalInteractions: list
    addsArchitecturalDecisions: dict
requirementImplementation:
  requiredFields:
  - requirementGroup
  - requirementId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  fieldDescriptions:
    requirementGroup: Reference the requirement_group object that owns this requirement.
    requirementId: Reference the requirement id within the requirement group.
    status: Use satisfied, not-applicable, or not-compliant to record the object disposition.
  enumFields:
    status:
    - satisfied
    - not-applicable
    - not-compliant
    mechanism:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - externalInteraction
    - internalComponent
    - architecturalDecision
    - field
  fieldTypes:
    criteria: dict
aiHint: A Service Standard defines a reusable service pattern built from a host and a primary
  Technology Component.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally
    "1.0".
  id: Use a stable, namespaced object ID that matches this schema idPattern when one is declared.
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  hostStandard: Provide a valid hostStandard value for this service_standard object.
  primaryTechnologyComponent: Provide a valid primaryTechnologyComponent value for this service_standard
    object.
  internalComponents: Provide a valid internalComponents value for this service_standard object.
  catalogStatus: Use stub, draft, or approved to describe catalog maturity, not company adoption
    disposition.
  lifecycleStatus: Use candidate, preferred, existing-only, deprecated, or retired where this object
    still carries a lifecycle signal.
