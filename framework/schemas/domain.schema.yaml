schemaVersion: '1.0'
type: domain
requiredFields:
- schemaVersion
- id
- type
- name
- capabilities
optionalFields:
- description
- version
- owner
- tags
idPattern: ^domain\.[a-z0-9-]+$
fieldTypes:
  capabilities: list
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally
    "1.0".
  id: Use a stable domain ID such as domain.compute.
  type: Use domain.
  name: Name the strategy or capability domain.
  capabilities: List capability object IDs owned by this domain.
aiHint: A Domain groups capability objects so an AI can navigate from strategy area to capability
  to approved implementations.
