schemaVersion: '1.0'
type: control_enforcement_profile
requiredFields:
- schemaVersion
- id
- type
- name
- controls
- catalogStatus
- lifecycleStatus
optionalFields:
- description
- version
- owner
- tags
- notes
- controlSemantics
idPattern: ^control-enforcement\.[a-z0-9-]+$
enumFields:
  catalogStatus:
  - stub
  - draft
  - approved
  lifecycleStatus:
  - pre-invest
  - invest
  - maintain
  - disinvest
  - exit
fieldTypes:
  owner: dict
  tags: list
  controlSemantics: list
collectionSchemas:
  controlSemantics: controlSemantic
controlSemantic:
  requiredFields:
  - controlId
  - appliesTo
  - requirementMode
  - validAnswerTypes
  optionalFields:
  - relatedCapability
  - naAllowed
  - applicability
  - notes
  enumFields:
    requirementMode:
    - mandatory
    - conditional
  enumListFields:
    appliesTo:
    - host_standard
    - service_standard
    - database_standard
    - product_service
    - paas_service_standard
    - saas_service_standard
    - reference_architecture
    - software_deployment_pattern
    - appliance_component
    validAnswerTypes:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - externalInteraction
    - architecturalDecision
    - field
  fieldTypes:
    appliesTo: list
    validAnswerTypes: list
    naAllowed: bool
    applicability: dict
