schemaVersion: '1.0'
type: drafting_session
requiredFields:
- schemaVersion
- id
- type
- name
- catalogStatus
- lifecycleStatus
- sessionStatus
- primaryObjectType
- sourceArtifacts
- generatedObjects
- unresolvedQuestions
optionalFields:
- description
- version
- owner
- tags
- primaryObjectId
- assumptions
- nextSteps
- architecturalDecisions
idPattern: ^session\.[a-z0-9.-]+$
enumFields:
  catalogStatus:
  - stub
  - draft
  - approved
  lifecycleStatus:
  - pre-invest
  - invest
  - maintain
  - disinvest
  - exit
  sessionStatus:
  - open
  - blocked
  - resolved
fieldTypes:
  owner: dict
  tags: list
  sourceArtifacts: list
  generatedObjects: list
  unresolvedQuestions: list
  assumptions: list
  nextSteps: list
  architecturalDecisions: dict
collectionSchemas:
  sourceArtifacts: sourceArtifact
  generatedObjects: generatedObject
  unresolvedQuestions: unresolvedQuestion
  assumptions: assumption
  nextSteps: nextStep
sourceArtifact:
  requiredFields:
  - name
  optionalFields:
  - type
  - location
  - notes
generatedObject:
  requiredFields:
  - name
  - type
  - status
  optionalFields:
  - ref
  - proposedId
  - notes
  enumFields:
    status:
    - created
    - proposed
    - stubbed
    - deferred
objectRef:
  requiredFields:
  - ref
unresolvedQuestion:
  requiredFields:
  - id
  - question
  - status
  optionalFields:
  - reason
  - currentBestGuess
  - impact
  - relatedObjects
  enumFields:
    status:
    - open
    - answered
    - deferred
  fieldTypes:
    relatedObjects: list
  collectionSchemas:
    relatedObjects: objectRef
assumption:
  requiredFields:
  - id
  - statement
  optionalFields:
  - rationale
  - impact
  - relatedObjects
  fieldTypes:
    relatedObjects: list
  collectionSchemas:
    relatedObjects: objectRef
nextStep:
  requiredFields:
  - id
  - action
  - status
  optionalFields:
  - owner
  - notes
  - relatedObjects
  enumFields:
    status:
    - open
    - blocked
    - done
  fieldTypes:
    relatedObjects: list
  collectionSchemas:
    relatedObjects: objectRef
aiHint: A Drafting Session captures incomplete AI authoring work, assumptions, source material,
  generated objects, and unresolved questions.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally
    "1.0".
  id: Use a stable, namespaced object ID that matches this schema idPattern when one is declared.
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  catalogStatus: Use stub, draft, or approved to describe catalog maturity, not company adoption
    disposition.
  lifecycleStatus: Use pre-invest, invest, maintain, disinvest, or exit where this object
    still carries a lifecycle signal.
  sessionStatus: Provide a valid sessionStatus value for this drafting_session object.
  primaryObjectType: Provide a valid primaryObjectType value for this drafting_session object.
  sourceArtifacts: Provide a valid sourceArtifacts value for this drafting_session object.
  generatedObjects: Provide a valid generatedObjects value for this drafting_session object.
  unresolvedQuestions: Provide a valid unresolvedQuestions value for this drafting_session
    object.
