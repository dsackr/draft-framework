schemaVersion: '1.0'
type: software_deployment_pattern
requiredFields:
- schemaVersion
- id
- type
- name
- catalogStatus
- lifecycleStatus
optionalFields:
- description
- version
- owner
- tags
- followsReferenceArchitecture
- architecturalDecisions
- scalingUnits
- serviceGroups
- externalInteractions
- decisionRecords
- requirementGroups
- requirementImplementations
idPattern: ^software-deployment\.[a-z0-9-]+$
enumFields:
  catalogStatus:
  - stub
  - draft
  - approved
  lifecycleStatus:
  - pre-invest
  - invest
  - maintain
  - disinvest
  - exit
fieldTypes:
  owner: dict
  tags: list
  architecturalDecisions: dict
  scalingUnits: list
  serviceGroups: list
  externalInteractions: list
  decisionRecords: list
  requirementGroups: list
  requirementImplementations: list
collectionSchemas:
  scalingUnits: scalingUnit
  serviceGroups: serviceGroup
  externalInteractions: externalInteraction
  decisionRecords: decisionRecordRef
  requirementImplementations: requirementImplementation
scalingUnit:
  requiredFields:
  - name
  - type
  optionalFields:
  - instanceCount
  - notes
  enumFields:
    type:
    - replicable
    - shared
serviceGroup:
  requiredFields:
  - name
  - deploymentTarget
  optionalFields:
  - deploymentTarget
  - scalingUnit
  - standards
  - applianceComponents
  - externalInteractions
  fieldTypes:
    standards: list
    applianceComponents: list
    externalInteractions: list
  collectionSchemas:
    standards: standardEntry
    applianceComponents: applianceComponentEntry
    externalInteractions: externalInteraction
standardEntry:
  requiredFields:
  - ref
  optionalFields:
  - diagramTier
  - intent
  - instance
  - riskRef
  - notes
  enumFields:
    diagramTier:
    - presentation
    - application
    - data
    - utility
    intent:
    - ha
    - sa
applianceComponentEntry:
  requiredFields:
  - ref
  optionalFields:
  - notes
externalInteraction:
  requiredFields:
  - name
  optionalFields:
  - type
  - ref
  - capabilities
  - notes
  enumFields:
    type:
    - internal
    - external
  fieldTypes:
    capabilities: list
decisionRecordRef:
  requiredFields:
  - ref
requirementImplementation:
  requiredFields:
  - requirementGroup
  - requirementId
  - status
  optionalFields:
  - mechanism
  - key
  - equals
  - criteria
  - ref
  - notes
  fieldDescriptions:
    requirementGroup: Reference the requirement_group object that owns this requirement.
    requirementId: Reference the requirement id within the requirement group.
    status: Use satisfied, not-applicable, or not-compliant to record the object disposition.
  enumFields:
    status:
    - satisfied
    - not-applicable
    - not-compliant
    mechanism:
    - technologyComponent
    - technologyComponentConfiguration
    - deploymentConfiguration
    - externalInteraction
    - internalComponent
    - architecturalDecision
    - field
  fieldTypes:
    criteria: dict
aiHint: A Software Deployment Pattern describes intended product deployment architecture in
  terms of standards, topology, decisions, and risks.
fieldDescriptions:
  schemaVersion: Use the schema version string supported by this framework release, normally
    "1.0".
  id: Use a stable, namespaced object ID that matches this schema idPattern when one is declared.
  type: Use the exact object type declared by the matching schema.
  name: Use a clear human-readable name for the object.
  catalogStatus: Use stub, draft, or approved to describe catalog maturity, not company adoption
    disposition.
  lifecycleStatus: Use pre-invest, invest, maintain, disinvest, or exit where this object
    still carries a lifecycle signal.
