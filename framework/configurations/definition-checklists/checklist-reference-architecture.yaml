schemaVersion: '1.0'
id: checklist.reference-architecture
type: definition_checklist
name: Reference Architecture Definition Checklist
description: Structured checklist of required questions and answers used to define
  a complete and correct Reference Architecture.
version: 1.0.0
catalogStatus: approved
lifecycleStatus: invest
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
tags:
- reference-architecture
- checklist
- definition
appliesTo:
  type: reference_architecture
requirements:
- id: pattern-type
  description: What supported deployment pattern does this Reference Architecture
    define for application teams?
  rationale: The Reference Architecture must clearly signal when an application should
    adopt this deployment pattern to achieve the intended non-functional outcomes.
  canBeSatisfiedBy:
  - mechanism: architecturalDecision
    key: patternType
    example: multi-tier
  minimumSatisfactions: 1
- id: service-groups
  description: How are the required services clustered into service groups and diagram
    tiers to realize this deployment pattern?
  rationale: The Reference Architecture should guide downstream Software Deployment
    Patterns and application teams with the same service-group and tier structure they will use in a real deployment.
  canBeSatisfiedBy:
  - mechanism: internalComponent
    criteria:
      role: service-group
    example: Frontend UI service group with presentation-tier Standards and Data Services
      service group with data-tier Standards
  minimumSatisfactions: 1
- id: deployment-qualities
  description: What non-functional deployment qualities is this Reference Architecture
    intended to deliver, and what pattern-level decisions make that possible?
  rationale: A Reference Architecture exists to guide application teams toward supported
    deployment choices that meet availability, recoverability, security, and similar non-functional requirements.
  canBeSatisfiedBy:
  - mechanism: architecturalDecision
    key: architecturalDecisions
    example: all tiers HA, autoscaling on web tier, AlwaysOn on data tier
  minimumSatisfactions: 1
