schemaVersion: "1.0"
id: odc.appliance-abb
type: odc
name: Appliance ABB Object Definition Checklist
description: >
  Structured checklist of required questions and answers used to define a
  complete and correct Appliance ABB. An Appliance ABB is a
  vendor component deployed within the organization's infrastructure boundary
  where the underlying host is blackbox. The organization configures the
  appliance but has no visibility into or responsibility for the underlying
  infrastructure. Because there is no host RBB or service RBB wrapper to inherit
  baseline ODC requirements, this checklist collects the appliance's consumer-facing
  service capabilities directly on the ABB.
version: 1.1.0
catalogStatus: approved
lifecycleStatus: invest
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
tags:
  - appliance
  - checklist
  - definition
appliesTo:
  type: abb
  subtype: appliance
requirements:
  - id: function
    description: What capabilities does this appliance provide?
    rationale: The capabilities are the reason the appliance exists in the architecture.
    canBeSatisfiedBy:
      - mechanism: field
        key: capabilities
        example: "capabilities: [load-balancing]"
  - id: authentication-access-model
    description: How is administrative, user, or service access to the appliance authenticated?
    rationale: A blackbox appliance still needs an explicit access-control answer because it provides a deployed capability without inheriting the host or service ODC baseline.
    canBeSatisfiedBy:
      - mechanism: externalInteraction
        criteria:
          capability: authentication
        example: The appliance authenticates administrators through an enterprise identity platform.
      - mechanism: abbConfiguration
        criteria:
          capability: authentication
        example: A named appliance configuration defines the authentication model.
      - mechanism: architecturalDecision
        key: authenticationAccessModel
        example: Administrator access is federated through SAML SSO; service access uses appliance-managed mTLS.
  - id: log-audit-visibility
    description: What operational logs, audit records, or events are visible to the adopter, and where do they go?
    rationale: A blackbox appliance must state the log or audit visibility the adopter can rely on because hidden host logs are not modeled.
    canBeSatisfiedBy:
      - mechanism: externalInteraction
        criteria:
          capability: log-management
        example: The appliance forwards audit events to a centralized logging or SIEM platform.
      - mechanism: abbConfiguration
        criteria:
          capability: log-management
        example: A named appliance configuration enables audit export or log forwarding.
      - mechanism: architecturalDecision
        key: logAuditVisibility
        example: Administrative actions are exported to CloudTrail and retained in the enterprise SIEM.
  - id: health-status-visibility
    description: How does the adopter observe appliance health, status, incidents, or operational telemetry?
    rationale: The appliance provides a service-like capability, so consumers need to know how health and status are observed even though the internal host is hidden.
    canBeSatisfiedBy:
      - mechanism: externalInteraction
        criteria:
          capability: health-welfare-monitoring
        example: The appliance publishes health metrics to the enterprise monitoring platform.
      - mechanism: abbConfiguration
        criteria:
          capability: health-welfare-monitoring
        example: A named appliance configuration enables health checks, status endpoints, or metrics export.
      - mechanism: architecturalDecision
        key: healthStatusVisibility
        example: Health is observed through managed service status, target health checks, and alert rules.
  - id: patch-update-model
    description: Who or what is responsible for appliance firmware, software, and hidden host updates, and what mechanism applies them?
    rationale: The hidden host prevents normal host patch-management modeling, so the appliance must document the update responsibility and mechanism directly.
    canBeSatisfiedBy:
      - mechanism: field
        key: patchingOwner
        example: "patchingOwner: vendor-managed"
      - mechanism: externalInteraction
        criteria:
          capability: patch-management
        example: Updates are orchestrated through a vendor or cloud-provider patch service.
      - mechanism: abbConfiguration
        criteria:
          capability: patch-management
        example: A named appliance configuration defines update windows or managed update policy.
      - mechanism: architecturalDecision
        key: patchUpdateModel
        example: Firmware and hidden host updates are vendor-managed; the adopter controls only maintenance windows.
  - id: resilience-model
    description: >
      What is the resilience model of this appliance — is it inherently
      highly available, single instance, or clustered?
    rationale: A blackbox appliance still needs an explicit answer for the resilience posture the adopter is depending on.
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        key: resilienceModel
        example: Inherently highly available within the managed service control plane
  - id: network-placement
    description: Where does this appliance sit in the network topology?
    rationale: Placement defines exposure and traffic path.
    canBeSatisfiedBy:
      - mechanism: field
        key: networkPlacement
        example: "networkPlacement: public-facing"
  - id: patching-ownership
    description: Who is responsible for firmware and software updates?
    rationale: A blackbox component still needs clear update ownership.
    canBeSatisfiedBy:
      - mechanism: field
        key: patchingOwner
        example: "patchingOwner: aws-managed"
  - id: configurable-surface
    description: >
      What configuration surface does the organization control on this appliance?
    rationale: The object should capture what the adopter can actually configure rather than pretending the hidden host is visible.
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        key: configurableSurface
        example: Listener rules, target groups, and TLS certificates are customer-managed
  - id: failure-domain
    description: What failure domain does this appliance introduce?
    rationale: Blackbox shared components can create broad impact boundaries that must be explicit.
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        key: failureDomain
        example: Shared dependency for all traffic entering the protected application path
  - id: compliance-posture
    description: What compliance certifications does this appliance carry?
    rationale: Compliance posture must be explicit when the underlying implementation is opaque.
    canBeSatisfiedBy:
      - mechanism: field
        key: complianceCerts
        allowEmpty: true
        example: "complianceCerts: [SOC2, ISO27001]"
