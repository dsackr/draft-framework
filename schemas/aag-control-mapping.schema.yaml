schemaVersion: "1.0"
type: aag_control_mapping
requiredFields:
  - id                # format: aagmap.<framework-slug>.<aag-id-normalized>
  - name
  - framework         # framework.<slug>
  - aagId             # aag.<slug>
  - requirementMappings
  - catalogStatus     # stub | draft | approved
  - lifecycleStatus
optionalFields:
  - description
  - version
  - notes

requirementMappings:
  - requirementId     # requirement id from the referenced AAG
    controls:         # list of control ids under the selected framework
      - <control-id>
