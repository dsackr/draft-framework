schemaVersion: "1.0"
type: compliance_profile
requiredFields:
  - schemaVersion
  - id
  - type
  - name
  - framework
  - catalogStatus
  - lifecycleStatus
optionalFields:
  - description
  - version
  - owner
  - tags
  - notes
  - controlSemantics
idPattern: "^profile\\.[a-z0-9-]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
fieldTypes:
  owner: dict
  tags: list
  controlSemantics: list
collectionSchemas:
  controlSemantics: controlSemantic

controlSemantic:
  requiredFields:
    - controlId
    - appliesTo
    - requirementMode
    - validAnswerTypes
  optionalFields:
    - relatedConcern
    - naAllowed
    - applicability
    - notes
  enumFields:
    requirementMode:
      - mandatory
      - conditional
  enumListFields:
    appliesTo:
      - rbb.host
      - rbb.service.general
      - rbb.service.database
      - rbb.service.product
      - rbb.service.paas
      - rbb.service.saas
      - ra
      - sdm
      - abb.appliance
    validAnswerTypes:
      - abb
      - abbConfiguration
      - deploymentConfiguration
      - externalInteraction
      - architecturalDecision
      - field
  fieldTypes:
    appliesTo: list
    validAnswerTypes: list
    naAllowed: bool
    applicability: dict
