schemaVersion: "1.0"
type: rbb
requiredFields:
  - schemaVersion
  - id
  - type
  - name
  - catalogStatus
  - lifecycleStatus
  - category
optionalFields:
  - description
  - version
  - owner
  - tags
  - category
  - subtype
  - serviceCategory
  - satisfiesAAG
  - osAbb
  - hardwareAbb
  - hostRbb
  - functionAbb
  - externalInteractions
idPattern: "^rbb\\.[a-z0-9.-]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
  category:
    - host
    - service
  serviceCategory:
    - general
    - database
    - product
    - saas
fieldTypes:
  tags: list
  owner: dict
  satisfiesAAG: list
  internalComponents: list
  externalInteractions: list
  variants: dict
conditionalRequired:
  - when:
      category: host
    require:
      - internalComponents
      - variants
  - when:
      category: service
      serviceCategory: general
    require:
      - hostRbb
      - functionAbb
      - internalComponents
      - variants
  - when:
      category: service
      serviceCategory: database
    require:
      - hostRbb
      - functionAbb
      - internalComponents
      - variants
collectionSchemas:
  internalComponents: internalComponent
  externalInteractions: externalInteraction
internalComponent:
  requiredFields:
    - ref
  optionalFields:
    - role
    - notes
externalInteraction:
  requiredFields:
    - capability
  optionalFields:
    - name
    - ref
    - notes
    - enabledBy
