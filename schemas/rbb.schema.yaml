schemaVersion: "1.0"
type: rbb
requiredFields:
  - schemaVersion
  - id
  - type
  - name
  - catalogStatus
  - lifecycleStatus
  - category
optionalFields:
  - description
  - version
  - owner
  - tags
  - category
  - subtype
  - serviceCategory
  - satisfiesODC
  - architecturalDecisions
  - osAbb
  - hardwareAbb
  - hostRbb
  - functionAbb
  - externalInteractions
  - deploymentConfigurations
idPattern: "^rbb\\.[a-z0-9.-]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
  category:
    - host
    - service
  serviceCategory:
    - general
    - database
    - product
    - saas
fieldTypes:
  tags: list
  owner: dict
  satisfiesODC: list
  architecturalDecisions: dict
  internalComponents: list
  externalInteractions: list
  deploymentConfigurations: list
conditionalRequired:
  - when:
      category: host
    require:
      - internalComponents
  - when:
      category: service
      serviceCategory: general
    require:
      - hostRbb
      - functionAbb
      - internalComponents
  - when:
      category: service
      serviceCategory: database
    require:
      - hostRbb
      - functionAbb
      - internalComponents
collectionSchemas:
  internalComponents: internalComponent
  externalInteractions: externalInteraction
  deploymentConfigurations: deploymentConfiguration
internalComponent:
  requiredFields:
    - ref
  optionalFields:
    - role
    - notes
externalInteraction:
  requiredFields:
    - capability
  optionalFields:
    - name
    - ref
    - notes
    - enabledBy
deploymentConfiguration:
  requiredFields:
    - id
    - name
    - description
  optionalFields:
    - addressesQualities
    - addsInternalComponents
    - addsExternalInteractions
    - addsArchitecturalDecisions
    - notes
  enumListFields:
    addressesQualities:
      - availability
      - scalability
      - recoverability
  fieldTypes:
    addressesQualities: list
    addsInternalComponents: list
    addsExternalInteractions: list
    addsArchitecturalDecisions: dict
