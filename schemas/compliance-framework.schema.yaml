schemaVersion: "1.0"
type: compliance_framework
requiredFields:
  - schemaVersion
  - id                # format: framework.<slug>
  - type
  - name
  - frameworkKind     # common | organizational
  - catalogStatus     # stub | draft | approved
  - lifecycleStatus
optionalFields:
  - description
  - version
  - owner
  - tags
  - controlIdNamespace
  - defaultSelection  # boolean
  - extends           # list of framework ids this framework inherits controls from
  - notes
  - controls          # list of required control definitions
idPattern: "^framework\\.[a-z0-9-]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
  frameworkKind:
    - common
    - organizational
fieldTypes:
  owner: dict
  tags: list
  defaultSelection: bool
  extends: list
  controls: list
collectionSchemas:
  controls: control

control:
  requiredFields:
    - controlId
    - name
    - description
    - appliesTo
    - validAnswerTypes
  optionalFields:
    - externalReference
    - relatedConcern
    - notes
  enumListFields:
    appliesTo:
      - rbb.host
      - rbb.service.general
      - rbb.service.database
      - rbb.service.product
      - rbb.service.saas
      - ra
      - sdm
      - abb.appliance
    validAnswerTypes:
      - abb
      - abbConfiguration
      - externalInteraction
      - architecturalDecision
      - field
  fieldTypes:
    appliesTo: list
    validAnswerTypes: list

controls structure:
  - controlId: CTRL-001
    name: Password Policy
    description: Administrative identities must comply with the approved password policy.
    externalReference: https://example.com/security/controls/password-policy
    appliesTo:
      - rbb.host
      - rbb.service.database
    relatedConcern: authentication
    validAnswerTypes:
      - abbConfiguration
      - externalInteraction
      - architecturalDecision
