schemaVersion: "1.0"
type: compliance_framework
requiredFields:
  - schemaVersion
  - id                # format: framework.<slug>
  - type
  - name
  - frameworkKind     # common | organizational
  - catalogStatus     # stub | draft | approved
  - lifecycleStatus
optionalFields:
  - description
  - version
  - owner
  - tags
  - controlIdNamespace
  - defaultSelection  # boolean
  - notes
  - controls          # pure control catalog entries
idPattern: "^framework\\.[a-z0-9-]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
  frameworkKind:
    - common
    - organizational
fieldTypes:
  owner: dict
  tags: list
  defaultSelection: bool
  controls: list
collectionSchemas:
  controls: control

control:
  requiredFields:
    - controlId
    - name
    - externalReference
  optionalFields:
    - notes
