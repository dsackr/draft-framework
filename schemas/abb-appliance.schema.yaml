schemaVersion: "1.0"
type: abb
subtype: appliance
requiredFields:
  - schemaVersion
  - id          # format: abb.appliance.<vendor>-<product>
  - type
  - name
  - vendor
  - productName
  - productVersion
  - classification
  - capability
  - catalogStatus
  - lifecycleStatus
optionalFields:
  - description
  - version
  - owner
  - tags
  - notes
  - addressesConcerns
  - configurations
  - networkPlacement
  - patchingOwner
  - complianceCerts
  - complianceProfiles
  - controlImplementations
idPattern: "^abb\\.appliance\\.[a-z0-9-]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
  capability:
    - load-balancing
    - file-storage
    - data-persistence
    - compute
    - container-orchestration
    - security
    - other
  networkPlacement:
    - public-facing
    - internal
    - vpc-private
  patchingOwner:
    - aws-managed
    - organization-scheduled
    - vendor-managed
  classification:
    - operating-system
    - compute-platform
    - software
    - agent
fieldTypes:
  owner: dict
  tags: list
  addressesConcerns: list
  configurations: list
  complianceCerts: list
  complianceProfiles: list
  controlImplementations: list
collectionSchemas:
  configurations: configuration
  controlImplementations: controlImplementation
configuration:
  requiredFields:
    - id
    - name
    - description
    - addressesConcerns
  fieldTypes:
    addressesConcerns: list

controlImplementation:
  requiredFields:
    - profile
    - controlId
    - status
  optionalFields:
    - mechanism
    - key
    - equals
    - criteria
    - ref
    - notes
  enumFields:
    status:
      - satisfied
      - not-applicable
      - opted-out
    mechanism:
      - abb
      - abbConfiguration
      - deploymentConfiguration
      - externalInteraction
      - architecturalDecision
      - field
  fieldTypes:
    criteria: dict
