schemaVersion: "1.0"
type: rbb
category: service
serviceCategory: saas
requiredFields:
  - schemaVersion
  - id          # format: saas.<vendor>-<product>
  - type
  - category
  - serviceCategory
  - name
  - vendor
  - capability
  - catalogStatus
  - lifecycleStatus
  - dataLeavesInfrastructure
optionalFields:
  - description
  - version
  - owner
  - tags
  - dataResidencyCommitment
  - dpaNotes
  - vendorSLA
  - authenticationModel
  - complianceCerts
  - incidentNotificationProcess
  - notes
  - complianceProfiles
  - controlImplementations
idPattern: "^saas\\.[a-z0-9-]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
  capability:
    - waf
    - identity
    - messaging
    - analytics
    - monitoring
    - storage
    - security
    - integration
    - other
  authenticationModel:
    - api-key
    - oauth
    - saml
    - other
    - TBD
fieldTypes:
  owner: dict
  tags: list
  dataLeavesInfrastructure: bool
  complianceCerts: list
  complianceProfiles: list
  controlImplementations: list
collectionSchemas:
  controlImplementations: controlImplementation

controlImplementation:
  requiredFields:
    - profile
    - controlId
    - status
  optionalFields:
    - mechanism
    - key
    - equals
    - criteria
    - ref
    - notes
  enumFields:
    status:
      - satisfied
      - not-applicable
      - opted-out
    mechanism:
      - abb
      - abbConfiguration
      - deploymentConfiguration
      - externalInteraction
      - architecturalDecision
      - field
  fieldTypes:
    criteria: dict
