schemaVersion: "1.0"
type: rbb
category: service
serviceCategory: product
requiredFields:
  - schemaVersion
  - id
  - type
  - category
  - serviceCategory
  - name
  - product
  - runsOn
  - catalogStatus
  - lifecycleStatus
optionalFields:
  - description
  - version
  - owner
  - tags
  - notes
  - architecturalDecisions
idPattern: "^ps\\.[a-z0-9-]+\\.[a-z0-9-]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
fieldTypes:
  owner: dict
  tags: list
  architecturalDecisions: dict
