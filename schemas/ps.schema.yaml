schemaVersion: "1.0"
type: rbb
category: service
serviceCategory: product
requiredFields:
  - schemaVersion
  - id
  - type
  - category
  - serviceCategory
  - name
  - product
  - runsOn
  - catalogStatus
  - lifecycleStatus
optionalFields:
  - description
  - version
  - owner
  - tags
  - notes
  - architecturalDecisions
  - complianceProfiles
  - controlImplementations
idPattern: "^ps\\.[a-z0-9-]+\\.[a-z0-9-]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
fieldTypes:
  owner: dict
  tags: list
  architecturalDecisions: dict
  complianceProfiles: list
  controlImplementations: list
collectionSchemas:
  controlImplementations: controlImplementation

controlImplementation:
  requiredFields:
    - profile
    - controlId
    - status
  optionalFields:
    - mechanism
    - key
    - equals
    - criteria
    - ref
    - notes
  enumFields:
    status:
      - satisfied
      - not-applicable
      - opted-out
    mechanism:
      - abb
      - abbConfiguration
      - deploymentConfiguration
      - externalInteraction
      - architecturalDecision
      - field
  fieldTypes:
    criteria: dict
