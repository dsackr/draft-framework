schemaVersion: "1.0"
type: software_distribution_manifest
requiredFields:
  - schemaVersion
  - id            # format: sdm.<product>
  - type
  - name
  - catalogStatus # stub | draft | approved
  - lifecycleStatus
optionalFields:
  - description
  - version
  - owner
  - tags
  - appliesPattern
  - architecturalDecisions
  - scalingUnits
  - serviceGroups
  - externalInteractions
  - architectureRisksAndDecisions
  - complianceProfiles
  - controlImplementations
idPattern: "^sdm\\.[a-z0-9-]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
fieldTypes:
  owner: dict
  tags: list
  architecturalDecisions: dict
  scalingUnits: list
  serviceGroups: list
  externalInteractions: list
  architectureRisksAndDecisions: list
  complianceProfiles: list
  controlImplementations: list
collectionSchemas:
  scalingUnits: scalingUnit
  serviceGroups: serviceGroup
  externalInteractions: externalInteraction
  architectureRisksAndDecisions: ardRef
  controlImplementations: controlImplementation

scalingUnit:
  requiredFields:
    - name
    - type
  optionalFields:
    - instanceCount
    - notes
  enumFields:
    type:
      - replicable
      - shared

serviceGroup:
  requiredFields:
    - name
    - deploymentTarget
  optionalFields:
    - scalingUnit
    - rbbs
    - applianceAbbs
    - externalInteractions
  fieldTypes:
    rbbs: list
    applianceAbbs: list
    externalInteractions: list
  collectionSchemas:
    rbbs: rbbEntry
    applianceAbbs: applianceAbbEntry
    externalInteractions: externalInteraction

rbbEntry:
  requiredFields:
    - ref
  optionalFields:
    - diagramTier  # presentation | application | data | utility
    - intent
    - instance
    - riskRef
    - notes
  enumFields:
    diagramTier:
      - presentation
      - application
      - data
      - utility
    intent:
      - ha
      - sa

applianceAbbEntry:
  requiredFields:
    - ref
  optionalFields:
    - notes

externalInteraction:
  requiredFields:
    - name
  optionalFields:
    - type
    - ref
    - capabilities
    - notes
  enumFields:
    type:
      - internal
      - external
  fieldTypes:
    capabilities: list

ardRef:
  requiredFields:
    - ref

controlImplementation:
  requiredFields:
    - profile
    - controlId
    - status
  optionalFields:
    - mechanism
    - key
    - equals
    - criteria
    - ref
    - notes
  enumFields:
    status:
      - satisfied
      - not-applicable
      - opted-out
    mechanism:
      - abb
      - abbConfiguration
      - deploymentConfiguration
      - externalInteraction
      - architecturalDecision
      - field
  fieldTypes:
    criteria: dict
