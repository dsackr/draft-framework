schemaVersion: "1.0"
type: software_distribution_manifest
requiredFields:
  - schemaVersion
  - id            # format: sdm.<product>
  - type
  - name
  - catalogStatus # stub | draft | approved
  - lifecycleStatus
optionalFields:
  - description
  - version
  - owner
  - tags
  - appliesPattern
  - architecturalDecisions
  - scalingUnits
  - serviceGroups
  - externalInteractions
  - architectureRisksAndDecisions
idPattern: "^sdm\\.[a-z0-9-]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
fieldTypes:
  owner: dict
  tags: list
  architecturalDecisions: dict
  scalingUnits: list
  serviceGroups: list
  externalInteractions: list
  architectureRisksAndDecisions: list
collectionSchemas:
  scalingUnits: scalingUnit
  serviceGroups: serviceGroup
  externalInteractions: externalInteraction
  architectureRisksAndDecisions: ardRef

scalingUnit:
  requiredFields:
    - name
    - type
  optionalFields:
    - instanceCount
    - notes
  enumFields:
    type:
      - replicable
      - shared

serviceGroup:
  requiredFields:
    - name
    - deploymentTarget
  optionalFields:
    - scalingUnit
    - productServices
    - rbbs
    - applianceAbbs
    - saasServices
    - externalInteractions
  fieldTypes:
    productServices: list
    rbbs: list
    applianceAbbs: list
    saasServices: list
    externalInteractions: list
  collectionSchemas:
    productServices: productServiceEntry
    rbbs: rbbEntry
    applianceAbbs: applianceAbbEntry
    saasServices: saasServiceEntry
    externalInteractions: externalInteraction

productServiceEntry:
  requiredFields:
    - ref
  optionalFields:
    - diagramTier  # presentation | application | data | utility
    - intent
    - riskRef
    - notes
  enumFields:
    diagramTier:
      - presentation
      - application
      - data
      - utility
    intent:
      - ha
      - sa

rbbEntry:
  requiredFields:
    - ref
  optionalFields:
    - diagramTier  # presentation | application | data | utility
    - intent
    - instance
    - riskRef
    - notes
  enumFields:
    diagramTier:
      - presentation
      - application
      - data
      - utility
    intent:
      - ha
      - sa

applianceAbbEntry:
  requiredFields:
    - ref
  optionalFields:
    - notes

saasServiceEntry:
  requiredFields:
    - ref
  optionalFields:
    - notes

externalInteraction:
  requiredFields:
    - name
  optionalFields:
    - type
    - ref
    - capability
    - notes
  enumFields:
    type:
      - internal
      - external

ardRef:
  requiredFields:
    - ref
