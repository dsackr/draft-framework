schemaVersion: "1.0"
type: reference_architecture
requiredFields:
  - schemaVersion
  - id
  - type
  - name
  - catalogStatus
  - lifecycleStatus
  - serviceGroups
optionalFields:
  - description
  - version
  - owner
  - tags
  - patternType
  - architecturalDecisions
  - applicableODC
  - scalingUnits
idPattern: "^ra\\.[a-z0-9.-]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
fieldTypes:
  owner: dict
  tags: list
  architecturalDecisions: dict
  scalingUnits: list
  serviceGroups: list
collectionSchemas:
  scalingUnits: scalingUnit
  serviceGroups: serviceGroup

scalingUnit:
  requiredFields:
    - name
    - type
  optionalFields:
    - instanceCount
    - notes
  enumFields:
    type:
      - replicable
      - shared

serviceGroup:
  requiredFields:
    - name
  optionalFields:
    - deploymentTarget
    - scalingUnit
    - rbbs
    - applianceAbbs
    - externalInteractions
  fieldTypes:
    rbbs: list
    applianceAbbs: list
    externalInteractions: list
  collectionSchemas:
    rbbs: rbbEntry
    applianceAbbs: applianceAbbEntry
    externalInteractions: externalInteraction

rbbEntry:
  requiredFields:
    - ref
  optionalFields:
    - diagramTier
    - intent
    - instance
    - riskRef
    - notes
  enumFields:
    diagramTier:
      - presentation
      - application
      - data
      - utility
    intent:
      - ha
      - sa

applianceAbbEntry:
  requiredFields:
    - ref
  optionalFields:
    - notes

externalInteraction:
  requiredFields:
    - name
  optionalFields:
    - type
    - ref
    - capability
    - notes
  enumFields:
    type:
      - internal
      - external
