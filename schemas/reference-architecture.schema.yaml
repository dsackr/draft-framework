schemaVersion: "1.0"
type: reference_architecture
requiredFields:
  - schemaVersion
  - id
  - type
  - name
  - catalogStatus
  - lifecycleStatus
  - requiredRBBs
optionalFields:
  - description
  - version
  - owner
  - tags
  - patternType
  - architecturalDecisions
  - applicableODC
idPattern: "^ra\\.[a-z0-9.-]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
fieldTypes:
  owner: dict
  tags: list
  requiredRBBs: list
  architecturalDecisions: dict
collectionSchemas:
  requiredRBBs: requiredRBB
requiredRBB:
  requiredFields:
    - ref
    - role
  optionalFields:
    - notes
