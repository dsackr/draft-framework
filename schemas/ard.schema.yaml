# ARD — Architecture Risks and Decisions
# Replaces/extends the prior "architecturalDecisions" concept.
# ARDs are first-class catalog objects representing either:
#   risk     — a known architectural risk (e.g., SPOF, security gap, technical debt)
#   decision — an architectural decision that was made, with rationale
# AuditBoard is the system of record for controls linkage (future integration).
schemaVersion: "1.0"
type: ard
requiredFields:
  - schemaVersion
  - id
  - type
  - name
  - category
  - status
  - description
  - affectedComponent
  - impact
optionalFields:
  - version
  - owner
  - tags
  - mitigationPath
  - decisionRationale
  - relatedARDs
  - controlReferences
  - linkedSDM
idPattern: "^ard\\.[a-z0-9-]+\\.[0-9]+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
  category:
    - risk
    - decision
  status:
    - open
    - accepted
    - mitigated
    - resolved
fieldTypes:
  owner: dict
  tags: list
  relatedARDs: list
  controlReferences: list
conditionalRequired:
  - when:
      category: decision
    require:
      - decisionRationale
