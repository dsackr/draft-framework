schemaVersion: "1.0"
type: abb
requiredFields:
  - schemaVersion
  - id
  - type
  - name
  - catalogStatus
  - lifecycleStatus
optionalFields:
  - description
  - version
  - owner
  - tags
  - category
  - subtype
  - vendor
  - product
  - productVersion
  - notes
  - vendorLifecycle
  - platformDependency
  - capability
  - networkPlacement
  - patchingOwner
  - complianceCerts
  - controlReferences
idPattern: "^abb\\.[a-z0-9-]+(?:\\.[a-z0-9-]+)+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
  category:
    - os
    - hardware
    - software
    - agent
fieldTypes:
  tags: list
  owner: dict
  vendorLifecycle: dict
  complianceCerts: list
  controlReferences: list
