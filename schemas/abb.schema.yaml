schemaVersion: "1.0"
type: abb
requiredFields:
  - schemaVersion
  - id
  - type
  - name
  - vendor
  - productName
  - productVersion
  - classification
  - catalogStatus
  - lifecycleStatus
optionalFields:
  - description
  - version
  - owner
  - tags
  - subtype
  - vendor
  - productName
  - productVersion
  - notes
  - vendorLifecycle
  - platformDependency
  - addressesConcerns
  - configurations
  - capability
  - networkPlacement
  - patchingOwner
  - complianceCerts
  - controlReferences
idPattern: "^abb\\.[a-z0-9-]+(?:\\.[a-z0-9-]+)+$"
enumFields:
  catalogStatus:
    - stub
    - draft
    - approved
  lifecycleStatus:
    - pre-invest
    - invest
    - maintain
    - disinvest
    - exit
  classification:
    - operating-system
    - compute-platform
    - software
    - agent
fieldTypes:
  tags: list
  owner: dict
  vendorLifecycle: dict
  addressesConcerns: list
  configurations: list
  complianceCerts: list
  controlReferences: list
collectionSchemas:
  configurations: configuration
configuration:
  requiredFields:
    - id
    - name
    - description
    - addressesConcerns
  fieldTypes:
    addressesConcerns: list
