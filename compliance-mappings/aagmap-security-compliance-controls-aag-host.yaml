version: 1.0.0
catalogStatus: approved
lifecycleStatus: maintain
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
tags:
  - compliance
  - mapping
  - host
framework: framework.security-compliance-controls
aagId: aag.host
requirementMappings:
