      - CC.SecurityCompliance.04.2.2
      - CC.SecurityCompliance.04.4.1
  - requirementId: logging
    controls:
      - CC.SecurityCompliance.06.1.1
  - requirementId: security-monitoring
    controls:
      - CC.SecurityCompliance.06.3.1
  - requirementId: patch-management
    controls:
      - CC.SecurityCompliance.03.1.1
      - CC.SecurityCompliance.03.2.1
