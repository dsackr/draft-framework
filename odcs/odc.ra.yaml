schemaVersion: "1.0"
id: odc.ra
type: odc
name: Reference Architecture Object Definition Checklist
description: Structured checklist of required questions and answers used to define a complete and correct Reference Architecture.
version: 1.0.0
catalogStatus: approved
lifecycleStatus: invest
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
tags:
  - ra
  - checklist
  - definition
appliesTo:
  type: reference_architecture
requirements:
  - id: pattern-type
    description: What supported deployment pattern does this Reference Architecture define for application teams?
    rationale: The RA must clearly signal when an application should adopt this deployment pattern to achieve the intended non-functional outcomes.
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        key: patternType
        example: multi-tier
    minimumSatisfactions: 1
  - id: required-rbbs
    description: Which RBBs, in which roles, are required to realize this deployment pattern?
    rationale: The RA is the mechanism that tells downstream SDMs and application teams which reusable components they must assemble to achieve the intended posture.
    canBeSatisfiedBy:
      - mechanism: internalComponent
        criteria:
          role: web-tier | app-tier | data-tier | cache-tier | messaging-tier
        example: "rbb.service.web.iis-standard with role: web-tier"
    minimumSatisfactions: 1
  - id: deployment-qualities
    description: What non-functional deployment qualities is this Reference Architecture intended to deliver, and what pattern-level decisions make that possible?
    rationale: An RA exists to guide application teams toward supported deployment choices that meet availability, recoverability, security, and similar non-functional requirements.
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        key: architecturalDecisions
        example: all tiers HA, autoscaling on web tier, AlwaysOn on data tier
    minimumSatisfactions: 1
