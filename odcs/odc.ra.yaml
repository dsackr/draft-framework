schemaVersion: "1.0"
id: odc.ra
type: odc
name: Reference Architecture Object Definition Checklist
description: Structured checklist of required questions and answers used to define a complete and correct Reference Architecture.
version: 1.0.0
catalogStatus: approved
lifecycleStatus: invest
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
tags:
  - ra
  - checklist
  - definition
appliesTo:
  type: reference_architecture
requirements:
  - id: pattern-type
    description: The RA must have a descriptive unique name that allows an engineering leader to identify whether their application fits the pattern.
    rationale: An ambiguous pattern name leads to misapplication and inconsistent deployments.
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        key: patternType
        example: 3-Tier .NET High Availability, 2-Tier Java Standard Performance
    minimumSatisfactions: 1
  - id: required-rbbs
    description: Every RBB required by this pattern must be listed with a role that describes its function in the architecture.
    rationale: Without roles engineers cannot understand how to assemble the pattern correctly.
    canBeSatisfiedBy:
      - mechanism: internalComponent
        criteria:
          role: web-tier | app-tier | data-tier | cache-tier | messaging-tier
        example: "rbb.service.web.iis-standard with role: web-tier"
    minimumSatisfactions: 1
  - id: pattern-decisions
    description: At least one architectural decision must be documented at the pattern level independent of any specific deployment.
    rationale: Pattern-level decisions capture the why behind the pattern design.
    canBeSatisfiedBy:
      - mechanism: architecturalDecision
        key: architecturalDecisions
        example: all tiers HA, autoscaling on web tier, AlwaysOn on data tier
    minimumSatisfactions: 1
