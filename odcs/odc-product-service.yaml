schemaVersion: "1.0"
id: odc.product-service
type: odc
name: Product Service Object Definition Checklist
description: >
  Structured checklist of required questions and answers used to define a
  complete and correct Product Service. A PS contains
  1st party organization-authored code deployed on a standard RBB pattern.
  Version 1 of this framework does not enumerate individual code packages —
  it acknowledges that 1st party code is present and documents the deployment
  context, RBB dependency, and product ownership.
version: 2.0.0
catalogStatus: approved
lifecycleStatus: invest
owner:
  team: cloud-architecture
  contact: cloud-architecture@example.com
tags:
  - product-service
  - checklist
  - definition
appliesTo:
  type: rbb
  category: service
  serviceCategory: product
inherits: odc.service
requirements:
  - id: rbb-selection
    description: What RBB pattern does this Product Service run on?
    rationale: A Product Service is incomplete until its runtime pattern is explicit.
    canBeSatisfiedBy:
      - mechanism: field
        key: runsOn
        example: "runsOn: rbb.service.web.iis-standard"
  - id: product-ownership
    description: What product does this PS belong to?
    rationale: First-party services must be attributable to an owning product.
    canBeSatisfiedBy:
      - mechanism: field
        key: product
        example: "product: student-health"
  - id: firstparty-code
    description: >
      Does this service contain organization-authored code?
      (This is the defining characteristic of a Product Service vs an RBB.)
    rationale: Product Service is a first-party RBB classification and must remain explicit.
    canBeSatisfiedBy:
      - mechanism: field
        key: serviceCategory
        equals: product
